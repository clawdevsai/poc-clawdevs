              mountPath: /app/memory
            - name: workspace
              mountPath: /workspace
              readOnly: true
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
        - name: workspace
          persistentVolumeClaim:
            claimName: developer-workspace-pvc
---
