            - name: REDIS_CONSUMER_GROUP
              value: "cg-review"    # Mesmo consumer group do slot único de revisão
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "llama3:8b"
