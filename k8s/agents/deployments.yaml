# k8s/agents/deployments.yaml
# Deployments de todos os agentes do ClawDevs.
# Cada agente é um pod separado no namespace ai-agents.
# Referência: docs/issues/010-definicao-oito-agentes.md | docs/02-agentes.md
#             docs/issues/012-pods-ceo-po-nuvem-openclaw.md
#             docs/issues/013-pods-tecnicos-developer-opencode.md
#             docs/issues/014-pods-architect-qa-cybersec-ux.md
#
# Node selectors e alocação de hardware:
#   GPU (RTX 3060 Ti 8GB): Developer, Architect, QA, CyberSec, DBA
#   CPU only (Phi-3 Mini):  DevOps/SRE, UX
#   Nuvem (API):            CEO, PO (via OpenClaw com Google Gemini)
---
# ─── Agente CEO ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-ceo
  namespace: ai-agents
  labels:
    app: agent-ceo
    agent-type: cloud
    project: clawdevs
  annotations:
    description: "CEO: Estratégia e interface com Diretor. Opera via API Gemini. Sem código, sem PRs."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-ceo
  template:
    metadata:
      labels:
        app: agent-ceo
        project: clawdevs
        agent-type: cloud
    spec:
      nodeSelector:
        workload-type: cpu    # CEO usa API em nuvem; não precisa de GPU local
      serviceAccountName: agent-readonly-sa  # Zero Trust: conta mínima necessária
      containers:
        - name: agent-ceo
          image: clawdevs/agent-base:latest
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "CEO"
            - name: AGENT_TYPE
              value: "cloud"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "cmd:strategy"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-ceo"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: SOUL_FILE
              value: "/app/soul/CEO.md"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: clawdevs-secrets
                  key: google-api-key
            # VFM: threshold de custo-benefício antes de enviar evento de estratégia
            - name: VFM_THRESHOLD
              value: "0"
            # Token bucket: máx. 5 eventos de estratégia por hora (Gateway)
            - name: TOKEN_BUCKET_STRATEGY_LIMIT
              value: "5"
            - name: TOKEN_BUCKET_WINDOW_SECONDS
              value: "3600"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
            - name: memory-store
              mountPath: /app/memory
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
---
# ─── Agente PO (Product Owner) ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-po
  namespace: ai-agents
  labels:
    app: agent-po
    agent-type: cloud
    project: clawdevs
  annotations:
    description: "PO: Backlog, Issues GitHub, Kanban. Ciclo de rascunho com Architect. Sem internet pública."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-po
  template:
    metadata:
      labels:
        app: agent-po
        project: clawdevs
        agent-type: cloud
    spec:
      nodeSelector:
        workload-type: cpu
      serviceAccountName: agent-readonly-sa
      containers:
        - name: agent-po
          image: clawdevs/agent-base:latest
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "PO"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "task:directives"
            - name: REDIS_STREAM_OUTPUT
              value: "draft.2.issue"
            - name: REDIS_STREAM_BACKLOG
              value: "task:backlog"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-po"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: clawdevs-secrets
                  key: google-api-key
            # Disjuntor: 3 draft_rejected consecutivos → congelar + RAG health check
            - name: DRAFT_REJECTED_CIRCUIT_BREAKER_LIMIT
              value: "3"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
            - name: memory-store
              mountPath: /app/memory
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
---
# ─── Agente DevOps/SRE ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-devops
  namespace: ai-agents
  labels:
    app: agent-devops
    agent-type: cpu
    project: clawdevs
  annotations:
    description: "DevOps/SRE: IaC, CI/CD, repos, FinOps, monitoramento 65%. Zero binários em skills. CPU only."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-devops
  template:
    metadata:
      labels:
        app: agent-devops
        project: clawdevs
        agent-type: cpu
    spec:
      # DevOps roda EXCLUSIVAMENTE em CPU (Phi-3 Mini) — não consome GPU
      nodeSelector:
        workload-type: cpu-only
      serviceAccountName: agent-devops-sa  # Permissões admin para repos e infra
      containers:
        - name: agent-devops
          image: clawdevs/agent-devops:latest
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "DevOps"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "task:infra"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-devops"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "phi3:mini"    # Modelo leve em CPU
            # Monitoramento de temperatura (checkpoint 80°C)
            - name: TEMP_CHECKPOINT_THRESHOLD
              value: "80"
            - name: TEMP_EMERGENCY_THRESHOLD
              value: "82"
            # Heartbeat para detecção de cluster acéfalo
            - name: HEARTBEAT_CEO_TIMEOUT_SECONDS
              value: "300"   # 5 min sem comando estratégico do CEO → contingência
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
            - name: memory-store
              mountPath: /app/memory
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
---
# ─── Agente Architect ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-architect
  namespace: ai-agents
  labels:
    app: agent-architect
    agent-type: gpu
    project: clawdevs
  annotations:
    description: "Architect: Avalia rascunhos (draft.2.issue), formaliza technical_blocker, ADRs, merge PRs. Revisa APENAS diffs."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-architect
  template:
    metadata:
      labels:
        app: agent-architect
        project: clawdevs
        agent-type: gpu
    spec:
      nodeSelector:
        workload-type: gpu
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      # Hard timeout: Architect pode demorar em PRs grandes (TTL dinâmico 120s)
      serviceAccountName: agent-readonly-sa
      containers:
        - name: agent-architect
          image: clawdevs/agent-base:latest
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "Architect"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "draft.2.issue"
            - name: REDIS_STREAM_OUTPUT_APPROVED
              value: "task:backlog"
            - name: REDIS_STREAM_OUTPUT_REJECTED
              value: "draft_rejected"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-architect"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "llama3:8b"
            - name: GPU_LOCK_EVENT_KEY
              value: ""   # Definido pelo orquestrador por evento
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "6Gi"
              cpu: "2"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
            - name: memory-store
              mountPath: /app/memory
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
---
# ─── Agente Developer ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-developer
  namespace: ai-agents
  labels:
    app: agent-developer
    agent-type: gpu
    project: clawdevs
  annotations:
    description: "Developer: Implementação via OpenCode. Não faz merge. Não altera infra. Uma Issue por vez."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-developer
  template:
    metadata:
      labels:
        app: agent-developer
        project: clawdevs
        agent-type: gpu
    spec:
      nodeSelector:
        workload-type: gpu
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      serviceAccountName: agent-developer-sa
      containers:
        - name: agent-developer
          image: clawdevs/agent-developer:latest  # Inclui OpenCode
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "Developer"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "task:backlog"
            - name: REDIS_STREAM_OUTPUT
              value: "code:ready"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-developer"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "deepseek-coder:6.7b"
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
            - name: memory-store
              mountPath: /app/memory
            - name: workspace
              mountPath: /workspace   # PVC para código persistente no NVMe
            - name: sandbox
              mountPath: /sandbox     # Sandbox efêmero para dependências (npm/pip)
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
        - name: workspace
          persistentVolumeClaim:
            claimName: developer-workspace-pvc
        - name: sandbox
          emptyDir: {}               # Sandbox efêmero; não persiste entre reinicializações
---
