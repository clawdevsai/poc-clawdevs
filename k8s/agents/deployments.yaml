# ─── PVCs compartilhados ──────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-memory-pvc
  namespace: ai-agents
  labels:
    project: clawdevs
    component: memory
spec:
  accessModes:
    - ReadWriteMany   # Múltiplos agentes lendo/escrevendo memória
  resources:
    requests:
      storage: "10Gi"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: developer-workspace-pvc
  namespace: ai-agents
  labels:
    project: clawdevs
    component: workspace
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: "30Gi"
