# k8s/agents/ux/deployment.yaml
# Deployment do Agente UX.
# Referência: docs/issues/014-pods-architect-qa-cybersec-ux.md | docs/02-agentes.md
#
# Hardware: CPU only (Phi-3 Mini) — reserva GPU para agentes técnicos
# Consumer group compartilhado: cg-review (slot único de revisão com QA, CyberSec, DBA)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-ux
  namespace: ai-agents
  labels:
    app: agent-ux
    agent-type: cpu
    project: clawdevs
  annotations:
    description: "UX: Frontend, acessibilidade, code review de UI. CPU only (Phi-3 Mini). Não altera banco sem Architect."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-ux
  template:
    metadata:
      labels:
        app: agent-ux
        project: clawdevs
        agent-type: cpu
    spec:
      nodeSelector:
        workload-type: cpu-only   # UX usa CPU apenas — reserva GPU para técnicos
      serviceAccountName: agent-readonly-sa
      containers:
        - name: agent-ux
          image: clawdevs/agent-base:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "UX"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "code:ready"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-review"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "phi3:mini"    # Modelo leve em CPU
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
