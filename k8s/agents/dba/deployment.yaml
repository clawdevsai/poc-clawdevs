# k8s/agents/dba/deployment.yaml
# Deployment do Agente DBA.
# Referência: docs/issues/014-pods-architect-qa-cybersec-ux.md | docs/02-agentes.md
#
# Hardware: GPU (RTX 3060 Ti 8GB)
# Consumer group compartilhado: cg-review (slot único de revisão com QA, CyberSec, UX)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-dba
  namespace: ai-agents
  labels:
    app: agent-dba
    agent-type: gpu
    project: clawdevs
  annotations:
    description: "DBA: Validação de banco, normativa, performance, migrations, índices. Bloqueia merge em violações graves."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-dba
  template:
    metadata:
      labels:
        app: agent-dba
        project: clawdevs
        agent-type: gpu
    spec:
      nodeSelector:
        workload-type: gpu
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      serviceAccountName: agent-readonly-sa
      containers:
        - name: agent-dba
          image: clawdevs/agent-base:latest
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "DBA"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "code:ready"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-review"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "llama3:8b"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
