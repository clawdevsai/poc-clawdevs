# k8s/agents/architect/deployment.yaml
# Deployment do Agente Architect.
# Referência: docs/issues/014-pods-architect-qa-cybersec-ux.md | docs/02-agentes.md
#
# Hardware: GPU (RTX 3060 Ti 8GB)
# Hard timeout: Architect pode demorar em PRs grandes (TTL dinâmico 120s → deadline 150s)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-architect
  namespace: ai-agents
  labels:
    app: agent-architect
    agent-type: gpu
    project: clawdevs
  annotations:
    description: "Architect: Avalia rascunhos (draft.2.issue), formaliza technical_blocker, ADRs, merge PRs. Revisa APENAS diffs."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-architect
  template:
    metadata:
      labels:
        app: agent-architect
        project: clawdevs
        agent-type: gpu
    spec:
      nodeSelector:
        workload-type: gpu
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      # Hard timeout: Architect pode demorar em PRs grandes (TTL dinâmico 120s)
      serviceAccountName: agent-readonly-sa
      containers:
        - name: agent-architect
          image: clawdevs/agent-base:latest
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "Architect"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "draft.2.issue"
            - name: REDIS_STREAM_OUTPUT_APPROVED
              value: "task:backlog"
            - name: REDIS_STREAM_OUTPUT_REJECTED
              value: "draft_rejected"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-architect"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "llama3:8b"
            - name: GPU_LOCK_EVENT_KEY
              value: ""   # Definido pelo orquestrador por evento
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "6Gi"
              cpu: "2"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
            - name: memory-store
              mountPath: /app/memory
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
