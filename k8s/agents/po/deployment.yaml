# k8s/agents/po/deployment.yaml
# Deployment do Agente PO (Product Owner).
# Referência: docs/issues/012-pods-ceo-po-nuvem-openclaw.md | docs/02-agentes.md
#
# Hardware: CPU only (opera via API Gemini em nuvem)
# Disjuntor: 3 draft_rejected consecutivos → congelar + RAG health check
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-po
  namespace: ai-agents
  labels:
    app: agent-po
    agent-type: cloud
    project: clawdevs
  annotations:
    description: "PO: Backlog, Issues GitHub, Kanban. Ciclo de rascunho com Architect. Sem internet pública."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-po
  template:
    metadata:
      labels:
        app: agent-po
        project: clawdevs
        agent-type: cloud
    spec:
      serviceAccountName: agent-readonly-sa
      containers:
        - name: agent-po
          image: clawdevs/agent-base:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "PO"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "task:directives"
            - name: REDIS_STREAM_OUTPUT
              value: "draft.2.issue"
            - name: REDIS_STREAM_BACKLOG
              value: "task:backlog"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-po"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: clawdevs-secrets
                  key: google-api-key
            # Disjuntor: 3 draft_rejected consecutivos → congelar + RAG health check
            - name: DRAFT_REJECTED_CIRCUIT_BREAKER_LIMIT
              value: "3"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
            - name: memory-store
              mountPath: /app/memory
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
