# k8s/agents/qa/deployment.yaml
# Deployment do Agente QA.
# Referência: docs/issues/014-pods-architect-qa-cybersec-ux.md | docs/02-agentes.md
#
# Hardware: GPU (RTX 3060 Ti 8GB)
# Consumer group compartilhado: cg-review (slot único de revisão com CyberSec, UX, DBA)
# workspace montado como readOnly: QA não escreve código
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-qa
  namespace: ai-agents
  labels:
    app: agent-qa
    agent-type: gpu
    project: clawdevs
  annotations:
    description: "QA: Testes, E2E, sandbox. Não conserta bugs (cria Issues). Bloqueia merge em falhas críticas. Auditor da dívida técnica."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-qa
  template:
    metadata:
      labels:
        app: agent-qa
        project: clawdevs
        agent-type: gpu
    spec:
      nodeSelector:
        workload-type: gpu
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      serviceAccountName: agent-readonly-sa
      containers:
        - name: agent-qa
          image: clawdevs/agent-base:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "QA"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "code:ready"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-review"    # Mesmo consumer group do slot único de revisão
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "llama3:8b"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "6Gi"
              cpu: "2"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
            - name: memory-store
              mountPath: /app/memory
            - name: workspace
              mountPath: /workspace
              readOnly: true
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
        - name: workspace
          persistentVolumeClaim:
            claimName: developer-workspace-pvc
