# k8s/agents/cybersec/deployment.yaml
# Deployment do Agente CyberSec.
# Referência: docs/issues/014-pods-architect-qa-cybersec-ux.md | docs/02-agentes.md
#
# Hardware: GPU (RTX 3060 Ti 8GB)
# Imagem especial: inclui ferramentas semgrep e trivy para análise estática
# Consumer group compartilhado: cg-review (slot único de revisão com QA, UX, DBA)
# workspace montado como readOnly: CyberSec não escreve código
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-cybersec
  namespace: ai-agents
  labels:
    app: agent-cybersec
    agent-type: gpu
    project: clawdevs
  annotations:
    description: "CyberSec: Segurança, OWASP, SAST/DAST, auditoria PRs. Bloqueia chaves expostas e deps não homologadas."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-cybersec
  template:
    metadata:
      labels:
        app: agent-cybersec
        project: clawdevs
        agent-type: gpu
    spec:
      nodeSelector:
        workload-type: gpu
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      serviceAccountName: agent-readonly-sa
      containers:
        - name: agent-cybersec
          image: clawdevs/agent-cybersec:latest  # Inclui semgrep, trivy
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "CyberSec"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "code:ready"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-review"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "mistral:7b"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "6Gi"
              cpu: "2"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
            - name: memory-store
              mountPath: /app/memory
            - name: workspace
              mountPath: /workspace
              readOnly: true
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
        - name: workspace
          persistentVolumeClaim:
            claimName: developer-workspace-pvc
