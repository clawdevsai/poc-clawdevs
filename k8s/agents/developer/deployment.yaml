# k8s/agents/developer/deployment.yaml
# Deployment do Agente Developer.
# Referência: docs/issues/013-pods-tecnicos-developer-opencode.md | docs/02-agentes.md
#
# Hardware: GPU (RTX 3060 Ti 8GB)
# Imagem especial: inclui OpenCode para implementação de código
# Volumes extras: workspace (NVMe persistente) + sandbox (efêmero para deps)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-developer
  namespace: ai-agents
  labels:
    app: agent-developer
    agent-type: gpu
    project: clawdevs
  annotations:
    description: "Developer: Implementação via OpenCode. Não faz merge. Não altera infra. Uma Issue por vez."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-developer
  template:
    metadata:
      labels:
        app: agent-developer
        project: clawdevs
        agent-type: gpu
    spec:
      nodeSelector:
        workload-type: gpu
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      serviceAccountName: agent-developer-sa
      containers:
        - name: agent-developer
          image: clawdevs/agent-developer:latest  # Inclui OpenCode
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "Developer"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "task:backlog"
            - name: REDIS_STREAM_OUTPUT
              value: "code:ready"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-developer"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "deepseek-coder:6.7b"
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
            - name: memory-store
              mountPath: /app/memory
            - name: workspace
              mountPath: /workspace   # PVC para código persistente no NVMe
            - name: sandbox
              mountPath: /sandbox     # Sandbox efêmero para dependências (npm/pip)
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
        - name: workspace
          persistentVolumeClaim:
            claimName: developer-workspace-pvc
        - name: sandbox
          emptyDir: {}               # Sandbox efêmero; não persiste entre reinicializações
