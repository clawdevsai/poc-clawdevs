# k8s/agents/ceo/deployment.yaml
# Deployment do Agente CEO.
# Referência: docs/issues/012-pods-ceo-po-nuvem-openclaw.md | docs/02-agentes.md
#
# Hardware: CPU only (opera via API Gemini em nuvem; não precisa de GPU local)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-ceo
  namespace: ai-agents
  labels:
    app: agent-ceo
    agent-type: cloud
    project: clawdevs
  annotations:
    description: "CEO: Estratégia e interface com Diretor. Opera via API Gemini. Sem código, sem PRs."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-ceo
  template:
    metadata:
      labels:
        app: agent-ceo
        project: clawdevs
        agent-type: cloud
    spec:
      serviceAccountName: agent-readonly-sa  # Zero Trust: conta mínima necessária
      containers:
        - name: agent-ceo
          image: clawdevs/agent-base:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "CEO"
            - name: AGENT_TYPE
              value: "cloud"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_STREAM_INPUT
              value: "cmd:strategy"
            - name: REDIS_CONSUMER_GROUP
              value: "cg-ceo"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: SOUL_FILE
              value: "/app/soul/CEO.md"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: clawdevs-secrets
                  key: google-api-key
            # VFM: threshold de custo-benefício antes de enviar evento de estratégia
            - name: VFM_THRESHOLD
              value: "0"
            # Token bucket: máx. 5 eventos de estratégia por hora (Gateway)
            - name: TOKEN_BUCKET_STRATEGY_LIMIT
              value: "5"
            - name: TOKEN_BUCKET_WINDOW_SECONDS
              value: "3600"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: soul-files
              mountPath: /app/soul
            - name: memory-store
              mountPath: /app/memory
      volumes:
        - name: soul-files
          configMap:
            name: agent-souls
        - name: memory-store
          persistentVolumeClaim:
            claimName: shared-memory-pvc
