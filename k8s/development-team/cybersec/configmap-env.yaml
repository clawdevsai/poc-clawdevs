# Variáveis para o pod CyberSec (slot único por agente — 014).
apiVersion: v1
kind: ConfigMap
metadata:
  name: cybersec-slot-env
  namespace: ai-agents
  labels:
    app: cybersec-slot
data:
  AGENT_ROLE: "CyberSec"
  STREAM_IN: "review_qa_done"
  STREAM_OUT: "review_cybersec_done"
  CONSUMER_GROUP: "cybersec-slot"
  REDIS_HOST: "redis-service.ai-agents.svc.cluster.local"
  REDIS_PORT: "6379"
