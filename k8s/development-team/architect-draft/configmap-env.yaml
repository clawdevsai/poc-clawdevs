# Variáveis para o trigger Architect draft (openclaw-first: envia draft.2.issue ao agente Architect).
apiVersion: v1
kind: ConfigMap
metadata:
  name: architect-draft-env
  namespace: ai-agents
  labels:
    app: architect-draft
data:
  REDIS_HOST: "redis-service.ai-agents.svc.cluster.local"
  REDIS_PORT: "6379"
  STREAM_DRAFT_ISSUE: "draft.2.issue"
  ARCHITECT_DRAFT_GROUP: "clawdevs"
  ARCHITECT_DRAFT_BLOCK_MS: "5000"
  KEY_PREFIX_PROJECT: "project:v1"
  OPENCLAW_GATEWAY_WS: "ws://openclaw.ai-agents.svc.cluster.local:18789"
  OPENCLAW_ARCHITECT_SESSION_KEY: "agent:architect:main"
