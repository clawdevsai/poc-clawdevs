# NetworkPolicy para o pod do time técnico (100% offline).
# Quando houver deployment dedicado com label team=development, aplicar esta policy
# para bloquear egress para internet; apenas Redis e Ollama no cluster.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-development-egress-offline
  namespace: ai-agents
spec:
  podSelector:
    matchLabels:
      app: openclaw
      team: development
  policyTypes:
    - Egress
  egress:
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Ollama GPU no cluster
    - to:
        - podSelector:
            matchLabels:
              app: ollama
      ports:
        - protocol: TCP
          port: 11434
    # DNS (CoreDNS no cluster)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Nenhum egress para 0.0.0.0/0 (internet bloqueada)
