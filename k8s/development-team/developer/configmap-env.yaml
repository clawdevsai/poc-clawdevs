# Variáveis de ambiente para o pod Developer (013).
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-env
  namespace: ai-agents
  labels:
    app: developer
data:
  REDIS_HOST: "redis-service.ai-agents.svc.cluster.local"
  REDIS_PORT: "6379"
  DEVELOPER_STREAM: "task:backlog"
  DEVELOPER_GROUP: "clawdevs"
  DEVELOPER_BLOCK_MS: "5000"
