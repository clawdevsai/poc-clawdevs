# Pod Developer (Fase 1 — 013). Consome task:backlog, GPU Lock, PVC para código.
# Requer ConfigMap developer-scripts (developer_worker.py + gpu_lock.py). Criar com make developer-configmap.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: developer
  namespace: ai-agents
  labels:
    app: developer
spec:
  replicas: 0
  selector:
    matchLabels:
      app: developer
  template:
    metadata:
      labels:
        app: developer
    spec:
      containers:
        - name: worker
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q redis && cd /config && exec python developer_worker.py"
          envFrom:
            - configMapRef:
                name: developer-env
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: scripts
              mountPath: /config
              readOnly: true
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: scripts
          configMap:
            name: developer-scripts
            optional: true
        - name: workspace
          persistentVolumeClaim:
            claimName: developer-workspace
---
apiVersion: v1
kind: Service
metadata:
  name: developer-service
  namespace: ai-agents
  labels:
    app: developer
spec:
  selector:
    app: developer
  ports: []
  type: ClusterIP
