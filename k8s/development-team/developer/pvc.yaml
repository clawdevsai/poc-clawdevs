# PVC para workspace do Developer (código persistente). Fase 1 — 013.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: developer-workspace
  namespace: ai-agents
  labels:
    app: developer
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName omitido: usa default do cluster (Minikube: standard)
