# Slot único "Revisão pós-Dev" (007 + 125): um consumidor do stream code:ready.
# Adquire GPU Lock uma vez, executa Architect→QA→CyberSec→DBA em sequência, libera, XACK.
# Requer ConfigMap revisao-slot-scripts (slot_revisao_pos_dev.py + gpu_lock.py).
# Ref: docs/39-consumer-groups-pipeline-revisao.md
apiVersion: apps/v1
kind: Deployment
metadata:
  name: revisao-pos-dev
  namespace: ai-agents
  labels:
    app: revisao-pos-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: revisao-pos-dev
  template:
    metadata:
      labels:
        app: revisao-pos-dev
    spec:
      containers:
        - name: slot
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q redis && cd /config && exec python slot_revisao_pos_dev.py"
          envFrom:
            - configMapRef:
                name: revisao-pos-dev-env
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: scripts
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: scripts
          configMap:
            name: revisao-slot-scripts
            optional: false
---
apiVersion: v1
kind: Service
metadata:
  name: revisao-pos-dev-service
  namespace: ai-agents
  labels:
    app: revisao-pos-dev
spec:
  selector:
    app: revisao-pos-dev
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
