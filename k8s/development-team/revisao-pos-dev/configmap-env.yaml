# Variáveis para o slot Revisão pós-Dev (openclaw-first: 6 papéis via Gateway).
apiVersion: v1
kind: ConfigMap
metadata:
  name: revisao-pos-dev-env
  namespace: ai-agents
  labels:
    app: revisao-pos-dev
data:
  STREAM_CODE_READY: "code:ready"
  CONSUMER_GROUP_REVISAO: "revisao-pos-dev"
  SLOT_BLOCK_MS: "5000"
  SLOT_REVIEW_TIMEOUT_SEC: "120"
  REDIS_HOST: "redis-service.ai-agents.svc.cluster.local"
  REDIS_PORT: "6379"
  KEY_PREFIX_PROJECT: "project:v1"
  STREAM_EVENT_DEVOPS: "event:devops"
  OPENCLAW_GATEWAY_WS: "ws://openclaw.ai-agents.svc.cluster.local:18789"
  # GITHUB_REPO: "owner/repo" (ou use secret clawdevs-github-secret)
