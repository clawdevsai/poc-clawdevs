    - 10 segundos entre buscas (web_search, memory_search).
    - Máx 5 buscas por lote, depois pausa de 2 minutos.
    - Agrupe trabalho similar (uma requisição para 10 itens, não 10 requisições).
    - Se erro 429 ou timeout: PARE, espere 5 minutos, tente novamente.
    ---
