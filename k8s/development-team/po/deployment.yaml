# Pod PO: consome cmd:strategy, lê Memoria, cria Issues no GitHub, publica draft.2.issue.
# Requer ConfigMap po-scripts (po_worker.py, gpu_lock.py, issue_state.py). Optional: gh no image ou init.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: po
  namespace: ai-agents
  labels:
    app: po
spec:
  replicas: 0
  selector:
    matchLabels:
      app: po
  template:
    metadata:
      labels:
        app: po
    spec:
      containers:
        - name: worker
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q redis && cd /config && exec python po_worker.py"
          envFrom:
            - secretRef:
                name: clawdevs-github-secret
                optional: true
            - configMapRef:
                name: po-env
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: scripts
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: scripts
          configMap:
            name: po-scripts
            optional: true
