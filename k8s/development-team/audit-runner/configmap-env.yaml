# Variáveis para o trigger Audit (openclaw-first: envia audit:queue aos agentes QA, DBA, CyberSec, UX).
apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-runner-env
  namespace: ai-agents
  labels:
    app: audit-runner
data:
  REDIS_HOST: "redis-service.ai-agents.svc.cluster.local"
  REDIS_PORT: "6379"
  STREAM_AUDIT_QUEUE: "audit:queue"
  AUDIT_GROUP: "clawdevs"
  AUDIT_BLOCK_MS: "5000"
  KEY_PREFIX_PROJECT: "project:v1"
  OPENCLAW_GATEWAY_WS: "ws://openclaw.ai-agents.svc.cluster.local:18789"
