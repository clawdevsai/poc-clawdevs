# Variáveis para o pod QA (slot único por agente — 014).
apiVersion: v1
kind: ConfigMap
metadata:
  name: qa-slot-env
  namespace: ai-agents
  labels:
    app: qa-slot
data:
  AGENT_ROLE: "QA"
  STREAM_IN: "review_architect_done"
  STREAM_OUT: "review_qa_done"
  CONSUMER_GROUP: "qa-slot"
  REDIS_HOST: "redis-service.ai-agents.svc.cluster.local"
  REDIS_PORT: "6379"
