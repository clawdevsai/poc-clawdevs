# DevOps worker: consome event:devops (após merge), seta estado Deployed.
# Requer ConfigMap devops-worker-scripts (devops_worker.py, gpu_lock.py, issue_state.py).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-worker
  namespace: ai-agents
  labels:
    app: devops-worker
spec:
  replicas: 0
  selector:
    matchLabels:
      app: devops-worker
  template:
    metadata:
      labels:
        app: devops-worker
    spec:
      containers:
        - name: worker
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q redis && cd /config && exec python devops_worker.py"
          envFrom:
            - secretRef:
                name: clawdevs-github-secret
                optional: true
            - secretRef:
                name: clawdevs-maton-secret
                optional: true
            - configMapRef:
                name: devops-worker-env
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: scripts
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: scripts
          configMap:
            name: devops-worker-scripts
            optional: true
