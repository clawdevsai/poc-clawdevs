# Opcional: variáveis do gateway-redis-adapter (defaults no script).
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-redis-adapter-env
  namespace: ai-agents
  labels:
    app: gateway-redis-adapter
data:
  REDIS_HOST: "redis-service.ai-agents.svc.cluster.local"
  REDIS_PORT: "6379"
  PORT: "5000"
