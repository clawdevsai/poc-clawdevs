# Adapter HTTP para publicação em Redis (Fase 1 — 018). OpenClaw chama POST /publish.
# Fase 2: token bucket para cmd:strategy, GET /check_egress (whitelist + reputação). Requer make gateway-redis-adapter-configmap.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-redis-adapter
  namespace: ai-agents
  labels:
    app: gateway-redis-adapter
spec:
  replicas: 0
  selector:
    matchLabels:
      app: gateway-redis-adapter
  template:
    metadata:
      labels:
        app: gateway-redis-adapter
    spec:
      # CPU-only: evita disputar GPU. Se o nó não tiver workload-type=cpu-only, remova o nodeSelector ou: kubectl label node minikube workload-type=cpu-only
      nodeSelector:
        workload-type: cpu-only
      containers:
        - name: adapter
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q flask redis && exec python /config/gateway_redis_adapter.py"
          envFrom:
            - secretRef:
                name: clawdevs-github-secret
                optional: true
            - configMapRef:
                name: security-config
                optional: true
            - configMapRef:
                name: finops-config
                optional: true
            - configMapRef:
                name: agent-profiles
                optional: true
            - configMapRef:
                name: egress-whitelist
                optional: true
          env:
            - name: CONFIG_DIR
              value: "/config"
            - name: REDIS_HOST
              value: "redis-service.ai-agents.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: PORT
              value: "5000"
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: scripts
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: scripts
          configMap:
            name: gateway-redis-adapter-scripts
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-redis-adapter-service
  namespace: ai-agents
  labels:
    app: gateway-redis-adapter
spec:
  selector:
    app: gateway-redis-adapter
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  type: ClusterIP
