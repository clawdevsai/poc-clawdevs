# Variáveis para o pod DBA (slot único por agente — 014).
apiVersion: v1
kind: ConfigMap
metadata:
  name: dba-slot-env
  namespace: ai-agents
  labels:
    app: dba-slot
data:
  AGENT_ROLE: "DBA"
  STREAM_IN: "review_cybersec_done"
  STREAM_OUT: "review_done"
  CONSUMER_GROUP: "dba-slot"
  REDIS_HOST: "redis-service.ai-agents.svc.cluster.local"
  REDIS_PORT: "6379"
