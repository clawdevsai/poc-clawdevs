# Consumidor Architect draft: consome draft.2.issue, aprova → task:backlog / rejeita → draft_rejected.
# Requer ConfigMap architect-draft-scripts (architect_draft_consumer.py, gpu_lock.py, issue_state.py).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: architect-draft
  namespace: ai-agents
  labels:
    app: architect-draft
spec:
  replicas: 0
  selector:
    matchLabels:
      app: architect-draft
  template:
    metadata:
      labels:
        app: architect-draft
    spec:
      containers:
        - name: worker
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q redis && cd /config && exec python architect_draft_consumer.py"
          envFrom:
            - configMapRef:
                name: architect-draft-env
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: scripts
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: scripts
          configMap:
            name: architect-draft-scripts
            optional: true
