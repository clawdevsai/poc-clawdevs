# Variáveis para o pod Architect (slot único por agente — 014).
apiVersion: v1
kind: ConfigMap
metadata:
  name: architect-slot-env
  namespace: ai-agents
  labels:
    app: architect-slot
data:
  AGENT_ROLE: "Architect"
  STREAM_IN: "code:ready"
  STREAM_OUT: "review_architect_done"
  CONSUMER_GROUP: "architect-slot"
  REDIS_HOST: "redis-service.ai-agents.svc.cluster.local"
  REDIS_PORT: "6379"
