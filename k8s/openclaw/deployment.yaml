# OpenClaw Gateway no Kubernetes: Telegram + Ollama (ollama-service no cluster).
# Imagem: build local com make openclaw-image (ou eval $(minikube docker-env) && docker build -f k8s/openclaw/Dockerfile -t openclaw-gateway:local k8s/openclaw).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: ai-agents
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      initContainers:
        - name: workspace-init
          image: busybox:1.36
          command: ["sh", "-c", "cp -r /src/. /workspace/ && chmod -R u+rwX /workspace"]
          volumeMounts:
            - name: workspace-ceo-cm
              mountPath: /src
              readOnly: true
            - name: workspace
              mountPath: /workspace
      containers:
        - name: gateway
          image: openclaw-gateway:local
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"
            - name: OLLAMA_API_KEY
              value: "ollama-local"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: TELEGRAM_CHAT_ID
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: workspace
              mountPath: /workspace
              # Writable: OpenClaw precisa escrever AGENTS.md etc. ao processar Telegram
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
          ports:
            - containerPort: 18789
      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: workspace-ceo-cm
          configMap:
            name: openclaw-workspace-ceo
        - name: workspace
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-service
  namespace: ai-agents
  labels:
    app: openclaw
spec:
  selector:
    app: openclaw
  ports:
    - port: 18789
      targetPort: 18789
  type: ClusterIP
