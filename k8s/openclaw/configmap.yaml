# Configuração OpenClaw (sem credenciais). Token e Chat ID vêm do Secret.
# openclaw.json = config JSON5 usada pelo gateway no pod (Telegram + Ollama no cluster).
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: ai-agents
data:
  openclaw.json: |
    {
      "gateway": { "mode": "local", "port": 18789, "bind": "lan", "controlUi": { "dangerouslyAllowHostHeaderOriginFallback": true } },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "allowlist",
          "allowFrom": ["__TELEGRAM_CHAT_ID__"],
          "groups": {}
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "ollama": {
            "baseUrl": "http://ollama-service.ai-agents.svc.cluster.local:11434/v1",
            "apiKey": "ollama-local",
            "api": "openai-completions",
            "models": [
              { "id": "stewyphoenix19/phi3-mini_v1:latest", "name": "Phi3 Mini v1 (CEO Telegram, respostas rápidas)", "contextWindow": 16000, "maxTokens": 1024 },
              { "id": "ministral-3:3b", "name": "Ministral 3 3B", "contextWindow": 32000, "maxTokens": 4096 }
            ]
          }
        }
      },
      "agents": {
        "defaults": { "model": "ollama/stewyphoenix19/phi3-mini_v1:latest", "workspace": "/workspace" },
        "list": [
          { "id": "ceo", "name": "CEO", "model": "ollama/stewyphoenix19/phi3-mini_v1:latest", "workspace": "/workspace" }
        ]
      }
    }
  config.yaml: |
    # Ollama no cluster. ministral-3:3b suporta tools (gratuito).
    models:
      providers:
        ollama:
          baseURL: "http://ollama-service.ai-agents.svc.cluster.local:11434"
          models:
            - id: "ollama/stewyphoenix19/phi3-mini_v1:latest"
              label: "Phi3 Mini v1 (local, CEO Telegram)"
            - id: "ollama/ministral-3:3b"
              label: "Ministral 3 3B (local, com tools)"

    agents:
      defaults:
        model: "ollama/stewyphoenix19/phi3-mini_v1:latest"
        subagents:
          maxSpawnDepth: 2
          maxChildrenPerAgent: 5
          maxConcurrent: 4
          runTimeoutSeconds: 600
          model: "ollama/stewyphoenix19/phi3-mini_v1:latest"

      list:
        - id: ceo
          name: "CEO"
          description: "Estratégia e interface com o Diretor. Único agente que recebe Telegram."
          model: "ollama/stewyphoenix19/phi3-mini_v1:latest"
          # Canal Telegram roteia para este agente; phi3-mini_v1 para menor latência
        - id: po
          name: "Product Owner"
          description: "Backlog e priorização. Sub-agent do CEO."
          model: "ollama/stewyphoenix19/phi3-mini_v1:latest"
        - id: devops
          name: "DevOps/SRE"
          description: "IaC, CI/CD, FinOps. Sub-agent."
          model: "ollama/stewyphoenix19/phi3-mini_v1:latest"
        - id: architect
          name: "Architect"
          description: "Governança técnica, code review. Sub-agent."
          model: "ollama/stewyphoenix19/phi3-mini_v1:latest"
        - id: developer
          name: "Developer"
          description: "Implementação. Sub-agent."
          model: "ollama/stewyphoenix19/phi3-mini_v1:latest"
        - id: qa
          name: "QA"
          description: "Testes e qualidade. Sub-agent."
          model: "ollama/stewyphoenix19/phi3-mini_v1:latest"
        - id: cybersec
          name: "CyberSec"
          description: "Segurança. Sub-agent."
          model: "ollama/stewyphoenix19/phi3-mini_v1:latest"
        - id: ux
          name: "UX"
          description: "Experiência do usuário. Sub-agent."
          model: "ollama/stewyphoenix19/phi3-mini_v1:latest"
        - id: dba
          name: "DBA"
          description: "Dados e queries. Sub-agent."
          model: "ollama/stewyphoenix19/phi3-mini_v1:latest"

    # Canal Telegram. Token via env TELEGRAM_BOT_TOKEN (Secret).
    # dmPolicy: pairing = primeiro DM gera código; use "openclaw pairing approve telegram <CODE>"
    # Para allowlist fixo: dmPolicy: allowlist e allowFrom: [ "SEU_ID_NUMERICO" ]
    channels:
      telegram:
        enabled: true
        dmPolicy: "pairing"
        groups: {}
