# GitHub — acesso para todos os agentes (gh CLI, push/pull, Issues, PRs) e SSH para pods.
# NUNCA commitar com valores reais. Criar/atualizar via script:
#
#   ./scripts/cluster/secrets-from-env.sh
#
# Ou manualmente (mínimo):
#   kubectl create secret generic clawdevs-github-secret -n ai-agents \
#     --from-literal=GITHUB_TOKEN='ghp_...' \
#     --from-literal=GH_TOKEN='ghp_...' \
#     --from-literal=GITHUB_USER='clawdevsai' \
#     --from-literal=GITHUB_ORG='clawdevs-ai' \
#     --from-literal=GITHUB_SSH_PRIVATE_KEY="$(base64 -w0 ~/.ssh/id_ed25519_github)" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Ref: docs/05-tools-and-skills/20-ferramenta-github-gh.md
#      docs/05-tools-and-skills/21-github-ssh-setup.md
---
apiVersion: v1
kind: Secret
metadata:
  name: clawdevs-github-secret
  namespace: ai-agents
type: Opaque
stringData:
  # Token PAT (escopos: repo, workflow, admin:org ou read:org)
  GITHUB_TOKEN: "<ghp_SEU_TOKEN_AQUI>"
  GH_TOKEN: "<ghp_SEU_TOKEN_AQUI>"
  # Conta pessoal (Owner da org) / organização (slug: clawdevs-ai)
  GITHUB_USER: "clawdevsai"
  GITHUB_ORG: "clawdevs-ai"
  # Chave SSH privada em base64 — montada em /root/.ssh/ no pod DevOps
  # Gerar: base64 -w0 ~/.ssh/id_ed25519_github
  GITHUB_SSH_PRIVATE_KEY: ""
