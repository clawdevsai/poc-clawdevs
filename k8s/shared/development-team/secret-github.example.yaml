# GitHub — acesso para todos os agentes (gh CLI, push/pull, Issues, PRs).
# NUNCA commitar com valores reais. Criar o Secret a partir do .env:
#
#   kubectl create secret generic clawdevs-github-secret -n ai-agents \
#     --from-literal=GITHUB_TOKEN='seu_token_aqui' \
#     --from-literal=GH_TOKEN='seu_token_aqui' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Ou, se .env tiver GITHUB_TOKEN e GH_TOKEN:
#   export $(grep -E '^GITHUB_TOKEN=|^GH_TOKEN=' .env | xargs) && \
#   kubectl create secret generic clawdevs-github-secret -n ai-agents \
#     --from-literal=GITHUB_TOKEN="$GITHUB_TOKEN" \
#     --from-literal=GH_TOKEN="${GH_TOKEN:-$GITHUB_TOKEN}" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Ref: docs/20-ferramenta-github-gh.md
---
apiVersion: v1
kind: Secret
metadata:
  name: clawdevs-github-secret
  namespace: ai-agents
type: Opaque
stringData:
  GITHUB_TOKEN: "<COLE_SEU_TOKEN_OU_USE_COMANDO_ACIMA>"
  GH_TOKEN: "<MESMO_TOKEN_OU_USE_COMANDO_ACIMA>"
