# Exemplo de Job que usa GPU Lock: activeDeadlineSeconds garante que o pod seja morto
# após o tempo máximo (ex.: 120 s), evitando lock órfão se o processo travar ou morrer por OOM.
# Ref: docs/04-infraestrutura.md (GPU Lock), docs/06-operacoes.md, scripts/gpu_lock.py
#
# Este arquivo é apenas referência; não é aplicado pelo make up. Use como template para
# Jobs de revisão (Revisão pós-Dev) ou workers que disputam o GPU Lock.
apiVersion: batch/v1
kind: Job
metadata:
  name: exemplo-gpu-worker
  namespace: ai-agents
spec:
  # Hard timeout: pod morto após 120 s; tarefa volta à fila
  activeDeadlineSeconds: 120
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Template: adquira gpu_lock.py antes de usar Ollama; activeDeadlineSeconds evita lock órfão'"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            # limits:
            #   nvidia.com/gpu: "1"  # quando o job realmente usar GPU
