# Audit runner: consome audit:queue, envia a cada papel (QA, DBA, Security, UX) ao OpenClaw.
# Requer ConfigMap audit-runner-scripts (audit_runner.py, gpu_lock.py, issue_state.py, openclaw_gateway_call.py).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-runner
  namespace: ai-agents
  labels:
    app: audit-runner
spec:
  replicas: 0
  selector:
    matchLabels:
      app: audit-runner
  template:
    metadata:
      labels:
        app: audit-runner
    spec:
      containers:
        - name: worker
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q redis && cd /config && exec python audit_runner.py"
          envFrom:
            - secretRef:
                name: clawdevs-github-secret
                optional: true
            - configMapRef:
                name: audit-runner-env
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: scripts
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: scripts
          configMap:
            name: audit-runner-scripts
            optional: true
