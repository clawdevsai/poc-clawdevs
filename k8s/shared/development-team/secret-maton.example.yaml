# API Gateway Maton — integração com 100+ APIs (Slack, Notion, Google, etc.).
# NUNCA commitar com valor real. Criar o Secret a partir do .env ou manualmente:
#
#   kubectl create secret generic clawdevs-maton-secret -n ai-agents \
#     --from-literal=MATON_API_KEY='sua_chave_aqui' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Obter a API Key: https://maton.ai/settings (copiar API Key).
# Ref: docs/05-tools-and-skills/25-api-gateway-integracao-apis.md
---
apiVersion: v1
kind: Secret
metadata:
  name: clawdevs-maton-secret
  namespace: ai-agents
type: Opaque
stringData:
  MATON_API_KEY: "<OBTER_EM_maton.ai/settings_OU_USE_COMANDO_ACIMA>"
