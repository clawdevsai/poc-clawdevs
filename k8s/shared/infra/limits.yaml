# Fase 0 — 004: ResourceQuota e LimitRange no namespace ai-agents.
# Garante que o cluster respeite o limite de 65% do hardware e que cada container tenha limites padrão.
# Ref: docs/04-infraestrutura.md, docs/issues/004-resource-quota-limitrange.md
#
# Node selectors (DevOps/UX em CPU): quando houver pods dedicados, usar nodeSelector workload-type: cpu-only
# nos manifests de DevOps e UX para reservar GPU a Developer, Architect e QA.
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: limite-65-por-cento
  namespace: ai-agents
  labels:
    app.kubernetes.io/component: quota
spec:
  hard:
    requests.cpu: "8"
    limits.cpu: "10"
    requests.memory: 16Gi
    limits.memory: 20Gi
    pods: "15"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: limites-por-agente
  namespace: ai-agents
  labels:
    app.kubernetes.io/component: limitrange
spec:
  limits:
    - default:
        cpu: "2"
        memory: "2Gi"
      defaultRequest:
        cpu: "500m"
        memory: "512Mi"
      type: Container
