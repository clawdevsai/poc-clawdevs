# Configuração de provedor de LLM por agente (ClawDevs).
# Valores possíveis: ollama_local | ollama_cloud | openrouter | qwen_oauth | moonshot_ai | openai | huggingface_inference
# Padrão: ollama_local (Ollama GPU no cluster — http://ollama-service.ai-agents.svc.cluster.local:11434)
#
# Uso: o gateway OpenClaw pode ler estas chaves para definir o modelo por agente.
# Para override: edite o valor da chave do agente e reinicie o deployment.
# Provedores nuvem exigem secrets (OPENROUTER_API_KEY, OPENAI_API_KEY, etc.) no namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: clawdevs-llm-providers
  namespace: ai-agents
  labels:
    app.kubernetes.io/component: config
data:
  # Management team (CEO, PO) — modelos cloud para raciocínio estratégico
  agent_ceo: "ollama_cloud"
  agent_po: "ollama_cloud"

  # Development team — modelos cloud especializados por função
  agent_devops: "ollama_cloud"
  agent_architect: "ollama_cloud"
  agent_developer: "ollama_cloud"
  agent_qa: "ollama_cloud"
  agent_cybersec: "ollama_cloud"
  agent_ux: "ollama_cloud"
  agent_dba: "ollama_cloud"

  # Governance team (CPU, sessão isolada) — modelo cloud leve
  agent_governance_proposer: "ollama_cloud"

  # Referência dos provedores (documentação)
  _providers: |
    ollama_local   = Ollama no cluster (GPU)
    ollama_cloud   = Ollama Cloud (registry.ollama.ai)
    openrouter     = OpenRouter
    qwen_oauth     = Qwen (OAuth)
    moonshot_ai    = Moonshot AI
    openai         = OpenAI
    huggingface_inference = Hugging Face Inference
