# Ollama para inferência local com GPU (nvidia-device-plugin no Minikube).
# Serviço: ollama-service:11434 — OpenClaw usa OLLAMA_HOST=http://ollama-service.ai-agents.svc.cluster.local:11434
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-gpu
  namespace: ai-agents
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          env:
            # GPU: se o cluster tiver nvidia-device-plugin e GPU disponível, descomente CUDA_VISIBLE_DEVICES e as linhas nvidia.com/gpu em resources abaixo.
            # - name: CUDA_VISIBLE_DEVICES
            #   value: "0"
            # Modelo permanece na VRAM 5 min; reduz latência no Telegram (CEO).
            - name: OLLAMA_KEEP_ALIVE
              value: "5m"
            # Opcional: limita janela de contexto global (ex.: 8192); reduz VRAM e pode melhorar tempo de primeira resposta.
            - name: OLLAMA_CONTEXT_LENGTH
              value: "8192"
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
              # nvidia.com/gpu: "1"  # descomente quando o nó tiver GPU (Minikube com GPU configurado)
            limits:
              memory: "6Gi"
              cpu: "2"
              # nvidia.com/gpu: "1"  # descomente quando o nó tiver GPU
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: ai-agents
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: ai-agents
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
