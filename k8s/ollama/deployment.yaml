# Ollama para inferência local com GPU (nvidia-device-plugin no Minikube).
# Serviço: ollama-service:11434 — OpenClaw usa OLLAMA_HOST=http://ollama-service.ai-agents.svc.cluster.local:11434
#
# Preload automático: ao subir o pod, baixa os modelos LLM para não precisar de "kubectl exec ... ollama pull".
# Se OLLAMA_PRELOAD_MODELS estiver definido, usa essa lista; senão, extrai os modelos do OpenClaw (openclaw.json,
# agents.defaults + agents.list[].model). Se o ConfigMap openclaw-config não existir, usa fallback "glm-5:cloud".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-gpu
  namespace: ai-agents
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          env:
            # Chave Ollama Cloud (modelos glm-5:cloud etc.). Secret opcional: se não existir, roda só modelos locais.
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ollama-cloud
                  key: OLLAMA_API_KEY
                  optional: true
            # Lista de modelos para preload ao subir o pod. Se vazio, extrai automaticamente do OpenClaw (openclaw.json: agents).
            # Ex.: "glm-5:cloud" ou "glm-5:cloud ministral-3:3b" (separados por espaço). Deixe vazio para usar só a lista dos agentes.
            # Apenas modelos locais (sem cloud auth). Para modelos cloud, configure OLLAMA_API_KEY no secret.
            - name: OLLAMA_PRELOAD_MODELS
              value: ""
            # GPU: ativado automaticamente quando o Minikube é iniciado com --gpus=all
            # e o NVIDIA Container Toolkit está instalado. Descomente CUDA_VISIBLE_DEVICES se precisar fixar GPU.
            # - name: CUDA_VISIBLE_DEVICES
            #   value: "0"
            # Modelo permanece na VRAM 5 min; reduz latência no Telegram (CEO).
            - name: OLLAMA_KEEP_ALIVE
              value: "5m"
            # Opcional: limita janela de contexto global (ex.: 8192); reduz VRAM e pode melhorar tempo de primeira resposta.
            - name: OLLAMA_CONTEXT_LENGTH
              value: "8192"
          command:
            - /bin/sh
            - -c
            - |
              ollama serve &
              until ollama list 2>/dev/null; do sleep 2; done
              if [ -n "$OLLAMA_PRELOAD_MODELS" ]; then
                MODELS="$OLLAMA_PRELOAD_MODELS"
              elif [ -f /config/openclaw.json ]; then
                MODELS=$(grep -oE 'ollama/[^"]+' /config/openclaw.json | sed 's|ollama/||' | sort -u | tr '\n' ' ')
              else
                MODELS="ministral-3:14b-cloud"
              fi
              if [ -n "$MODELS" ]; then
                for m in $MODELS; do echo "Preload: ollama pull $m"; ollama pull "$m" || true; done
              fi
              wait
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "2"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
            - name: openclaw-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
        - name: openclaw-config
          configMap:
            name: openclaw-config
            optional: true
            items:
              - key: openclaw.json
                path: openclaw.json
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: ai-agents
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: ai-agents
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
