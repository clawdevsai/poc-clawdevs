apiVersion: v1
kind: Pod
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  restartPolicy: Always
  containers:
    - name: ollama
      image: ollama/ollama:latest
      resources:
        requests:
          cpu: 500m
          memory: 4G
        limits:
          cpu: "2"
          memory: 5325Mi
      startupProbe:
        tcpSocket:
          port: 11434
        periodSeconds: 5
        failureThreshold: 24
      readinessProbe:
        tcpSocket:
          port: 11434
        periodSeconds: 5
        failureThreshold: 3
      livenessProbe:
        tcpSocket:
          port: 11434
        periodSeconds: 20
        failureThreshold: 3
      volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -euo pipefail
          ollama serve &
          for i in $(seq 1 60); do
            if ollama list >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          ollama pull nemotron-3-super:cloud || echo "Aviso: pull cloud falhou (faca 'ollama signin' e rode pull novamente)."
          ollama pull qwen3-next:80b-cloud || echo "Aviso: pull cloud falhou (faca 'ollama signin' e rode pull novamente)."
          ollama pull gpt-oss:120b-cloud || echo "Aviso: pull cloud falhou (faca 'ollama signin' e rode pull novamente)."
          ollama pull qwen3-coder:480b-cloud || echo "Aviso: pull cloud falhou (faca 'ollama signin' e rode pull novamente)."
          ollama pull qwen3-vl:235b-cloud || echo "Aviso: pull cloud falhou (faca 'ollama signin' e rode pull novamente)."
          ollama pull gemma3:27b-cloud || echo "Aviso: pull cloud falhou (faca 'ollama signin' e rode pull novamente)."
          ollama pull qwen3.5:397b-cloud || echo "Aviso: pull cloud falhou (faca 'ollama signin' e rode pull novamente)."
          wait
      ports:
        - containerPort: 11434
      env:
        - name: OLLAMA_HOST
          value: 0.0.0.0:11434
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: ollama-auth
              key: OLLAMA_API_KEY
  volumes:
    - name: ollama-data
      persistentVolumeClaim:
        claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
---
