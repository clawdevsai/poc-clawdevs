# Consumidor do stream orchestrator:events → Slack (Fase 3).
# Requer orchestrator-scripts, orchestrator-env e Secret orchestrator-slack (opcional).
# Selector/labels app+component mantidos para compatibilidade com recurso já existente (selector imutável).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slack-events-consumer
  namespace: ai-agents
  labels:
    app: orchestrator
    component: slack-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phase3
      component: slack-consumer
  template:
    metadata:
      labels:
        app: phase3
        component: slack-consumer
    spec:
      containers:
        - name: consumer
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q redis && cd /scripts && exec python consumer_orchestrator_events_slack.py"
          envFrom:
            - configMapRef:
                name: orchestrator-env
            - secretRef:
                name: orchestrator-slack
                optional: true
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: scripts
          configMap:
            name: orchestrator-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: slack-events-consumer
  namespace: ai-agents
  labels:
    app: orchestrator
spec:
  selector:
    app: phase3
    component: slack-consumer
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
