# Contingência cluster acéfalo (124): atualiza ceo:last_strategy_ts quando health check externo passar (conectividade). Quando internet cai, deixa de atualizar; o monitor detecta timeout.
# Requer configmap-acefalo (acefalo-scripts). Precisa de egress para ACEFALO_HEALTH_CHECK_URL.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acefalo-heartbeat
  namespace: ai-agents
  labels:
    app: acefalo
    component: heartbeat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acefalo
      component: heartbeat
  template:
    metadata:
      labels:
        app: acefalo
        component: heartbeat
    spec:
      restartPolicy: Always
      containers:
        - name: heartbeat
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q redis && cd /scripts && exec python acefalo_heartbeat_writer.py"
          env:
            - name: REDIS_HOST
              value: "redis-service.ai-agents.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: ACEFALO_HEALTH_CHECK_URL
              value: "https://www.google.com/generate_204"
            - name: ACEFALO_HEARTBEAT_INTERVAL_SEC
              value: "60"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: scripts
          configMap:
            name: acefalo-scripts
