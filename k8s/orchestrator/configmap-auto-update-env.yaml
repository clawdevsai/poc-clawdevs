# Variáveis de ambiente para o CronJob de auto-atualização (runtime e skills).
# Ref: docs/07-operations/21-auto-atualizacao-ambiente.md (issue 092)
apiVersion: v1
kind: ConfigMap
metadata:
  name: auto-update-env
  namespace: ai-agents
  labels:
    app: orchestrator
    component: auto-update-env
data:
  TZ: "UTC"
  # Resumo vai para stdout (kubectl logs job/auto-update-xxx); Diretor pode consultar ou integrar ao digest.
