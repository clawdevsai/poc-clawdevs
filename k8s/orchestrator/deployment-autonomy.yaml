# Autonomia nível 4 (Fase 3 — 017, 032–036): five strikes, orçamento de degradação, loop de consenso, freio de mão.
# Requer orchestrator-scripts, orchestrator-env e opcionalmente security-config (DEGRADATION_THRESHOLD_PCT).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-autonomy
  namespace: ai-agents
  labels:
    app: orchestrator
    component: autonomy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
      component: autonomy
  template:
    metadata:
      labels:
        app: orchestrator
        component: autonomy
    spec:
      restartPolicy: Always
      containers:
        - name: autonomy
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q redis && cd /scripts && exec python orchestrator_autonomy.py"
          envFrom:
            - configMapRef:
                name: orchestrator-env
            - configMapRef:
                name: security-config
                optional: true
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: data
              mountPath: /data/agents-devs
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: scripts
          configMap:
            name: orchestrator-scripts
        - name: data
          emptyDir: {}
