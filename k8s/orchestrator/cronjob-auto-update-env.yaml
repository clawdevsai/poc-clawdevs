# CronJob: auto-atualização do runtime e das skills instaladas (sessão isolada).
# Resumo vai para stdout (kubectl logs job/auto-update-env-xxx). Ref: docs/07-operations/21-auto-atualizacao-ambiente.md (issue 092)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: auto-update-env
  namespace: ai-agents
  labels:
    app: orchestrator
    component: auto-update-env
spec:
  schedule: "0 4 * * *"  # 04:00 UTC diário (janela isolada; configurável via TZ no configmap)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: auto-update
              image: openclaw-gateway:local
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /scripts/auto-update-runner.sh
              envFrom:
                - configMapRef:
                    name: auto-update-env
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: scripts
              configMap:
                name: auto-update-scripts
                defaultMode: 0755
