# CronJob: subfluxo do loop de consenso (Fase 3 — 034).
# Requer orchestrator-scripts e orchestrator-env. Opcional: Secret orchestrator-slack.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: consensus-loop-runner
  namespace: ai-agents
  labels:
    app: orchestrator
spec:
  schedule: "*/2 * * * *"  # a cada 2 min
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: runner
              image: python:3.12-slim
              command:
                - /bin/sh
                - -c
                - "pip install -q redis && cd /scripts && exec python consensus_loop_runner.py --once"
              envFrom:
                - configMapRef:
                    name: orchestrator-env
                - secretRef:
                    name: orchestrator-slack
                    optional: true
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: data
                  mountPath: /data/agents-devs
                  readOnly: true
          volumes:
            - name: scripts
              configMap:
                name: orchestrator-scripts
            - name: data
              emptyDir: {}
