# CronJob: digest diário (Fase 3 — 036). Gera docs/agents-devs/digest-YYYY-MM-DD.md.
# Requer orchestrator-scripts e orchestrator-env.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: digest-daily
  namespace: ai-agents
  labels:
    app: orchestrator
spec:
  schedule: "0 18 * * *"  # 18:00 UTC diário
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: digest
              image: python:3.12-slim
              command:
                - /bin/sh
                - -c
                - "pip install -q redis && cd /scripts && exec python digest_daily.py"
              envFrom:
                - configMapRef:
                    name: orchestrator-env
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: data
                  mountPath: /data/agents-devs
          volumes:
            - name: scripts
              configMap:
                name: orchestrator-scripts
            - name: data
              emptyDir: {}
