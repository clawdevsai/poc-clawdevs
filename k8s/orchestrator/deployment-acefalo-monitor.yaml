# Contingência cluster acéfalo (124): monitor que verifica ceo:last_strategy_ts; se inativo por 5 min dispara contingência; em pausa faz health check a cada 5 min e retomada automática após 3 ciclos OK.
# Requer configmap-acefalo (acefalo-scripts). Opcional: ACEFALO_REPO_PATH no env para branch efêmera.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acefalo-monitor
  namespace: ai-agents
  labels:
    app: acefalo
    component: monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acefalo
      component: monitor
  template:
    metadata:
      labels:
        app: acefalo
        component: monitor
    spec:
      restartPolicy: Always
      containers:
        - name: monitor
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q redis && cd /scripts && exec python acefalo_monitor.py"
          env:
            - name: REDIS_HOST
              value: "redis-service.ai-agents.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: ACEFALO_TIMEOUT_MIN
              value: "5"
            - name: ACEFALO_MONITOR_CHECK_SEC
              value: "60"
            - name: ACEFALO_HEALTH_CHECK_INTERVAL_SEC
              value: "300"
            - name: ACEFALO_STABLE_CYCLES
              value: "3"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: snapshot
              mountPath: /tmp/acefalo_snapshot
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: scripts
          configMap:
            name: acefalo-scripts
        - name: snapshot
          emptyDir: {}
