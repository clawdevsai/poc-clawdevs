# Script do CronJob de auto-atualização (runtime e skills instaladas).
# Executa em sessão isolada; resumo para stdout (logs do Job). Ref: docs/07-operations/21-auto-atualizacao-ambiente.md
apiVersion: v1
kind: ConfigMap
metadata:
  name: auto-update-scripts
  namespace: ai-agents
  labels:
    app: orchestrator
    component: auto-update-env
data:
  auto-update-runner.sh: |
    #!/bin/sh
    # Auto-atualização: runtime e skills. Resumo ao Diretor via stdout (kubectl logs).
    # Ref: docs/07-operations/21-auto-atualizacao-ambiente.md
    echo "=== Auto-atualização ambiente ($(date +%Y-%m-%dT%H:%M:%S)Z) ==="
    RUNTIME_BEFORE=""; RUNTIME_AFTER=""; UPDATED=""; FAILED=""; CURRENT=""
    command -v openclaw >/dev/null 2>&1 && RUNTIME_BEFORE="$(openclaw --version 2>/dev/null || echo '?')"
    if command -v npx >/dev/null 2>&1; then
      if npx skills check 2>/dev/null; then
        npx skills update 2>&1 && UPDATED="skills " || FAILED="npx skills update "
      else
        CURRENT="skills (check não disponível ou já atual) "
      fi
    else
      echo "npx não disponível; pular skills."
    fi
    command -v openclaw >/dev/null 2>&1 && RUNTIME_AFTER="$(openclaw --version 2>/dev/null || echo '?')"
    echo ""
    echo "--- Resumo ---"
    echo "Runtime: ${RUNTIME_BEFORE:-n/a} -> ${RUNTIME_AFTER:-$RUNTIME_BEFORE}"
    echo "Skills atualizadas: ${UPDATED:-nenhuma}"
    echo "Skills já atuais: ${CURRENT:--}"
    [ -n "$FAILED" ] && echo "Falhas: $FAILED"
    echo "=== Fim auto-atualização ==="
