# Disjuntor draft_rejected (Fase 3 — 127): 3 rejeições consecutivas → congelar, RAG health check, descongelar.
# Requer orchestrator-scripts e orchestrator-env. Consome stream draft_rejected (se existir).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-disjuntor
  namespace: ai-agents
  labels:
    app: orchestrator
    component: disjuntor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
      component: disjuntor
  template:
    metadata:
      labels:
        app: orchestrator
        component: disjuntor
    spec:
      restartPolicy: Always
      containers:
        - name: disjuntor
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q redis && cd /scripts && exec python disjuntor_draft_rejected.py"
          envFrom:
            - configMapRef:
                name: orchestrator-env
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: scripts
          configMap:
            name: orchestrator-scripts
