# CronJob: digest diário (Fase 3 — 036). Gera docs/agents-devs/digest-YYYY-MM-DD.md.
# Requer ConfigMap phase3-scripts (scripts em /scripts) e phase3-env. Para persistência, use PVC em /data.
# Criar phase3-scripts: kubectl create configmap phase3-scripts -n ai-agents --from-file=scripts/ -o yaml | kubectl apply -f -
# Ou: make phase3-configmap
apiVersion: batch/v1
kind: CronJob
metadata:
  name: digest-daily
  namespace: ai-agents
  labels:
    app: phase3
spec:
  schedule: "0 18 * * *"  # 18:00 UTC diário
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: digest
              image: python:3.12-slim
              command:
                - /bin/sh
                - -c
                - "pip install -q redis && cd /scripts && exec python digest_daily.py"
              envFrom:
                - configMapRef:
                    name: phase3-env
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: data
                  mountPath: /data/agents-devs
          volumes:
            - name: scripts
              configMap:
                name: phase3-scripts
            - name: data
              emptyDir: {}
