# Variáveis de ambiente para CronJobs e consumer Slack (Fase 3).
# SLACK_WEBHOOK_URL ou SLACK_BOT_TOKEN + SLACK_ALERTS_CHANNEL_ID devem ser fornecidos via Secret em produção.
apiVersion: v1
kind: ConfigMap
metadata:
  name: phase3-env
  namespace: ai-agents
  labels:
    app: phase3
data:
  REDIS_HOST: "redis-service.ai-agents.svc.cluster.local"
  REDIS_PORT: "6379"
  DEGRADATION_REPORT_DIR: "/data/agents-devs"
  DIGEST_OUTPUT_DIR: "/data/agents-devs"
  MEMORY_MD_PATH: "/data/agents-devs/MEMORY.md"
  AREAS_QA_AUDIT_PATH: "/data/agents-devs/areas-for-qa-audit.md"
  STREAM_ORCHESTRATOR_EVENTS: "orchestrator:events"
  ORCHESTRATOR_EVENTS_SLACK_GROUP: "slack"
  ORCHESTRATOR_EVENTS_SLACK_CONSUMER: "slack-consumer"
  # Opcional: CONSENSUS_PILOT_AUTO_SUCCESS=1 para pilot marcar success automaticamente
