# CronJob: subfluxo do loop de consenso (Fase 3 — 034). Verifica KEY_CONSENSUS_IN_PROGRESS e executa pilot.
# Requer phase3-scripts e phase3-env. Opcional: Secret com SLACK_* para notificações.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: consensus-loop-runner
  namespace: ai-agents
  labels:
    app: phase3
spec:
  schedule: "*/2 * * * *"  # a cada 2 min
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: runner
              image: python:3.12-slim
              command:
                - /bin/sh
                - -c
                - "pip install -q redis && cd /scripts && exec python consensus_loop_runner.py --once"
              envFrom:
                - configMapRef:
                    name: phase3-env
                - secretRef:
                    name: phase3-slack
                    optional: true
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: data
                  mountPath: /data/agents-devs
                  readOnly: true
          volumes:
            - name: scripts
              configMap:
                name: phase3-scripts
            - name: data
              emptyDir: {}
