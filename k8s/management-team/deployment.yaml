# OpenClaw Gateway — Management Team (CEO, PO): Telegram + Ollama GPU no cluster.
# Provedor LLM por agente: ConfigMap clawdevs-llm-providers (agent_ceo, agent_po).
# Imagem: make openclaw-image (build a partir de k8s/management-team/openclaw/Dockerfile).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-management
  namespace: ai-agents
  labels:
    app: openclaw
    team: management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
      team: management
  template:
    metadata:
      labels:
        app: openclaw
        team: management
    spec:
      initContainers:
        - name: workspace-init
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /workspace && chmod -R u+rwX /workspace"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
        - name: soul-merge
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /workspace/soul && cp -L /soul-mgmt/* /workspace/soul/ 2>/dev/null; if [ -f /workspace/soul/ceo.md ]; then cp /workspace/soul/ceo.md /workspace/SOUL.md; fi; chmod -R u+rwX /workspace/soul"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: soul-management-agents
              mountPath: /soul-mgmt
              readOnly: true
      containers:
        - name: gateway
          image: openclaw-gateway:local
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"
            - name: OLLAMA_API_KEY
              value: "ollama-local"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: TELEGRAM_CHAT_ID
                  optional: true
            # Provedor LLM por agente (referência; gateway usa config no ConfigMap)
            - name: LLM_PROVIDERS_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: clawdevs-llm-providers
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
          ports:
            - containerPort: 18789
      volumes:
        - name: config
          configMap:
            name: openclaw-management-config
        - name: soul-management-agents
          configMap:
            name: soul-management-agents
            optional: true
        - name: workspace
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-management-service
  namespace: ai-agents
  labels:
    app: openclaw
    team: management
spec:
  selector:
    app: openclaw
    team: management
  ports:
    - port: 18789
      targetPort: 18789
  type: ClusterIP
