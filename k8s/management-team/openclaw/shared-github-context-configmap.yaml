apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-github-context
  namespace: ai-agents
  labels:
    team: shared
    purpose: github-context
data:
  GITHUB-CONTEXT.md: |
    # Contexto GitHub — acesso compartilhado para todos os agentes

    ## Repositório principal do projeto

    | Campo           | Valor |
    |-----------------|--------|
    | Repo principal  | `$GITHUB_REPO` (env var disponível no pod) |
    | URL             | https://github.com/$GITHUB_REPO |
    | Issues          | https://github.com/$GITHUB_REPO/issues |
    | Variável env    | `$GITHUB_REPO` = lukeware-ai/clawdevs-ai |

    **Quando o usuário mencionar "o projeto", "o repo", "as issues" sem especificar qual repositório, usar sempre `$GITHUB_REPO`.**
    Este é o repositório principal do time ClawDevs. Nunca assumir outros repositórios (ex.: openclaw/openclaw) a menos que o usuário diga explicitamente.

    ## Organização GitHub (para criar novos repos)

    | Campo        | Valor |
    |--------------|--------|
    | Slug / login | clawdevs-ai |
    | URL perfil   | https://github.com/clawdevs-ai |
    | Variável env | `$GITHUB_ORG` = clawdevs-ai |

    Novos repositórios são criados na organização `$GITHUB_ORG`. O repo principal (`$GITHUB_REPO`) fica sob a conta `lukeware-ai`.

    ## Autenticação

    | Campo        | Valor |
    |--------------|--------|
    | Login        | clawdevsai |
    | Token        | `$GITHUB_TOKEN` / `$GH_TOKEN` (já configurado como env var no pod) |
    | Permissão    | Owner — pode criar issues, repos, PRs |

    O `gh` CLI já está autenticado. Basta usar os comandos abaixo.

    ## Criar Issues

    ```bash
    gh issue create --repo $GITHUB_REPO --title "Título" --body "Descrição" --label "enhancement"
    ```

    Labels disponíveis: `bug`, `documentation`, `duplicate`, `enhancement`, `good first issue`, `help wanted`, `invalid`, `question`, `wontfix`.

    Para listar labels: `gh label list --repo $GITHUB_REPO`.

    ## Listar Issues

    ```bash
    gh issue list --repo $GITHUB_REPO --limit 10
    ```

    ## Ver uma Issue

    ```bash
    gh issue view <numero> --repo $GITHUB_REPO
    ```

    ## Criar repositório na organização

    ```bash
    gh repo create $GITHUB_ORG/<nome-repo> --private --description="..." --clone=false
    ```

    ## Clonar repositório (HTTPS com token — preferir sempre)

    ```bash
    git clone https://x-access-token:$GITHUB_TOKEN@github.com/<owner>/<repo>.git /tmp/<nome-repo> && mv /tmp/<nome-repo> /workspace/repos/<nome-repo>
    ```

    Clonar em `/tmp` primeiro e depois mover para `/workspace/repos/` evita erro 526 do 9p.

    ## Regras

    - **Repo padrão:** `$GITHUB_REPO`. Quando o usuário não especificar repositório, usar este.
    - **Sempre usar `exec`** para executar comandos `gh` ou `git`. Não basta descrever o plano — chamar a tool `exec` com o comando real.
    - **Organização:** novos repositórios são criados na organização `$GITHUB_ORG` (clawdevs-ai).
    - **Path de repos:** sempre usar `/workspace/repos/<nome-repo>` dentro do pod (aparece em `~/clawdevs-shared/repos/` no host).
  TOOLS-GITHUB-SECTION.md: |

    ---

    ## GitHub — Acesso e Issues

    O `gh` CLI está autenticado e `$GITHUB_TOKEN` / `$GH_TOKEN` estão disponíveis como variáveis de ambiente.
    Para instruções completas, leia `GITHUB-CONTEXT.md` no seu workspace.

    **Repo padrão do projeto:** `$GITHUB_REPO`. Quando o usuário não especificar repositório, usar este. Nunca assumir `openclaw/openclaw` ou outros repos.

    ### Criar Issue

    Usar a tool `exec` com o comando:

    ```
    gh issue create --repo $GITHUB_REPO --title "Título" --body "Descrição" --label "enhancement"
    ```

    Labels comuns: `bug`, `documentation`, `enhancement`, `good first issue`, `help wanted`, `question`.

    ### Listar Issues

    ```
    gh issue list --repo $GITHUB_REPO --limit 10
    ```

    ### Ver Issue

    ```
    gh issue view <numero> --repo $GITHUB_REPO
    ```

    **OBRIGATÓRIO:** Para executar qualquer comando `gh` ou `git`, DEVE usar a tool `exec` com o comando real. Não basta descrever o plano — chame `exec` com o `command`. Sem chamar exec, nada acontece.

    **NÃO EXISTE** subagente "gh-issues". Para criar issues, usar `exec` diretamente com `gh issue create`.
