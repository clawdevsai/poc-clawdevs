apiVersion: batch/v1
kind: Job
metadata:
  name: init-memory-structure
  namespace: ai-agents
  labels:
    component: init-memory
  annotations:
    description: "Inicializa estrutura de memória por domínio (decisions/projects/lessons/pending) para cada agente e a shared/memory/ cross-agent."
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        component: init-memory
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-memory
          image: bash:5.2-alpine3.19
          command: ["bash", "/scripts/init-memory.sh"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-shared-workspace-pvc
        - name: scripts
          configMap:
            name: init-memory-scripts
            defaultMode: 0755
