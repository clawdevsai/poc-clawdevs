# OpenClaw Gateway no Kubernetes: Telegram + Ollama (ollama-service no cluster).
# Imagem: build local com make openclaw-image (k8s/management-team/openclaw/Dockerfile).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: ai-agents
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw-router
      initContainers:
        - name: workspace-init
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /workspace && chmod -R u+rwX /workspace"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
        - name: soul-merge
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /workspace/soul /workspace/ceo /workspace/po /workspace/devops /workspace/architect /workspace/developer /workspace/qa /workspace/cybersec /workspace/ux /workspace/dba && cp -L /soul-mgmt/* /workspace/soul/ 2>/dev/null; cp -L /soul-dev/* /workspace/soul/ 2>/dev/null; for id in ceo po devops architect developer qa cybersec ux dba; do if [ -f /workspace/soul/$id.md ]; then cp /workspace/soul/$id.md /workspace/$id/SOUL.md; fi; done; mkdir -p /workspace/ceo/memory && cp /ceo-memory/MEMORY.md /workspace/ceo/ 2>/dev/null; cp /ceo-memory/working-buffer.md /workspace/ceo/memory/ 2>/dev/null; chmod -R u+rwX /workspace/soul /workspace/ceo /workspace/po /workspace/devops /workspace/architect /workspace/developer /workspace/qa /workspace/cybersec /workspace/ux /workspace/dba"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: soul-management-agents
              mountPath: /soul-mgmt
              readOnly: true
            - name: soul-development-agents
              mountPath: /soul-dev
              readOnly: true
            - name: workspace-ceo-configmap
              mountPath: /ceo-memory
              readOnly: true
      containers:
        - name: gateway
          image: openclaw-gateway:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: clawdevs-github-secret
                optional: true
            - configMapRef:
                name: finops-config
                optional: true
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"
            - name: OLLAMA_API_KEY
              value: "ollama-local"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: TELEGRAM_CHAT_ID
                  optional: true
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: SLACK_APP_TOKEN
                  optional: true
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: SLACK_BOT_TOKEN
                  optional: true
            - name: SLACK_DIRECTOR_USER_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: SLACK_DIRECTOR_USER_ID
                  optional: true
            - name: SLACK_ALLOWED_USER_IDS
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: SLACK_ALLOWED_USER_IDS
                  optional: true
            - name: SLACK_ALL_CLAWDEVSAI_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: SLACK_ALL_CLAWDEVSAI_CHANNEL_ID
                  optional: true
            - name: CEO_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: CEO_SLACK_APP_TOKEN
                  optional: true
            - name: CEO_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: CEO_SLACK_BOT_TOKEN
                  optional: true
            - name: PO_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: PO_SLACK_APP_TOKEN
                  optional: true
            - name: PO_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: PO_SLACK_BOT_TOKEN
                  optional: true
            - name: DEVOPS_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: DEVOPS_SLACK_APP_TOKEN
                  optional: true
            - name: DEVOPS_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: DEVOPS_SLACK_BOT_TOKEN
                  optional: true
            - name: ARCHITECT_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: ARCHITECT_SLACK_APP_TOKEN
                  optional: true
            - name: ARCHITECT_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: ARCHITECT_SLACK_BOT_TOKEN
                  optional: true
            - name: DEVELOPER_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: DEVELOPER_SLACK_APP_TOKEN
                  optional: true
            - name: DEVELOPER_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: DEVELOPER_SLACK_BOT_TOKEN
                  optional: true
            - name: QA_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: QA_SLACK_APP_TOKEN
                  optional: true
            - name: QA_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: QA_SLACK_BOT_TOKEN
                  optional: true
            - name: CYBERSEC_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: CYBERSEC_SLACK_APP_TOKEN
                  optional: true
            - name: CYBERSEC_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: CYBERSEC_SLACK_BOT_TOKEN
                  optional: true
            - name: UX_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: UX_SLACK_APP_TOKEN
                  optional: true
            - name: UX_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: UX_SLACK_BOT_TOKEN
                  optional: true
            - name: DBA_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: DBA_SLACK_APP_TOKEN
                  optional: true
            - name: DBA_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: DBA_SLACK_BOT_TOKEN
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: workspace
              mountPath: /workspace
              # Writable: OpenClaw escreve AGENTS.md etc. /workspace/soul é preenchido pelo initContainer soul-merge.
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
          ports:
            - containerPort: 18789
      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: soul-management-agents
          configMap:
            name: soul-management-agents
            optional: true
        - name: soul-development-agents
          configMap:
            name: soul-development-agents
            optional: true
        - name: workspace-ceo-configmap
          configMap:
            name: workspace-ceo-configmap
            optional: true
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-workspace-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-service
  namespace: ai-agents
  labels:
    app: openclaw
spec:
  selector:
    app: openclaw
  ports:
    - port: 18789
      targetPort: 18789
      nodePort: 30000
  type: NodePort
