# OpenClaw Gateway no Kubernetes: Telegram + Ollama (ollama-service no cluster).
# Imagem: build local com make openclaw-image (k8s/management-team/openclaw/Dockerfile).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: ai-agents
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw-router
      initContainers:
        - name: workspace-init
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /workspace /workspace/.openclaw-session-store /workspace && chmod -R u+rwX /workspace /workspace/.openclaw-session-store /workspace"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
        - name: soul-merge
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Criar workspace de cada agente
              for id in ceo po devops architect developer qa cybersec ux dba; do
                mkdir -p /workspace/$id
              done
              mkdir -p /workspace/ceo/memory

              # SOUL direto na pasta de cada agente (sem pasta soul/ centralizada)
              # Management team (CEO, PO)
              for id in ceo po; do
                [ -f /soul-mgmt/$id.md ] && cp /soul-mgmt/$id.md /workspace/$id/SOUL.md
              done
              # Development team (demais agentes)
              for id in devops architect developer qa cybersec ux dba; do
                [ -f /soul-dev/$id.md ] && cp /soul-dev/$id.md /workspace/$id/SOUL.md
              done

              # CEO bootstrap files (padrão completo)
              for f in MEMORY.md SESSION-STATE.md IDENTITY.md USER.md AGENTS.md HEARTBEAT.md TOOLS.md; do
                cp /ceo-memory/$f /workspace/ceo/ 2>/dev/null
              done
              cp /ceo-memory/working-buffer.md /workspace/ceo/memory/ 2>/dev/null

              # PO bootstrap files (padrão completo)
              for f in AGENTS.md HEARTBEAT.md IDENTITY.md MEMORY.md SESSION-STATE.md TOOLS.md USER.md SOUL.md; do
                cp /po-memory/$f /workspace/po/ 2>/dev/null
              done

              # Architect bootstrap files (padrão completo)
              for f in AGENTS.md HEARTBEAT.md IDENTITY.md MEMORY.md SESSION-STATE.md SOUL.md TOOLS.md USER.md; do
                cp /architect-memory/$f /workspace/architect/ 2>/dev/null
              done

              # Developer bootstrap files (padrão completo)
              for f in AGENTS.md HEARTBEAT.md IDENTITY.md MEMORY.md SESSION-STATE.md SOUL.md TOOLS.md USER.md; do
                cp /developer-memory/$f /workspace/developer/ 2>/dev/null
              done

              # Permissões
              for id in ceo po devops architect developer qa cybersec ux dba; do
                chmod -R u+rwX /workspace/$id
              done
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: soul-management-agents
              mountPath: /soul-mgmt
              readOnly: true
            - name: soul-development-agents
              mountPath: /soul-dev
              readOnly: true
            - name: workspace-ceo-configmap
              mountPath: /ceo-memory
              readOnly: true
            - name: workspace-po-configmap
              mountPath: /po-memory
              readOnly: true
            - name: workspace-architect-configmap
              mountPath: /architect-memory
              readOnly: true
            - name: workspace-developer-configmap
              mountPath: /developer-memory
              readOnly: true
      containers:
        - name: gateway
          image: openclaw-gateway:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: clawdevs-github-secret
                optional: true
            - configMapRef:
                name: finops-config
                optional: true
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"
            - name: OLLAMA_API_KEY
              value: "ollama-local"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: TELEGRAM_CHAT_ID
                  optional: true
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: SLACK_APP_TOKEN
                  optional: true
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: SLACK_BOT_TOKEN
                  optional: true
            - name: SLACK_DIRECTOR_USER_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: SLACK_DIRECTOR_USER_ID
                  optional: true
            - name: SLACK_ALLOWED_USER_IDS
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: SLACK_ALLOWED_USER_IDS
                  optional: true
            - name: SLACK_ALL_CLAWDEVSAI_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: SLACK_ALL_CLAWDEVSAI_CHANNEL_ID
                  optional: true
            - name: CEO_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: CEO_SLACK_APP_TOKEN
                  optional: true
            - name: CEO_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: CEO_SLACK_BOT_TOKEN
                  optional: true
            - name: PO_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: PO_SLACK_APP_TOKEN
                  optional: true
            - name: PO_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: PO_SLACK_BOT_TOKEN
                  optional: true
            - name: DEVOPS_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: DEVOPS_SLACK_APP_TOKEN
                  optional: true
            - name: DEVOPS_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: DEVOPS_SLACK_BOT_TOKEN
                  optional: true
            - name: ARCHITECT_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: ARCHITECT_SLACK_APP_TOKEN
                  optional: true
            - name: ARCHITECT_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: ARCHITECT_SLACK_BOT_TOKEN
                  optional: true
            - name: DEVELOPER_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: DEVELOPER_SLACK_APP_TOKEN
                  optional: true
            - name: DEVELOPER_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: DEVELOPER_SLACK_BOT_TOKEN
                  optional: true
            - name: QA_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: QA_SLACK_APP_TOKEN
                  optional: true
            - name: QA_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: QA_SLACK_BOT_TOKEN
                  optional: true
            - name: CYBERSEC_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: CYBERSEC_SLACK_APP_TOKEN
                  optional: true
            - name: CYBERSEC_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: CYBERSEC_SLACK_BOT_TOKEN
                  optional: true
            - name: UX_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: UX_SLACK_APP_TOKEN
                  optional: true
            - name: UX_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: UX_SLACK_BOT_TOKEN
                  optional: true
            - name: DBA_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: DBA_SLACK_APP_TOKEN
                  optional: true
            - name: DBA_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-telegram
                  key: DBA_SLACK_BOT_TOKEN
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: workspace
              mountPath: /workspace
              # Writable: OpenClaw + initContainer soul-merge. SOUL.md direto em /workspace/$id/.
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
          ports:
            - containerPort: 18789
      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: soul-management-agents
          configMap:
            name: soul-management-agents
            optional: true
        - name: soul-development-agents
          configMap:
            name: soul-development-agents
            optional: true
        - name: workspace-ceo-configmap
          configMap:
            name: workspace-ceo-configmap
            optional: true
        - name: workspace-po-configmap
          configMap:
            name: workspace-po-configmap
            optional: true
        - name: workspace-architect-configmap
          configMap:
            name: workspace-architect-configmap
            optional: true
        - name: workspace-developer-configmap
          configMap:
            name: workspace-developer-configmap
            optional: true
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-shared-workspace-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-service
  namespace: ai-agents
  labels:
    app: openclaw
spec:
  selector:
    app: openclaw
  ports:
    - port: 18789
      targetPort: 18789
      nodePort: 30000
  type: NodePort
