# PVC que usa o PV do host (minikube mount). Bind explícito ao openclaw-shared-workspace-pv.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-shared-workspace-pvc
  namespace: ai-agents
  labels:
    app: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeName: openclaw-shared-workspace-pv
  storageClassName: ""
