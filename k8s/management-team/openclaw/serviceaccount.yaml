# Fase 2 — 025: Service account dedicada ao roteador OpenClaw com privilégios zerados.
# Nenhum Role/ClusterRole vinculado: o pod não tem permissões de API além do padrão do namespace.
# Reduz janela de impacto em caso de RCE ou exfiltração.
# Ref: docs/issues/025-rotacao-tokens-sandbox-roteador.md, docs/05-seguranca-e-etica.md
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-router
  namespace: ai-agents
  labels:
    app: openclaw
    phase: "2"
