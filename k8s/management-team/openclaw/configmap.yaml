# Configuração OpenClaw v2026.3.2 — formato oficial dos docs.
# Slack: multi-account (1 app por agente); tokens injetados pelo entrypoint via Secret.
# Telegram: CEO apenas; chat ID injetado pelo entrypoint via Secret.
# tools.profile: global = messaging (restrito). CEO: profile=messaging + exec.security=deny.
# Demais agentes (po, devops, architect, ...): profile=full (inclui exec, fs, web) + exec host=gateway, security=full, ask=off.
# Ref: https://docs.openclaw.ai/channels/slack, https://docs.openclaw.ai/tools/exec-approvals
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: ai-agents
data:
  openclaw.json: |
    {
      "plugins": {
        "entries": {
          "device-pair": {
            "config": {
              "publicUrl": "http://192.168.49.2:30000"
            }
          }
        }
      },
      "gateway": { 
        "mode": "local", 
        "port": 18789, 
        "bind": "lan",
        "auth": {
          "mode": "token",
          "token": "__OPENCLAW_AUTH_TOKEN__"
        },
        "controlUi": { 
          "enabled": true,
          "allowInsecureAuth": false,
          "dangerouslyAllowHostHeaderOriginFallback": false,
          "dangerouslyDisableDeviceAuth": false,
          "allowedOrigins": ["http://192.168.49.2:30000"]
        } 
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "allowlist",
          "allowFrom": ["__TELEGRAM_CHAT_ID__"],
          "streaming": "partial",
          "groups": {}
        },
        "slack": {
          "enabled": __SLACK_ENABLED__,
          "mode": "socket",
          "dmPolicy": "open",
          "allowFrom": ["*"],
          "dm": { "enabled": true, "groupEnabled": true },
          "groupPolicy": "open",
          "streaming": "partial",
          "ackReaction": "eyes",
          "channels": {
            "__SLACK_ALL_CLAWDEVSAI_CHANNEL_ID__": {}
          },
          "accounts": {
            "__SLACK_ACCOUNTS_JSON__": true
          }
        }
      },
      "models": {
        "providers": {
          "ollama": {
            "baseUrl": "http://ollama-service.ai-agents.svc.cluster.local:11434",
            "api": "ollama",
            "apiKey": "__OLLAMA_API_KEY__",
            "models": [
              { "id": "qwen3-next:80b-cloud", "name": "Qwen3 Next 80B Cloud", "contextWindow": 128000, "maxTokens": 8192 },
              { "id": "qwen3-coder:480b-cloud", "name": "Qwen3 Coder 480B Cloud", "contextWindow": 128000, "maxTokens": 8192 },
              { "id": "qwen3-coder-next:cloud", "name": "Qwen3 Coder Next Cloud", "contextWindow": 128000, "maxTokens": 8192 },
              { "id": "devstral-2:123b-cloud", "name": "Devstral 2 123B Cloud", "contextWindow": 128000, "maxTokens": 8192 },
              { "id": "nemotron-3-nano:30b-cloud", "name": "Nemotron 3 Nano 30B Cloud", "contextWindow": 128000, "maxTokens": 4096 },
              { "id": "gpt-oss:120b-cloud", "name": "GPT OSS 120B Cloud", "contextWindow": 128000, "maxTokens": 8192 },
              { "id": "deepseek-v3.1:671b-cloud", "name": "DeepSeek V3.1 671B Cloud", "contextWindow": 128000, "maxTokens": 8192 },
              { "id": "qwen3.5:397b-cloud", "name": "Qwen 3.5 397B Cloud", "contextWindow": 128000, "maxTokens": 8192 },
              { "id": "ministral-3:14b-cloud", "name": "Ministral 3 14B Cloud", "contextWindow": 128000, "maxTokens": 2048 },
              { "id": "deepseek-r1:8b", "name": "DeepSeek R1 8B", "contextWindow": 128000, "maxTokens": 4096 }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": { "primary": "ollama/qwen3-next:80b-cloud" },
          "workspace": "/workspace/ceo",
          "memorySearch": {
            "sources": ["memory", "sessions"],
            "query": {
              "hybrid": { "enabled": true, "vectorWeight": 0.5, "textWeight": 0.5 }
            }
          },
          "subagents": {
            "maxSpawnDepth": 2,
            "maxConcurrent": 4,
            "runTimeoutSeconds": 600,
            "model": "ollama/qwen3-next:80b-cloud"
          }
        },
        "list": [
          {
            "id": "ceo", "name": "Rafael",
            "model": "ollama/qwen3-next:80b-cloud",
            "workspace": "/workspace/ceo",
            "tools": {
              "profile": "full",
              "deny": ["write", "edit", "apply_patch", "browser", "canvas", "nodes", "cron", "gateway"],
              "exec": { "security": "deny" }
            },
            "subagents": { "allowAgents": ["*"] }
          },
          { "id": "po", "name": "Marina", "model": "ollama/qwen3-next:80b-cloud", "workspace": "/workspace/po", "tools": { "profile": "full", "exec": { "host": "gateway", "security": "full", "ask": "off" } }, "subagents": { "allowAgents": ["*"] } },
          { "id": "devops", "name": "Sérgio", "model": "ollama/devstral-2:123b-cloud", "workspace": "/workspace/devops", "tools": { "profile": "full", "exec": { "host": "gateway", "security": "full", "ask": "off" } }, "subagents": { "allowAgents": ["*"] } },
          { "id": "architect", "name": "Vera", "model": "ollama/devstral-2:123b-cloud", "workspace": "/workspace/architect", "tools": { "profile": "full", "exec": { "host": "gateway", "security": "full", "ask": "off" } }, "subagents": { "allowAgents": ["*"] } },
          { "id": "developer", "name": "Leo", "model": "ollama/qwen3-coder:480b-cloud", "workspace": "/workspace/developer", "tools": { "profile": "full", "exec": { "host": "gateway", "security": "full", "ask": "off" } }, "subagents": { "allowAgents": ["*"] } },
          { "id": "qa", "name": "Renata", "model": "ollama/qwen3-coder-next:cloud", "workspace": "/workspace/qa", "tools": { "profile": "full", "exec": { "host": "gateway", "security": "full", "ask": "off" } }, "subagents": { "allowAgents": ["*"] } },
          { "id": "cybersec", "name": "Jade", "model": "ollama/qwen3-next:80b-cloud", "workspace": "/workspace/cybersec", "tools": { "profile": "full", "exec": { "host": "gateway", "security": "full", "ask": "off" } }, "subagents": { "allowAgents": ["*"] } },
          { "id": "ux", "name": "Luna", "model": "ollama/qwen3-next:80b-cloud", "workspace": "/workspace/ux", "tools": { "profile": "full", "exec": { "host": "gateway", "security": "full", "ask": "off" } }, "subagents": { "allowAgents": ["*"] } },
          { "id": "dba", "name": "Dante", "model": "ollama/qwen3-coder-next:cloud", "workspace": "/workspace/dba", "tools": { "profile": "full", "exec": { "host": "gateway", "security": "full", "ask": "off" } }, "subagents": { "allowAgents": ["*"] } }
        ]
      },
      "tools": {
        "profile": "messaging",
        "allow": ["sessions_spawn", "exec", "group:fs", "group:web"],
        "exec": {
          "host": "gateway",
          "security": "full",
          "ask": "off"
        },
        "subagents": {
          "tools": {
            "deny": ["gateway", "cron"]
          }
        }
      },
      "session": {
        "dmScope": "per-account-channel-peer",
        "store": "/workspace/.openclaw-session-store/{agentId}/sessions/sessions.json"
      },
      "bindings": [
        { "match": { "channel": "telegram" }, "agentId": "ceo" },
        { "match": { "channel": "slack", "accountId": "ceo" }, "agentId": "ceo" },
        { "match": { "channel": "slack", "accountId": "po" }, "agentId": "po" },
        { "match": { "channel": "slack", "accountId": "devops" }, "agentId": "devops" },
        { "match": { "channel": "slack", "accountId": "architect" }, "agentId": "architect" },
        { "match": { "channel": "slack", "accountId": "developer" }, "agentId": "developer" },
        { "match": { "channel": "slack", "accountId": "qa" }, "agentId": "qa" },
        { "match": { "channel": "slack", "accountId": "cybersec" }, "agentId": "cybersec" },
        { "match": { "channel": "slack", "accountId": "ux" }, "agentId": "ux" },
        { "match": { "channel": "slack", "accountId": "dba" }, "agentId": "dba" },
        { "match": { "channel": "slack", "peer": { "id": "ceo", "kind": "dm" } }, "agentId": "ceo" },
        { "match": { "channel": "slack", "peer": { "id": "po", "kind": "dm" } }, "agentId": "po" },
        { "match": { "channel": "slack", "peer": { "id": "devops", "kind": "dm" } }, "agentId": "devops" },
        { "match": { "channel": "slack", "peer": { "id": "architect", "kind": "dm" } }, "agentId": "architect" },
        { "match": { "channel": "slack", "peer": { "id": "developer", "kind": "dm" } }, "agentId": "developer" },
        { "match": { "channel": "slack", "peer": { "id": "qa", "kind": "dm" } }, "agentId": "qa" },
        { "match": { "channel": "slack", "peer": { "id": "cybersec", "kind": "dm" } }, "agentId": "cybersec" },
        { "match": { "channel": "slack", "peer": { "id": "ux", "kind": "dm" } }, "agentId": "ux" },
        { "match": { "channel": "slack", "peer": { "id": "dba", "kind": "dm" } }, "agentId": "dba" }
      ]
    }
