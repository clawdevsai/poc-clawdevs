# Configuração OpenClaw v2026.3.2 (sem credenciais). Token e Chat ID vêm do Secret.
# Padrão: Slack = todos os agentes (DM e canais). Telegram = apenas CEO (Diretor ↔ CEO). Workspace por agente.
# Sub-agents: CEO pode spawnar PO, DevOps, Architect, etc. via sessions_spawn.
# Integração padrão: Ollama GPU no cluster (ollama_local). Provedor por agente: k8s/llm-providers-configmap.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: ai-agents
data:
  openclaw.json: |
    {
      "gateway": { "mode": "local", "port": 18789, "bind": "lan", "controlUi": { "dangerouslyAllowHostHeaderOriginFallback": true } },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "allowlist",
          "allowFrom": ["__TELEGRAM_CHAT_ID__"],
          "streaming": "partial",
          "groups": {}
        },
        "slack": {
          "enabled": false,
          "mode": "socket",
          "accounts": {
            "default": {
              "dmPolicy": "allowlist",
              "allowFrom": [__SLACK_ALLOW_FROM_JSON__],
              "dm": { "enabled": true, "groupEnabled": false },
              "groupPolicy": "allowlist",
              "channels": {
                "__SLACK_ALL_CLAWDEVSAI_CHANNEL_ID__": {}
              }
            }
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "ollama": {
            "baseUrl": "http://ollama-service.ai-agents.svc.cluster.local:11434",
            "apiKey": "ollama-local",
            "api": "ollama",
            "models": [
              { "id": "qwen2.5:3b", "name": "Qwen 2.5 3B (local, padrão)", "contextWindow": 32000, "maxTokens": 4096 },
              { "id": "ministral-3:3b", "name": "Ministral 3 3B (local)", "contextWindow": 32000, "maxTokens": 4096 },
              { "id": "stewyphoenix19/phi3-mini_v1:latest", "name": "Phi3 Mini v1 (local, leve)", "contextWindow": 16000, "maxTokens": 1024 },
              { "id": "glm-5:cloud", "name": "GLM-5 Cloud (requer Ollama Cloud auth)", "contextWindow": 32000, "maxTokens": 4096 },
              { "id": "ministral-3:3b-cloud", "name": "Ministral 3 3B Cloud (requer Ollama Cloud auth)", "contextWindow": 32000, "maxTokens": 4096 }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": "ollama/qwen2.5:3b",
          "workspace": "/workspace/ceo",
          "subagents": {
            "maxSpawnDepth": 2,
            "maxConcurrent": 4,
            "runTimeoutSeconds": 600,
            "model": "ollama/qwen2.5:3b"
          }
        },
        "list": [
          { "id": "ceo", "name": "CEO", "model": "ollama/qwen2.5:3b", "workspace": "/workspace/ceo" },
          { "id": "po", "name": "Product Owner", "model": "ollama/qwen2.5:3b", "workspace": "/workspace/po" },
          { "id": "devops", "name": "DevOps/SRE", "model": "ollama/qwen2.5:3b", "workspace": "/workspace/devops" },
          { "id": "architect", "name": "Architect", "model": "ollama/qwen2.5:3b", "workspace": "/workspace/architect" },
          { "id": "developer", "name": "Developer", "model": "ollama/qwen2.5:3b", "workspace": "/workspace/developer" },
          { "id": "qa", "name": "QA", "model": "ollama/qwen2.5:3b", "workspace": "/workspace/qa" },
          { "id": "cybersec", "name": "CyberSec", "model": "ollama/qwen2.5:3b", "workspace": "/workspace/cybersec" },
          { "id": "ux", "name": "UX", "model": "ollama/qwen2.5:3b", "workspace": "/workspace/ux" },
          { "id": "dba", "name": "DBA", "model": "ollama/qwen2.5:3b", "workspace": "/workspace/dba" }
        ]
      },
      "tools": {
        "profile": "messaging",
        "subagents": {
          "tools": {
            "deny": ["gateway", "cron"]
          }
        }
      },
      "bindings": [
        { "match": { "channel": "telegram" }, "agentId": "ceo" },
        { "match": { "channel": "slack", "accountId": "ceo" }, "agentId": "ceo" },
        { "match": { "channel": "slack", "accountId": "po" }, "agentId": "po" },
        { "match": { "channel": "slack", "accountId": "devops" }, "agentId": "devops" },
        { "match": { "channel": "slack", "accountId": "architect" }, "agentId": "architect" },
        { "match": { "channel": "slack", "accountId": "developer" }, "agentId": "developer" },
        { "match": { "channel": "slack", "accountId": "qa" }, "agentId": "qa" },
        { "match": { "channel": "slack", "accountId": "cybersec" }, "agentId": "cybersec" },
        { "match": { "channel": "slack", "accountId": "ux" }, "agentId": "ux" },
        { "match": { "channel": "slack", "accountId": "dba" }, "agentId": "dba" }
      ]
    }
