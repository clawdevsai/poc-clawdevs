# Configuração OpenClaw v2026.3.2 — formato oficial dos docs.
# Slack: multi-account (1 app por agente); tokens injetados pelo entrypoint via Secret.
# Telegram: CEO apenas; chat ID injetado pelo entrypoint via Secret.
# Ref: https://docs.openclaw.ai/channels/slack
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: ai-agents
data:
  openclaw.json: |
    {
      "plugins": {
        "entries": {
          "device-pair": {
            "config": {
              "publicUrl": "http://192.168.49.2:30000"
            }
          }
        }
      },
      "gateway": { 
        "mode": "local", 
        "port": 18789, 
        "bind": "lan",
        "auth": {
          "mode": "token",
          "token": "__OPENCLAW_AUTH_TOKEN__"
        },
        "controlUi": { 
          "enabled": true,
          "allowInsecureAuth": false,
          "dangerouslyAllowHostHeaderOriginFallback": false,
          "dangerouslyDisableDeviceAuth": false,
          "allowedOrigins": ["http://192.168.49.2:30000"]
        } 
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "allowlist",
          "allowFrom": ["__TELEGRAM_CHAT_ID__"],
          "streaming": "partial",
          "groups": {}
        },
        "slack": {
          "enabled": __SLACK_ENABLED__,
          "mode": "socket",
          "dmPolicy": "open",
          "allowFrom": ["*"],
          "dm": { "enabled": true, "groupEnabled": true },
          "groupPolicy": "open",
          "channels": {
            "__SLACK_ALL_CLAWDEVSAI_CHANNEL_ID__": {}
          },
          "accounts": {
            "__SLACK_ACCOUNTS_JSON__": true
          }
        }
      },
      "models": {
        "providers": {
          "ollama": {
            "baseUrl": "http://ollama-service.ai-agents.svc.cluster.local:11434",
            "api": "ollama",
            "apiKey": "__OLLAMA_API_KEY__",
            "models": [
              { "id": "glm-5:cloud", "name": "GLM-5 Cloud", "contextWindow": 128000, "maxTokens": 4096 },
              { "id": "stewyphoenix19/phi3-mini_v1:latest", "name": "Phi-3 Mini", "contextWindow": 4000, "maxTokens": 1024 }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": "ollama/glm-5:cloud",
          "workspace": "/workspace/ceo",
          "subagents": {
            "maxSpawnDepth": 2,
            "maxConcurrent": 4,
            "runTimeoutSeconds": 600,
            "model": "ollama/glm-5:cloud"
          }
        },
        "list": [
          { "id": "ceo", "name": "CEO", "model": "ollama/glm-5:cloud", "workspace": "/workspace/ceo" },
          { "id": "po", "name": "Product Owner", "model": "ollama/glm-5:cloud", "workspace": "/workspace/po" },
          { "id": "devops", "name": "DevOps/SRE", "model": "ollama/glm-5:cloud", "workspace": "/workspace/devops" },
          { "id": "architect", "name": "Architect", "model": "ollama/glm-5:cloud", "workspace": "/workspace/architect" },
          { "id": "developer", "name": "Developer", "model": "ollama/glm-5:cloud", "workspace": "/workspace/developer" },
          { "id": "qa", "name": "QA", "model": "ollama/glm-5:cloud", "workspace": "/workspace/qa" },
          { "id": "cybersec", "name": "CyberSec", "model": "ollama/glm-5:cloud", "workspace": "/workspace/cybersec" },
          { "id": "ux", "name": "UX", "model": "ollama/glm-5:cloud", "workspace": "/workspace/ux" },
          { "id": "dba", "name": "DBA", "model": "ollama/glm-5:cloud", "workspace": "/workspace/dba" }
        ]
      },
      "tools": {
        "profile": "messaging",
        "allow": ["sessions_spawn", "exec", "group:fs", "group:web"],
        "subagents": {
          "tools": {
            "deny": ["gateway", "cron"]
          }
        }
      },
      "session": {
        "dmScope": "per-account-channel-peer",
        "store": "/workspace/.openclaw-session-store/{agentId}/sessions/sessions.json"
      },
      "memorySearch": {
        "sources": ["memory", "sessions"],
        "query": {
          "hybrid": {
            "enabled": true,
            "vectorWeight": 0.5,
            "textWeight": 0.5
          }
        }
      },
      "contextPruning": {
        "mode": "cache-ttl",
        "ttl": "6h",
        "keepLastAssistants": 3
      },
      "compaction": {
        "mode": "default",
        "reserveTokensFloor": 30000,
        "memoryFlush": {
          "enabled": true,
          "softThresholdTokens": 40000,
          "prompt": "Before this context is compacted, extract and save all important information to memory files. Focus on:\n1. DECISIONS made (what was decided, why, by whom)\n2. STATE CHANGES (what was configured, deployed, or installed)\n3. LESSONS LEARNED (what worked, what didn't, insights)\n4. BLOCKERS or pending items waiting for input\n5. Key facts about projects, systems, people, or tasks discussed\nWrite to /workspace/{agentId}/memory/ using these files: decisions.md, projects.md, people.md, lessons.md, pending.md. If the information is strategic or cross-team (architecture decisions, product strategy, incidents), also write to /workspace/shared/memory/ as appropriate. Do not skip — context lost after compaction is permanent."
        }
      },
      "bindings": [
        { "match": { "channel": "telegram" }, "agentId": "ceo" },
        { "match": { "channel": "slack", "accountId": "ceo" }, "agentId": "ceo" },
        { "match": { "channel": "slack", "accountId": "po" }, "agentId": "po" },
        { "match": { "channel": "slack", "accountId": "devops" }, "agentId": "devops" },
        { "match": { "channel": "slack", "accountId": "architect" }, "agentId": "architect" },
        { "match": { "channel": "slack", "accountId": "developer" }, "agentId": "developer" },
        { "match": { "channel": "slack", "accountId": "qa" }, "agentId": "qa" },
        { "match": { "channel": "slack", "accountId": "cybersec" }, "agentId": "cybersec" },
        { "match": { "channel": "slack", "accountId": "ux" }, "agentId": "ux" },
        { "match": { "channel": "slack", "accountId": "dba" }, "agentId": "dba" },
        { "match": { "channel": "slack", "peer": { "id": "ceo", "kind": "dm" } }, "agentId": "ceo" },
        { "match": { "channel": "slack", "peer": { "id": "po", "kind": "dm" } }, "agentId": "po" },
        { "match": { "channel": "slack", "peer": { "id": "devops", "kind": "dm" } }, "agentId": "devops" },
        { "match": { "channel": "slack", "peer": { "id": "architect", "kind": "dm" } }, "agentId": "architect" },
        { "match": { "channel": "slack", "peer": { "id": "developer", "kind": "dm" } }, "agentId": "developer" },
        { "match": { "channel": "slack", "peer": { "id": "qa", "kind": "dm" } }, "agentId": "qa" },
        { "match": { "channel": "slack", "peer": { "id": "cybersec", "kind": "dm" } }, "agentId": "cybersec" },
        { "match": { "channel": "slack", "peer": { "id": "ux", "kind": "dm" } }, "agentId": "ux" },
        { "match": { "channel": "slack", "peer": { "id": "dba", "kind": "dm" } }, "agentId": "dba" }
      ]
    }
