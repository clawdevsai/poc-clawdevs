# Configuração OpenClaw v2026.3.2 — formato oficial dos docs.
# Slack: multi-account (1 app por agente); tokens injetados pelo entrypoint via Secret.
# Telegram: CEO apenas; chat ID injetado pelo entrypoint via Secret.
# tools.exec: global = gateway, full, ask off. CEO tem override em list: tools.exec.security = deny.
# Demais agentes (po, devops, architect, ...): override em list com host=gateway, security=full, ask=off.
# Ref: https://docs.openclaw.ai/channels/slack, https://docs.openclaw.ai/tools/exec-approvals
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: ai-agents
data:
  openclaw.json: |
    {
      "plugins": {
        "entries": {
          "device-pair": {
            "config": {
              "publicUrl": "http://192.168.49.2:30000"
            }
          }
        }
      },
      "gateway": { 
        "mode": "local", 
        "port": 18789, 
        "bind": "lan",
        "auth": {
          "mode": "token",
          "token": "__OPENCLAW_AUTH_TOKEN__"
        },
        "controlUi": { 
          "enabled": true,
          "allowInsecureAuth": false,
          "dangerouslyAllowHostHeaderOriginFallback": false,
          "dangerouslyDisableDeviceAuth": false,
          "allowedOrigins": ["http://192.168.49.2:30000"]
        } 
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "allowlist",
          "allowFrom": ["__TELEGRAM_CHAT_ID__"],
          "streaming": "partial",
          "groups": {}
        },
        "slack": {
          "enabled": __SLACK_ENABLED__,
          "mode": "socket",
          "dmPolicy": "open",
          "allowFrom": ["*"],
          "dm": { "enabled": true, "groupEnabled": true },
          "groupPolicy": "open",
          "streaming": "partial",
          "ackReaction": "eyes",
          "channels": {
            "__SLACK_ALL_CLAWDEVSAI_CHANNEL_ID__": {}
          },
          "accounts": {
            "__SLACK_ACCOUNTS_JSON__": true
          }
        }
      },
      "models": {
        "providers": {
          "ollama": {
            "baseUrl": "http://ollama-service.ai-agents.svc.cluster.local:11434",
            "api": "ollama",
            "apiKey": "__OLLAMA_API_KEY__",
            "models": [
              { "id": "ministral-3:14b-cloud", "name": "Ministral 3 14B Cloud", "contextWindow": 128000, "maxTokens": 2048 },
              { "id": "stewyphoenix19/phi3-mini_v1:latest", "name": "Phi-3 Mini", "contextWindow": 4000, "maxTokens": 1024 },
              { "id": "qwen3.5:cloud", "name": "Qwen 3.5 Cloud", "contextWindow": 128000, "maxTokens": 8192 },
              { "id": "glm-5:cloud", "name": "GLM-5 Cloud", "contextWindow": 128000, "maxTokens": 4096 }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": { "primary": "ollama/ministral-3:14b-cloud" },
          "workspace": "/workspace/ceo",
          "memorySearch": {
            "sources": ["memory", "sessions"],
            "query": {
              "hybrid": { "enabled": true, "vectorWeight": 0.5, "textWeight": 0.5 }
            }
          },
          "subagents": {
            "maxSpawnDepth": 2,
            "maxConcurrent": 4,
            "runTimeoutSeconds": 600,
            "model": "ollama/ministral-3:14b-cloud"
          }
        },
        "list": [
          { "id": "ceo", "name": "Rafael", "model": "ollama/ministral-3:14b-cloud", "workspace": "/workspace/ceo", "tools": { "exec": { "security": "deny" } } },
          { "id": "po", "name": "Marina", "model": "ollama/ministral-3:14b-cloud", "workspace": "/workspace/po", "tools": { "exec": { "host": "gateway", "security": "full", "ask": "off" } } },
          { "id": "devops", "name": "Sérgio", "model": "ollama/ministral-3:14b-cloud", "workspace": "/workspace/devops", "tools": { "exec": { "host": "gateway", "security": "full", "ask": "off" } } },
          { "id": "architect", "name": "Vera", "model": "ollama/ministral-3:14b-cloud", "workspace": "/workspace/architect", "tools": { "exec": { "host": "gateway", "security": "full", "ask": "off" } } },
          { "id": "developer", "name": "Leo", "model": "ollama/ministral-3:14b-cloud", "workspace": "/workspace/developer", "tools": { "exec": { "host": "gateway", "security": "full", "ask": "off" } } },
          { "id": "qa", "name": "Renata", "model": "ollama/ministral-3:14b-cloud", "workspace": "/workspace/qa", "tools": { "exec": { "host": "gateway", "security": "full", "ask": "off" } } },
          { "id": "cybersec", "name": "Jade", "model": "ollama/ministral-3:14b-cloud", "workspace": "/workspace/cybersec", "tools": { "exec": { "host": "gateway", "security": "full", "ask": "off" } } },
          { "id": "ux", "name": "Luna", "model": "ollama/ministral-3:14b-cloud", "workspace": "/workspace/ux", "tools": { "exec": { "host": "gateway", "security": "full", "ask": "off" } } },
          { "id": "dba", "name": "Dante", "model": "ollama/ministral-3:14b-cloud", "workspace": "/workspace/dba", "tools": { "exec": { "host": "gateway", "security": "full", "ask": "off" } } }
        ]
      },
      "tools": {
        "profile": "messaging",
        "allow": ["sessions_spawn", "exec", "group:fs", "group:web"],
        "exec": {
          "host": "gateway",
          "security": "full",
          "ask": "off"
        },
        "subagents": {
          "tools": {
            "deny": ["gateway", "cron"]
          }
        }
      },
      "session": {
        "dmScope": "per-account-channel-peer",
        "store": "/workspace/.openclaw-session-store/{agentId}/sessions/sessions.json"
      },
      "bindings": [
        { "match": { "channel": "telegram" }, "agentId": "ceo" },
        { "match": { "channel": "slack", "accountId": "ceo" }, "agentId": "ceo" },
        { "match": { "channel": "slack", "accountId": "po" }, "agentId": "po" },
        { "match": { "channel": "slack", "accountId": "devops" }, "agentId": "devops" },
        { "match": { "channel": "slack", "accountId": "architect" }, "agentId": "architect" },
        { "match": { "channel": "slack", "accountId": "developer" }, "agentId": "developer" },
        { "match": { "channel": "slack", "accountId": "qa" }, "agentId": "qa" },
        { "match": { "channel": "slack", "accountId": "cybersec" }, "agentId": "cybersec" },
        { "match": { "channel": "slack", "accountId": "ux" }, "agentId": "ux" },
        { "match": { "channel": "slack", "accountId": "dba" }, "agentId": "dba" },
        { "match": { "channel": "slack", "peer": { "id": "ceo", "kind": "dm" } }, "agentId": "ceo" },
        { "match": { "channel": "slack", "peer": { "id": "po", "kind": "dm" } }, "agentId": "po" },
        { "match": { "channel": "slack", "peer": { "id": "devops", "kind": "dm" } }, "agentId": "devops" },
        { "match": { "channel": "slack", "peer": { "id": "architect", "kind": "dm" } }, "agentId": "architect" },
        { "match": { "channel": "slack", "peer": { "id": "developer", "kind": "dm" } }, "agentId": "developer" },
        { "match": { "channel": "slack", "peer": { "id": "qa", "kind": "dm" } }, "agentId": "qa" },
        { "match": { "channel": "slack", "peer": { "id": "cybersec", "kind": "dm" } }, "agentId": "cybersec" },
        { "match": { "channel": "slack", "peer": { "id": "ux", "kind": "dm" } }, "agentId": "ux" },
        { "match": { "channel": "slack", "peer": { "id": "dba", "kind": "dm" } }, "agentId": "dba" }
      ]
    }
