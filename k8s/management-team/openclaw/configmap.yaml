# Configuração OpenClaw (sem credenciais). Token e Chat ID vêm do Secret.
# Telegram: só CEO. Slack: todos os agentes. Todos compartilham o mesmo workspace /workspace.
# Discussões entre agentes no Slack: Ollama local GPU obrigatório.
# Integração padrão: Ollama GPU no cluster (ollama_local). Provedor por agente: k8s/llm-providers-configmap.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: ai-agents
data:
  openclaw.json: |
    {
      "gateway": { "mode": "local", "port": 18789, "bind": "lan", "controlUi": { "dangerouslyAllowHostHeaderOriginFallback": true } },
      "channels": {
        "telegram": {
          "enabled": true,
          "dmPolicy": "allowlist",
          "allowFrom": ["__TELEGRAM_CHAT_ID__"],
          "groups": {}
        },
        "slack": {
          "enabled": false,
          "mode": "socket",
          "dmPolicy": "allowlist",
          "allowFrom": [__SLACK_ALLOW_FROM_JSON__],
          "dm": { "enabled": true, "groupEnabled": false }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "ollama": {
            "baseUrl": "http://ollama-service.ai-agents.svc.cluster.local:11434/v1",
            "apiKey": "ollama-local",
            "api": "openai-completions",
            "models": [
              { "id": "glm-5:cloud", "name": "GLM-5 Cloud (padrão Ollama)", "contextWindow": 32000, "maxTokens": 4096 },
              { "id": "stewyphoenix19/phi3-mini_v1:latest", "name": "Phi3 Mini v1", "contextWindow": 16000, "maxTokens": 1024 },
              { "id": "ministral-3:3b", "name": "Ministral 3 3B", "contextWindow": 32000, "maxTokens": 4096 }
            ]
          }
        }
      },
      "agents": {
        "defaults": { "model": "ollama/ministral-3:3b-cloud", "workspace": "/workspace" },
        "list": [
          { "id": "ceo", "name": "CEO", "model": "ollama/ministral-3:3b-cloud", "workspace": "/workspace" },
          { "id": "po", "name": "Product Owner", "model": "ollama/glm-5:cloud", "workspace": "/workspace" },
          { "id": "devops", "name": "DevOps/SRE", "model": "ollama/glm-5:cloud", "workspace": "/workspace" },
          { "id": "architect", "name": "Architect", "model": "ollama/glm-5:cloud", "workspace": "/workspace" },
          { "id": "developer", "name": "Developer", "model": "ollama/glm-5:cloud", "workspace": "/workspace" },
          { "id": "qa", "name": "QA", "model": "ollama/glm-5:cloud", "workspace": "/workspace" },
          { "id": "cybersec", "name": "CyberSec", "model": "ollama/glm-5:cloud", "workspace": "/workspace" },
          { "id": "ux", "name": "UX", "model": "ollama/glm-5:cloud", "workspace": "/workspace" },
          { "id": "dba", "name": "DBA", "model": "ollama/glm-5:cloud", "workspace": "/workspace" }
        ]
      }
    }
  config.yaml: |
    # Ollama GPU no cluster (padrão). Provedor por agente: k8s/llm-providers-configmap.yaml.
    # Opções: ollama_local | ollama_cloud | openrouter | qwen_oauth | moonshot_ai | openai | huggingface_inference.
    models:
      providers:
        ollama:
          baseURL: "http://ollama-service.ai-agents.svc.cluster.local:11434"
          models:
            - id: "ollama/glm-5:cloud"
              label: "GLM-5 Cloud (padrão)"
            - id: "ollama/stewyphoenix19/phi3-mini_v1:latest"
              label: "Phi3 Mini v1 (local)"
            - id: "ollama/ministral-3:3b"
              label: "Ministral 3 3B (local, com tools)"

    agents:
      defaults:
        model: "ollama/glm-5:cloud"
        subagents:
          maxSpawnDepth: 2
          maxChildrenPerAgent: 5
          maxConcurrent: 4
          runTimeoutSeconds: 600
          model: "ollama/glm-5:cloud"

      list:
        - id: ceo
          name: "CEO"
          description: "Estratégia e interface com o Diretor. Único que recebe Telegram; no Slack participa com os demais."
          model: "ollama/ministral-3:3b-cloud"
        - id: po
          name: "Product Owner"
          description: "Backlog e priorização. Sub-agent do CEO."
          model: "ollama/glm-5:cloud"
        - id: devops
          name: "DevOps/SRE"
          description: "IaC, CI/CD, FinOps. Sub-agent. Padrão Ollama GPU."
          model: "ollama/glm-5:cloud"
        - id: architect
          name: "Architect"
          description: "Governança técnica, code review. Sub-agent. Padrão Ollama GPU."
          model: "ollama/glm-5:cloud"
        - id: developer
          name: "Developer"
          description: "Implementação. Sub-agent. Padrão Ollama GPU."
          model: "ollama/glm-5:cloud"
        - id: qa
          name: "QA"
          description: "Testes e qualidade. Sub-agent. Padrão Ollama GPU."
          model: "ollama/glm-5:cloud"
        - id: cybersec
          name: "CyberSec"
          description: "Segurança. Sub-agent. Padrão Ollama GPU."
          model: "ollama/glm-5:cloud"
        - id: ux
          name: "UX"
          description: "Experiência do usuário. Sub-agent. Padrão Ollama GPU."
          model: "ollama/glm-5:cloud"
        - id: dba
          name: "DBA"
          description: "Dados e queries. Sub-agent. Padrão Ollama GPU."
          model: "ollama/glm-5:cloud"

    # Telegram: só CEO. Slack: todos os agentes (token via env SLACK_APP_TOKEN, SLACK_BOT_TOKEN). Discussões no Slack: Ollama local GPU.
    channels:
      telegram:
        enabled: true
        dmPolicy: "pairing"
        groups: {}
      slack:
        enabled: false
        mode: "socket"
        dmPolicy: allowlist
        allowFrom: []
        dm:
          enabled: true
          groupEnabled: false
