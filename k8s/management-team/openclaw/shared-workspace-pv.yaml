# PersistentVolume para workspace compartilhado: pasta física no host visível dentro do Minikube.
# Requer: minikube mount <pasta-host>:/agent-shared (rodar em background).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: openclaw-shared-workspace-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /agent-shared
    type: DirectoryOrCreate
