# Workspace DevOps: templates e regras para /workspace/devops no gateway.
# SOUL do DevOps vem de soul-devops (development-team). Aqui: TOOLS.md com path obrigatório para repos.
# InitContainer soul-merge copia estes arquivos para /workspace/devops.
# Regra crítica: criar/clonar repositórios SEMPRE em /workspace/repos/<nome-repo> (visível no host em ~/clawdevs-shared/repos/).
apiVersion: v1
kind: ConfigMap
metadata:
  name: workspace-devops-configmap
  namespace: ai-agents
  labels:
    app: openclaw
data:
  GITHUB-CONTEXT.md: |
    # Contexto GitHub — dados completos para o agente DevOps

    ## Organização (destino padrão dos repositórios)

    | Campo        | Valor |
    |--------------|--------|
    | Nome exibido | clawdevs.ai |
    | Slug / login | clawdevs-ai (usar em URLs e em `gh`) |
    | URL perfil   | https://github.com/clawdevs-ai |
    | Variável env| `$GITHUB_ORG` = clawdevs-ai |

    Os repositórios devem ser criados **na organização** (não na conta pessoal), para aparecerem em https://github.com/clawdevs-ai.

    ## Conta pessoal (autenticação)

    | Campo        | Valor |
    |--------------|--------|
    | Login        | clawdevsai |
    | Variável env | `$GITHUB_USER` = clawdevsai |
    | Permissão na org | Owner da organização clawdevs-ai |

    O token (`$GITHUB_TOKEN` / `$GH_TOKEN`) está associado a esta conta; com ele você cria repositórios na organização via `gh repo create $GITHUB_ORG/<nome-repo>`.

    ## Resumo para comandos

    - **Criar repo na organização:** `gh repo create $GITHUB_ORG/<nome-repo> --private --description="..." --clone=false`
    - **Verificar:** `gh repo view $GITHUB_ORG/<nome-repo>` ou `gh repo list $GITHUB_ORG --limit 5`
    - **Clone (org):** `git clone https://x-access-token:$GITHUB_TOKEN@github.com/$GITHUB_ORG/<nome-repo>.git ...`
    - **Link ao usuário:** `https://github.com/$GITHUB_ORG/<nome-repo>` (ex.: https://github.com/clawdevs-ai/user-api)

  TOOLS.md: |
    # TOOLS.md — DevOps: onde criar repositórios e como enviar ao GitHub

    ## Slack (Clawdbot)

    Use when you need to control Slack from Clawdbot via the slack tool, including reacting to messages or pinning/unpinning items in Slack channels or DMs.

    ### Overview

    Use `slack` to react, manage pins, send/edit/delete messages, and fetch member info. The tool uses the bot token configured for Clawdbot.

    ### Inputs to collect

    - `channelId` and `messageId` (Slack message timestamp, e.g. `1712023032.1234`).
    - For reactions, an `emoji` (Unicode or `:name:`).
    - For message sends, a `to` target (`channel:<id>` or `user:<id>`) and `content`.

    Message context lines include `slack message id` and `channel` fields you can reuse directly.

    ### Actions

    | Action group | Default | Notes |
    | --- | --- | --- |
    | reactions | enabled | React + list reactions |
    | messages | enabled | Read/send/edit/delete |
    | pins | enabled | Pin/unpin/list |
    | memberInfo | enabled | Member info |
    | emojiList | enabled | Custom emoji list |

    **React:** `{"action": "react", "channelId": "C123", "messageId": "1712023032.1234", "emoji": "✅"}`

    **List reactions:** `{"action": "reactions", "channelId": "C123", "messageId": "1712023032.1234"}`

    **Send message:** `{"action": "sendMessage", "to": "channel:C123", "content": "Hello from Clawdbot"}`

    **Edit message:** `{"action": "editMessage", "channelId": "C123", "messageId": "1712023032.1234", "content": "Updated text"}`

    **Delete message:** `{"action": "deleteMessage", "channelId": "C123", "messageId": "1712023032.1234"}`

    **Read recent messages:** `{"action": "readMessages", "channelId": "C123", "limit": 20}`

    **Pin message:** `{"action": "pinMessage", "channelId": "C123", "messageId": "1712023032.1234"}`

    **Unpin message:** `{"action": "unpinMessage", "channelId": "C123", "messageId": "1712023032.1234"}`

    **List pins:** `{"action": "listPins", "channelId": "C123"}`

    **Member info:** `{"action": "memberInfo", "userId": "U123"}`

    **Emoji list:** `{"action": "emojiList"}`

    Ideas: react with ✅ to mark completed tasks; pin key decisions or weekly status updates.

    ---

    ## Caminho obrigatório para repositórios (NUNCA usar /workspace/devops)

    - **Sempre criar e clonar repositórios em `/workspace/repos/<nome-repo>`.** Esse path é compartilhado e aparece no host do Diretor em `~/clawdevs-shared/repos/`.
    - **Nunca** criar o projeto em `/workspace/devops` (seu CWD): aí o Diretor não vê em `~/clawdevs-shared/repos` e o repositório fica invisível fora do K8s.
    - Para evitar erro 526 no mount 9P: clonar em `/tmp/<nome>` e depois mover: `git clone <url> /tmp/<nome> && mv /tmp/<nome> /workspace/repos/<nome>`.

    ## Fluxo: criar repositório na organização GitHub e deixar visível no host

    **Obrigatório:** Para criar um repositório você **deve invocar a tool exec** com o comando real. Não basta descrever o plano em texto — chame a tool `exec` com `command` igual a: `gh repo create $GITHUB_ORG/<nome-repo> --private --description="..." --clone=false`. Sem chamar exec, o repositório não é criado.

    **Organização:** repositórios são criados na **organização** clawdevs.ai (slug `$GITHUB_ORG` = clawdevs-ai). Ver `GITHUB-CONTEXT.md` para dados completos.

    1. **Criar na organização:** invocar **exec** com comando: `gh repo create $GITHUB_ORG/<nome-repo> --private --description="..." --clone=false`. Se `gh` falhar, usar API da org: `curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" https://api.github.com/orgs/$GITHUB_ORG/repos -d '{"name":"<nome-repo>","private":true,"description":"..."}'`.
    2. **Erro comum (OAuth App access restrictions):** se a saída trouxer `organization has enabled OAuth App access restrictions` (HTTP 403), **parar imediatamente** e reportar o erro completo ao usuário. Pedir para liberar o app GitHub CLI na organização (`Settings -> Third-party access -> GitHub CLI -> Grant access`) ou usar token/app autorizado pela org.
    3. **Verificar criação antes de afirmar sucesso:** após o comando, **sempre** conferir a saída do exec. Só dizer ao usuário que o repositório foi criado se a saída indicar sucesso (ex.: "Created repository", URL, exit 0). Se houver erro, **reportar o texto exato do erro** ao usuário e não afirmar que criou.
    4. **Confirmar que o repo existe (recomendado):** `gh repo view $GITHUB_ORG/<nome-repo>` ou `gh repo list $GITHUB_ORG --limit 5`. Só informar sucesso ao usuário se o repo aparecer.
    5. **Clonar no path correto:** `git clone https://x-access-token:$GITHUB_TOKEN@github.com/$GITHUB_ORG/<nome-repo>.git /tmp/<nome-repo> && mv /tmp/<nome-repo> /workspace/repos/<nome-repo>`.
    6. **Trabalhar sempre em `/workspace/repos/<nome-repo>`:** criar README, .gitignore, etc. dentro desse diretório.
    7. **Commit e push:** `cd /workspace/repos/<nome-repo> && git add -A && git status && git commit -m "Initial commit with structure" && git push -u origin main` (ou master).
    8. **Sempre informar o usuário** do resultado (sucesso ou mensagem de erro do push).
    9. **Link do repositório:** usar **sempre** a organização: `https://github.com/$GITHUB_ORG/<nome-repo>`. Exemplo correto: `https://github.com/clawdevs-ai/user-api`. **Nunca** usar placeholders na URL.

    ## Regra crítica: nunca afirmar sucesso sem verificar

    **Nunca** dizer ao usuário que o repositório foi criado no GitHub antes de:
    - Ter executado de fato o comando (`gh repo create` ou `curl` na API) via tool exec;
    - Ter lido a saída do comando: só é sucesso se a saída mostrar confirmação (ex.: "Created repository", URL, ou exit 0). Se a saída mostrar erro (Authentication failed, Repository already exists, 404, etc.), informar **o texto do erro** ao usuário e não dizer que criou.

    ## Resumo

    | Ação              | Path correto                  | Path proibido        |
    |-------------------|--------------------------------|----------------------|
    | Clonar novo repo  | `/workspace/repos/<nome-repo>` | `/workspace/devops/*`|
    | Criar arquivos    | dentro de `/workspace/repos/<nome-repo>/` | em `/workspace/devops/` |
    | git push          | executar de `/workspace/repos/<nome-repo>` | nunca de `/workspace/devops` |

    O Diretor vê os repositórios em `~/clawdevs-shared/repos/` no host. O mount compartilhado (`make shared`) deve estar ativo para isso funcionar.

    ---

    ## GitHub — Acesso e Issues

    O `gh` CLI está autenticado e `$GITHUB_TOKEN` / `$GH_TOKEN` estão disponíveis como variáveis de ambiente.
    Para instruções completas, leia `GITHUB-CONTEXT.md` no seu workspace.

    **Repo padrão do projeto:** `$GITHUB_REPO`. Quando o usuário não especificar repositório, usar este. Nunca assumir `openclaw/openclaw` ou outros repos.

    ### Criar Issue

    Usar a tool `exec` com o comando:

    ```
    gh issue create --repo $GITHUB_REPO --title "Título" --body "Descrição" --label "enhancement"
    ```

    Labels comuns: `bug`, `documentation`, `enhancement`, `good first issue`, `help wanted`, `question`.

    ### Listar Issues

    ```
    gh issue list --repo $GITHUB_REPO --limit 10
    ```

    ### Ver Issue

    ```
    gh issue view <numero> --repo $GITHUB_REPO
    ```

    **OBRIGATÓRIO:** Para executar qualquer comando `gh` ou `git`, DEVE usar a tool `exec` com o comando real. Não basta descrever o plano — chame `exec` com o `command`. Sem chamar exec, nada acontece.

    **NÃO EXISTE** subagente "gh-issues". Para criar issues, usar `exec` diretamente com `gh issue create`.
