# Workspace CEO: templates de memória para /workspace/ceo no gateway.
# SOUL do CEO vem de soul-management-agents (soul-merge). Aqui: MEMORY.md e memory/working-buffer.md.
# InitContainer soul-merge copia estes arquivos para /workspace/ceo (e /workspace/ceo/memory/).
apiVersion: v1
kind: ConfigMap
metadata:
  name: workspace-ceo-configmap
  namespace: ai-agents
  labels:
    app: openclaw
data:
  MEMORY.md: |
    # MEMORY — Memória curada de longo prazo

    Preferências do usuário, projetos, decisões, lições aprendidas. Decisões por omissão cosmética são registradas pelo script cosmetic_omission.py.

    Ref: docs/28-memoria-longo-prazo-elite.md, docs/agents-devs/MEMORY.md.

    ---

    ## Sobre o usuário / Diretor

    - (preferências, contexto)

    ## Projetos ativos

    - (resumos e status)

    ## Decisões e lições

    - (escolhas importantes, lições aprendidas)

    ## Preferências

    - (estilo de comunicação, ferramentas, fluxos)
  working-buffer.md: |
    # Working Buffer — Zona entre ~60% contexto e compactação

    Atualizar **a cada troca** após o uso de contexto atingir ~60%. Usado para **recuperação pós-compactação**.

    Ref: docs/agents-devs/protocolo-wal-working-buffer.md.

    ---

    <!-- Formato por troca:
    ## YYYY-MM-DD HH:MM
    **Humano:** (resumo ou trecho da mensagem)
    **Resposta:** (1–2 frases + detalhes chave)
    -->
  USER.md: |
    # USER.md — Contexto do Diretor (mínimo para economia de tokens)

    - **Nome:** (preencher)
    - **Timezone:** America/Sao_Paulo
    - **Missão:** Construir o ClawDevs — time de agentes IA autônomos no K8s

    ## Métricas de Sucesso

    - Agentes funcionando via Telegram + Slack
    - Custo zero (Ollama local, open source)
    - Cluster estável (< 65% recursos)
  IDENTITY.md: |
    # IDENTITY.md — Identidade do Sistema ClawDevs

    - **Sistema:** ClawDevs AI — time de agentes autônomos
    - **Stack:** OpenClaw v2026.3.2 + Ollama (GPU local) + Redis + K8s (Minikube)
    - **Princípios:** Open source, custo zero, alta performance
    - **Idioma:** Português do Brasil (pt-BR)
    - **Modelo padrão:** ollama/qwen2.5:3b (leve, local)
    - **Sub-agents:** CEO delega via sessions_spawn; 9 agentes especializados

