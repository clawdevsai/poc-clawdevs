# k8s/gateway/rbac.yaml
# ServiceAccounts e RBAC para os agentes do ClawDevs (Zero Trust).
# Cada agente tem apenas as permissões mínimas necessárias.
# Referência: docs/issues/025-rotacao-tokens-sandbox-roteador.md | docs/05-seguranca-e-etica.md
---
# ─── ServiceAccount: Somente leitura (maioria dos agentes) ───────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-readonly-sa
  namespace: ai-agents
  labels:
    project: clawdevs
    security: zero-trust
  annotations:
    description: "SA de somente leitura para agentes sem permissões especiais (CEO, PO, Architect, QA, CyberSec, UX, DBA)"
automountServiceAccountToken: false   # Zero Trust: não montar token automaticamente
---
# ─── ServiceAccount: DevOps (permissões de infraestrutura) ───────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-devops-sa
  namespace: ai-agents
  labels:
    project: clawdevs
    security: zero-trust
  annotations:
    description: "SA do DevOps com permissões para gerenciar recursos K8s dentro do namespace"
automountServiceAccountToken: false
---
# ─── ServiceAccount: Developer ───────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-developer-sa
  namespace: ai-agents
  labels:
    project: clawdevs
    security: zero-trust
  annotations:
    description: "SA do Developer com acesso ao workspace PVC e permissão de exec no sandbox"
automountServiceAccountToken: false
---
# ─── Role: DevOps (operações de infra no namespace) ──────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-role
  namespace: ai-agents
  labels:
    project: clawdevs
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-rolebinding
  namespace: ai-agents
  labels:
    project: clawdevs
subjects:
  - kind: ServiceAccount
    name: agent-devops-sa
    namespace: ai-agents
roleRef:
  kind: Role
  name: devops-role
  apiGroup: rbac.authorization.k8s.io
---
# ─── Role: Developer (acesso ao workspace) ───────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer-role
  namespace: ai-agents
  labels:
    project: clawdevs
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-rolebinding
  namespace: ai-agents
  labels:
    project: clawdevs
subjects:
  - kind: ServiceAccount
    name: agent-developer-sa
    namespace: ai-agents
roleRef:
  kind: Role
  name: developer-role
  apiGroup: rbac.authorization.k8s.io
---
# ─── Secret: Chaves de API ────────────────────────────────────────────────────
# ATENÇÃO: Preencher via kubectl create secret ou sealed-secrets
# NÃO commitar valores reais neste arquivo.
apiVersion: v1
kind: Secret
metadata:
  name: clawdevs-secrets
  namespace: ai-agents
  labels:
    project: clawdevs
  annotations:
    description: "Chaves de API. Preencher via: kubectl create secret generic clawdevs-secrets --from-env-file=.env -n ai-agents"
type: Opaque
stringData:
  google-api-key: "PLACEHOLDER_FILL_VIA_CLI"
  telegram-token: "PLACEHOLDER_FILL_VIA_CLI"
  telegram-chat-id: "PLACEHOLDER_FILL_VIA_CLI"
  openrouter-api-key: "PLACEHOLDER_FILL_VIA_CLI"
