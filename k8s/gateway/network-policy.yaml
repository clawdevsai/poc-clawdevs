# k8s/gateway/network-policy.yaml
# NetworkPolicy (Kill Switch) para os pods do ClawDevs.
# Implementa egress whitelist estática e isolamento de rede entre agentes.
# Referência: docs/issues/027-kill-switch-networkpolicy.md | docs/05-seguranca-e-etica.md
---
# ─── Política padrão: negar todo tráfego de entrada e saída ──────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ai-agents
  labels:
    project: clawdevs
    security: zero-trust
  annotations:
    description: "Deny-all padrão. Cada agente tem política explícita de egress/ingress autorizado."
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# ─── Permitir comunicação interna entre agentes (via Redis) ───────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-cluster
  namespace: ai-agents
  labels:
    project: clawdevs
spec:
  podSelector:
    matchLabels:
      project: clawdevs
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-agents
  egress:
    # Redis (Event Bus)
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # Ollama (Inferência local)
    - to:
        - podSelector:
            matchLabels:
              app: ollama
      ports:
        - port: 11434
    # DNS do cluster
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ─── Agentes CEO e PO: acesso à internet (API Google/OpenRouter) ─────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloud-agents-egress
  namespace: ai-agents
  labels:
    project: clawdevs
  annotations:
    description: "CEO e PO precisam de acesso à internet para APIs de nuvem (Gemini, OpenRouter)"
spec:
  podSelector:
    matchLabels:
      agent-type: cloud
  egress:
    # Acesso à internet (whitelist de domínios aplicada no proxy de egress)
    - ports:
        - port: 443
          protocol: TCP
    # Redis interno
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
---
# ─── Kill Switch: bloquear TODO egress de um agente suspeito ─────────────────
# Para ativar: kubectl label pod <pod-name> security=quarantine -n ai-agents
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kill-switch-quarantine
  namespace: ai-agents
  labels:
    project: clawdevs
    security: kill-switch
  annotations:
    description: "Isola completamente um pod marcado com security=quarantine. Ativar: kubectl label pod <pod> security=quarantine"
spec:
  podSelector:
    matchLabels:
      security: quarantine
  policyTypes:
    - Ingress
    - Egress
  ingress: []   # Nenhum ingress permitido
  egress: []    # Nenhum egress permitido
