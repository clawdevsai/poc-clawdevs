# RBAC para o serviço url-sandbox-trigger: patch phase2-config e create/delete Job url-sandbox.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: url-sandbox-trigger
  namespace: ai-agents
  labels:
    app: url-sandbox-trigger
    phase: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: url-sandbox-trigger
  namespace: ai-agents
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["phase2-config"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "delete", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: url-sandbox-trigger
  namespace: ai-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: url-sandbox-trigger
subjects:
  - kind: ServiceAccount
    name: url-sandbox-trigger
    namespace: ai-agents
