# Opcional: lista de pacotes confiáveis (matriz de confiança 128). Formato: name@version=sha256:hex ou name@version
# Script trusted_package_verify.py usa TRUSTED_PACKAGES_FILE ou env TRUSTED_PACKAGES.
apiVersion: v1
kind: ConfigMap
metadata:
  name: trusted-packages
  namespace: ai-agents
  labels:
    app: security
data:
  # Exemplo (ajustar conforme governança):
  # TRUSTED_PACKAGES: |
  #   react@18.2.0=sha256:...
  #   lodash@4.17.21
  TRUSTED_PACKAGES: ""
  _README: |
    Preencher TRUSTED_PACKAGES (uma linha por pacote: name@version=hash ou name@version).
    Ref: scripts/trusted_package_verify.py, docs/44-fase2-seguranca-automacao.md § 2.2.
