# config-perfis: Manifesto de perfis por agente (modelo, temperatura, constraints).
# Referência para o Gateway/OpenClaw e orquestrador. Valores canônicos em docs/07-configuracao-e-prompts.md.
# Aplicar: kubectl apply -f k8s/security/agent-profiles-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-profiles
  namespace: ai-agents
  labels:
    app: security
data:
  # CEO: nuvem sob demanda, temperature 0.7, constraint: proibido código; freio $5/dia; filtrar tarefas antes de enviar ao PO
  profile_ceo: '{"model_cloud":"gpt-4o/gemini-1.5-pro","temperature":0.7,"skills":["web_search","telegram_notify","financial_report"],"constraint":"no_code;filter_tasks_before_po;$5_day_brake"}'
  # PO: nuvem sob demanda, temperature 0.3, constraint: não alterar requisitos In-Progress exceto technical_blocker; ciclo draft.2.issue
  profile_po: '{"model_cloud":"gpt-4o/gemini-1.5-pro","temperature":0.3,"skills":["github_api_manager","kanban_sync"],"constraint":"no_scope_change_in_progress_except_technical_blocker;draft_cycle"}'
  # Developer: local, deepseek-coder, 4GB/4 threads, gpu_lock, file_writer, git_commit
  profile_developer: '{"model":"deepseek-coder:6.7b","temperature":0.2,"resource_mb":4096,"resource_threads":4,"skills":["file_writer","gpu_lock_manager","git_commit"],"constraint":"no_git_merge;no_install_without_cybersec"}'
  # Architect: llama3:8b, code_analyzer, adr_generator; recusa PR sem 80% cobertura
  profile_architect: '{"model":"llama3:8b","temperature":0.0,"skills":["code_analyzer","adr_generator","file_reader"],"constraint":"reject_pr_below_80_coverage;no_code_changes;microADR_on_approve"}'
  # DevOps: phi3:mini, CPU-only (node selectors), minikube_monitor, resource_scaler, gpu_temp_check; pausa se GPU > 82°C
  profile_devops: '{"model":"phi3:mini","temperature":0.1,"cpu_only":true,"skills":["minikube_monitor","resource_scaler","gpu_temp_check"],"constraint":"priority_65pct;checkpoint_80C;pause_82C"}'
  # QA: llama3:8b, sandbox_executor, pytest_automation
  profile_qa: '{"model":"llama3:8b","temperature":0.0,"skills":["sandbox_executor","pytest_automation"],"constraint":"tests_only_in_sandbox;report_only"}'
  # CyberSec: llama3:8b, vulnerability_scanner, prompt_injection_filter
  profile_cybersec: '{"model":"llama3:8b","temperature":0.0,"skills":["vulnerability_scanner","prompt_injection_filter"],"constraint":"block_exposed_keys;block_unapproved_deps"}'
  # UX: phi3:mini CPU, temperature 0.6
  profile_ux: '{"model":"phi3:mini","temperature":0.6,"cpu_only":true,"skills":["ui_validator","accessibility_checker"],"constraint":"no_load_time_increase_above_10pct"}'
  # DBA: llama3:8b, query_analyzer, schema_validator
  profile_dba: '{"model":"llama3:8b","temperature":0.0,"skills":["query_analyzer","schema_validator","file_reader"],"constraint":"block_migrations_without_indexes;no_schema_break_api"}'

  _README: |
    Perfis canônicos (config-perfis). Gateway e orquestrador podem ler estes valores para aplicar modelo, temperatura e constraints por agente.
    CPU-only: usar node selectors para pods DevOps e UX (sem GPU). Ver k8s/development-team/ e docs/04-infraestrutura.md.
