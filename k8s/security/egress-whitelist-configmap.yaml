# Whitelist global estática de egress (Fase 2 — 020, 024).
# O Gateway/orquestrador deve liberar tráfego APENAS para domínios desta lista.
# Não depender da autodeclaração da skill no manifesto; validar reputação de domínio.
# Ref: docs/05-seguranca-e-etica.md, docs/issues/020-zero-trust-fluxo-classificacao.md
apiVersion: v1
kind: ConfigMap
metadata:
  name: egress-whitelist
  namespace: ai-agents
  labels:
    app: security
data:
  # Lista de domínios permitidos (um por linha ou CSV). Exemplos oficiais.
  ALLOWED_DOMAINS: |
    github.com
    api.openai.com
    api.anthropic.com
    openrouter.ai
    ollama.com
    registry.npmjs.org
    registry-1.docker.io
    pypi.org
    files.pythonhosted.org
    api.github.com
    raw.githubusercontent.com
    npmjs.com
    pkg.go.dev
    pypi.org
  # Zonas de confiança de autores (pacotes assinados — instalação sem aprovação direta)
  TRUSTED_PUBLISHERS: "Google,Vercel,Microsoft,npm,PyPI"
  _README: |
    Ampliar a lista somente após governança. Verificação de reputação de domínio (ex.: API VirusTotal) antes de liberar novo domínio. Ref: docs/05-seguranca-e-etica.md § Filtro de conteúdo.
