# Configuração central Segurança. Tudo automatizável via env (orquestrador/Gateway/scripts).
# Aplicar com: kubectl apply -f k8s/security/security-config-configmap.yaml
# Ref: docs/42-fase2-seguranca.md
apiVersion: v1
kind: ConfigMap
metadata:
  name: security-config
  namespace: ai-agents
  labels:
    app: security
data:
  # --- Token bucket e degradação (126) ---
  TOKEN_BUCKET_MAX_PER_HOUR: "5"
  EFFICIENCY_RATIO_MIN: "0.2"
  KEY_STRATEGY_COUNT: "gateway:strategy_events_count"
  KEY_CEO_IDEAS: "gateway:ceo_ideas_count"
  KEY_PO_APPROVED: "gateway:po_approved_count"
  TOKEN_BUCKET_WINDOW_SEC: "3600"
  # Acelerador preditivo: rotear CEO para local se gateway:predictive_diff_lines >= threshold (0 = off)
  KEY_PREDICTIVE_DIFF_LINES: "gateway:predictive_diff_lines"
  PREDICTIVE_LOCAL_THRESHOLD_DIFF_LINES: "500"

  # --- Quarentena / entropia (128) ---
  QUARANTINE_RUN_SAST: "1"
  QUARANTINE_RUN_ENTROPY: "1"
  QUARANTINE_MAX_ENTROPY_PLAINTEXT: "5.5"
  QUARANTINE_MAX_ENTROPY_HIGH: "7.9"
  QUARANTINE_HIGH_ENTROPY_EXT: ".map,.wasm,.min.js,.min.css,.bundle.js"
  # Matriz de confiança: TRUSTED_PACKAGES / TRUSTED_PACKAGES_FILE (opcional)

  # --- URL sandbox (020) ---
  # URL a buscar no Job url-sandbox. Deixe "" para skip; ou defina aqui e aplique o Job (envFrom usa este valor se Job não override).
  URL_SANDBOX_TARGET: ""
  URL_SANDBOX_TIMEOUT: "30"
  URL_SANDBOX_MAX_BYTES: "1048576"

  # --- Rotação tokens (025) ---
  TELEGRAM_ROTATION_SOURCE_SECRET: "openclaw-telegram-rotation-source"
  ROTATION_RESTART_DEPLOYMENT: "1"

  # --- Reputação domínio (024) ---
  CHECK_DOMAIN_NO_API: "block"

  # --- Kill switch / pausa (027) ---
  KEY_PAUSE_CONSUMPTION: "cluster:pause_consumption"
  THERMAL_THRESHOLD_CHECKPOINT_C: "80"
  THERMAL_THRESHOLD_PAUSE_C: "82"
  THERMAL_THRESHOLD_RECOVERY_C: "65"

  # --- Orquestrador autonomia (017) ---
  DEGRADATION_THRESHOLD_PCT: "12.0"
  ORCHESTRATOR_INTERVAL_SEC: "60"
  STREAM_DIGEST: "digest:daily"

  # --- Redis (compartilhado) ---
  REDIS_HOST: "redis-service.ai-agents.svc.cluster.local"
  REDIS_PORT: "6379"

  # --- Automação: habilitar/desabilitar checks (1=on, 0=off) ---
  PHASE2_TOKEN_BUCKET_ENABLED: "1"
  PHASE2_QUARANTINE_ENTROPY_ENABLED: "1"
  PHASE2_DOMAIN_REPUTATION_ENABLED: "1"
  PHASE2_PAUSE_RESPECT_ENABLED: "1"

  _README: |
    Contrato de automação: docs/42-fase2-seguranca.md.
    Scripts: não interativos; leem config via env (injetado por este ConfigMap ou padrão).
    Gateway: antes de publicar cmd:strategy → check_bucket; após publicar → record; check_degrade para rotear CEO.
    Quarentena: pipeline diff → assinaturas → SAST → quarantine_entropy.py.
    Kill switch: SET cluster:pause_consumption 1|0; consumidores respeitam is_consumption_paused().
