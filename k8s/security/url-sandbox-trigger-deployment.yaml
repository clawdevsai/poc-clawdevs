# Serviço HTTP que dispara o Job url-sandbox (patch security-config + delete/create Job).
# Usado pelo Cloudflare Worker (Cron). Requer make url-sandbox-trigger-configmap.
# Opcional: Secret url-sandbox-trigger-secret com TRIGGER_SECRET para autenticar POST /trigger.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-sandbox-trigger
  namespace: ai-agents
  labels:
    app: url-sandbox-trigger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-sandbox-trigger
  template:
    metadata:
      labels:
        app: url-sandbox-trigger
    spec:
      serviceAccountName: url-sandbox-trigger
      containers:
        - name: trigger
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q flask kubernetes && exec python /config/url_sandbox_trigger.py"
          env:
            - name: PORT
              value: "8080"
            - name: NAMESPACE
              value: "ai-agents"
          envFrom:
            - secretRef:
                name: url-sandbox-trigger-secret
                optional: true
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: scripts
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: scripts
          configMap:
            name: url-sandbox-trigger-scripts
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: url-sandbox-trigger
  namespace: ai-agents
  labels:
    app: url-sandbox-trigger
spec:
  selector:
    app: url-sandbox-trigger
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
