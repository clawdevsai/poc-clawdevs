# Job: pipeline de quarentena (SAST semgrep + entropia) sobre diretório. Montar PVC ou volume com saída do install-sandbox.
# Uso: orquestrador cria Job com volume montado no /workspace/sandbox-output; exit 0 = aprovado.
apiVersion: batch/v1
kind: Job
metadata:
  name: quarantine-pipeline
  namespace: ai-agents
  labels:
    app: quarantine-pipeline
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: quarantine-pipeline
    spec:
      restartPolicy: Never
      containers:
        - name: pipeline
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q redis && (command -v semgrep >/dev/null 2>&1 || pip install -q semgrep) && python /scripts/quarantine_pipeline.py /workspace/sandbox-output"
          envFrom:
            - configMapRef:
                name: security-config
                optional: true
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: sandbox-output
              mountPath: /workspace/sandbox-output
              readOnly: true
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: scripts
          configMap:
            name: quarantine-pipeline-scripts
            optional: true
        - name: sandbox-output
          emptyDir: {}  # em produção: PVC preenchido pelo install-sandbox
---
# ConfigMap: make quarantine-pipeline-configmap (quarantine_pipeline.py, quarantine_entropy.py, trusted_package_verify.py)
