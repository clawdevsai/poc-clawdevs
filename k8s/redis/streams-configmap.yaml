# Nomes dos Redis Streams e prefixos de chave para o orquestrador e agentes.
# Ref: docs/38-redis-streams-estado-global.md, docs/03-arquitetura.md
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-streams-config
  namespace: ai-agents
  labels:
    app: redis
data:
  # Streams (canais de eventos)
  STREAM_CMD_STRATEGY: "cmd:strategy"
  STREAM_TASK_BACKLOG: "task:backlog"
  STREAM_DRAFT_ISSUE: "draft.2.issue"
  STREAM_DRAFT_REJECTED: "draft_rejected"
  STREAM_CODE_READY: "code:ready"
  # Pipeline pods separados (014): code:ready â†’ architect â†’ qa â†’ cybersec â†’ dba
  STREAM_REVIEW_ARCHITECT_DONE: "review_architect_done"
  STREAM_REVIEW_QA_DONE: "review_qa_done"
  STREAM_REVIEW_CYBERSEC_DONE: "review_cybersec_done"
  STREAM_REVIEW_DONE: "review_done"
  STREAM_EVENT_DEVOPS: "event:devops"
  STREAM_AUDIT_QUEUE: "audit:queue"

  # Prefixo de chaves de estado (ex.: project:v1:issue:42)
  KEY_PREFIX_PROJECT: "project:v1"
  KEY_PREFIX_ISSUE: "project:v1:issue"

  # Consumer group padrĂŁo (para XREADGROUP)
  CONSUMER_GROUP_DEFAULT: "clawdevs"
  # Consumer group do slot Ăşnico de revisĂŁo (stream code:ready) â€” 007/125
  CONSUMER_GROUP_REVISAO: "revisao-pos-dev"
  SLOT_REVISAO_TIMEOUT_SEC: "300"

  # ReferĂŞncia (documentaĂ§ĂŁo)
  _README: |
    Streams: CEOâ†’cmd:strategyâ†’PO; POâ†’draft.2.issueâ†’Architect; draft_rejectedâ†’PO;
    POâ†’task:backlogâ†’DevOps/Developer; Developerâ†’code:readyâ†’RevisĂŁo pĂłs-Dev.
    Estado: project:v1:issue:{id}. Ver docs/38-redis-streams-estado-global.md
