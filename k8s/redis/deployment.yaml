# k8s/redis/deployment.yaml
# Redis standalone para o ClawDevs — Event Bus e estado global.
# Usado para: Redis Streams (eventos), GPU Lock, Working Buffer, Consumer Groups,
#             Cluster Acéfalo (heartbeat CEO), Token Bucket, TTL working buffer.
# Referência: docs/issues/005-redis-streams-estado-global.md | docs/03-arquitetura.md
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: ai-agents
  labels:
    app: redis
    project: clawdevs
data:
  redis.conf: |
    # ClawDevs Redis Configuration
    # Streams e estado global
    bind 0.0.0.0
    protected-mode no
    port 6379
    
    # Persistência: AOF para garantir semântica idempotente dos streams
    appendonly yes
    appendfsync everysec
    no-appendfsync-on-rewrite no
    
    # RDB backup
    save 900 1
    save 300 10
    save 60 10000
    
    # Limite de memória (não exceder o que foi alocado ao pod)
    maxmemory 2gb
    maxmemory-policy allkeys-lru
    
    # Streams: manter histórico de eventos por no máximo 7 dias
    stream-node-max-bytes 4096
    stream-node-max-entries 128
    
    # TTL padrão para working buffer (expiração automática em 24h)
    # Agentes não precisam limpar manualmente o working buffer
    # Ver docs/07-configuracao-e-prompts.md e docs/04-infraestrutura.md
    
    # Logs mínimos (stdout do K8s)
    loglevel notice
    logfile ""
    
    # Evitar latência por background saves durante operações críticas
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes
    lazyfree-lazy-server-del yes
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ai-agents
  labels:
    app: redis
    project: clawdevs
    component: event-bus
  annotations:
    description: "Redis: Event Bus (Streams), estado global e GPU Lock. Não usar como cache genérico."
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: redis
        project: clawdevs
    spec:
      # Redis roda em CPU (sem GPU)
      nodeSelector:
        workload-type: cpu
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "/etc/redis/redis.conf"]
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: ai-agents
  labels:
    app: redis
    project: clawdevs
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-pvc
  namespace: ai-agents
  labels:
    app: redis
    project: clawdevs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: "5Gi"
