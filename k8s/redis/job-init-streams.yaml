# Job opcional: cria Redis Streams e consumer group "clawdevs" uma vez após o Redis estar no ar.
# Aplicar após redis/deployment.yaml. Ref: docs/38-redis-streams-estado-global.md
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-streams-init
  namespace: ai-agents
  labels:
    app: redis
    component: init-streams
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: redis:7-alpine
          command:
            - /bin/sh
            - -c
            - |
              H="redis-service"
              G="clawdevs"
              for s in cmd:strategy task:backlog draft.2.issue draft_rejected code:ready; do
                redis-cli -h "$H" XGROUP CREATE "$s" "$G" '$' MKSTREAM 2>/dev/null || true
              done
              redis-cli -h "$H" XGROUP CREATE "code:ready" "revisao-pos-dev" '$' MKSTREAM 2>/dev/null || true
              redis-cli -h "$H" XGROUP CREATE "orchestrator:events" "slack" '$' MKSTREAM 2>/dev/null || true
              echo "Streams init done (clawdevs + revisao-pos-dev + orchestrator:events/slack)"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
