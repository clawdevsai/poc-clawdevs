# k8s/limits/resource-quota.yaml
# ResourceQuota + LimitRange para o namespace ai-agents.
# Garante que o cluster NÃO ultrapasse 65% da máquina de referência.
# Máquina referência: 16 threads / 31 GB RAM → 65% ≈ 10 CPUs / 20 GB RAM
# Referência: docs/issues/004-resource-quota-limitrange.md | docs/04-infraestrutura.md
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: limite-65-por-cento
  namespace: ai-agents
  labels:
    project: clawdevs
  annotations:
    description: "Limita o namespace a ~65% da máquina de referência (Ryzen 5800X / 31GB RAM)"
spec:
  hard:
    # CPU: 16 threads × 65% ≈ 10
    requests.cpu: "8"
    limits.cpu: "10"
    # RAM: 31 GB × 65% ≈ 20 GB
    requests.memory: "16Gi"
    limits.memory: "20Gi"
    # Máximo de pods simultâneos
    pods: "20"
    # Armazenamento persistente (NVMe 1TB → reservar ~120 GB para cluster)
    requests.storage: "120Gi"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: limites-por-agente
  namespace: ai-agents
  labels:
    project: clawdevs
  annotations:
    description: "Limites padrão por container: evita containers sem limites explícitos"
spec:
  limits:
    - type: Container
      # Máximo por container (agentes técnicos com GPU podem pedir mais via request)
      default:
        cpu: "2"
        memory: "2Gi"
      defaultRequest:
        cpu: "500m"
        memory: "512Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "100m"
        memory: "128Mi"
    - type: Pod
      max:
        cpu: "6"
        memory: "12Gi"
