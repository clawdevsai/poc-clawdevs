apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clawdevs-ai
  labels:
    app: clawdevs-ai
spec:
  serviceName: clawdevs-ai
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: clawdevs-ai
  template:
    metadata:
      labels:
        app: clawdevs-ai
    spec:
      containers:
        - name: openclaw
          image: debian:bookworm-slim
          ports:
            - name: gateway
              containerPort: 18789
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: TELEGRAM_BOT_TOKEN_CEO
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: TELEGRAM_BOT_TOKEN_CEO
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: TELEGRAM_CHAT_ID_CEO
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_TOKEN
            - name: GITHUB_REPOSITORY
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_REPOSITORY
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: OLLAMA_API_KEY
            - name: DIRECTORS_NAME
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: DIRECTORS_NAME
            - name: NODE_OPTIONS
              value: --max-old-space-size=3072
            - name: AGENT_ERROR_ROUTER_ENABLED
              value: "true"
            - name: AGENT_ERROR_ROUTER_INTERVAL_SECONDS
              value: "30"
            - name: DEV_BACKEND_CRON_ENABLED
              value: "true"
            - name: DEV_BACKEND_CRON_NAME
              value: "dev_backend_hourly_queue_poll"
            - name: DEV_BACKEND_CRON_EXPR
              value: "0 * * * *"
            - name: DEV_BACKEND_CRON_TZ
              value: "America/Sao_Paulo"
          resources:
            requests:
              memory: 2Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: agent-config
              mountPath: /bootstrap/agent-config
              readOnly: true
            - name: openclaw-data
              mountPath: /data/openclaw
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              export OPENCLAW_NO_ONBOARD=1
              export OPENCLAW_NO_PROMPT=1
              export OPENCLAW_STATE_DIR=/data/openclaw
              # Garantir que todos os agentes tenham o repo default mesmo se o Secret vier sem essa chave
              export GITHUB_REPOSITORY="${GITHUB_REPOSITORY:-lukeware-ai/user-api}"
              # Fallback para quando DIRECTORS_NAME nao estiver definido no Secret
              export DIRECTORS_NAME="${DIRECTORS_NAME:-Director}"
              # Alinhar GH CLI caso GH_TOKEN venha em outro nome
              export GH_TOKEN="${GH_TOKEN:-${GITHUB_TOKEN:-}}"
              apt-get update
              apt-get install -y --no-install-recommends ca-certificates curl bash git jq gh
              rm -rf /var/lib/apt/lists/*
              # Autenticar GitHub CLI de forma nao interativa para os agentes
              if [ -n "${GH_TOKEN:-}" ]; then
                printf '%s' "${GH_TOKEN}" | gh auth login --hostname github.com --with-token >/tmp/gh-auth.log 2>&1 || true
                gh auth setup-git >/tmp/gh-auth-setup-git.log 2>&1 || true
                gh auth status >/tmp/gh-auth-status.log 2>&1 || true
              else
                echo "GH_TOKEN ausente: GitHub CLI iniciara sem autenticacao persistida" >/tmp/gh-auth-status.log
              fi
              curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard --no-prompt
              mkdir -p "${OPENCLAW_STATE_DIR}"
              mkdir -p ~/.openclaw
              mkdir -p "${OPENCLAW_STATE_DIR}/scheduler"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/status"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/idea"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/user_story"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/tasks"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/briefs"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/implementation/docs"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/session_finished"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-ceo"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-po"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-arquiteto"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-dev_backend"
              mkdir -p "${OPENCLAW_STATE_DIR}/agents/ceo/agent" "${OPENCLAW_STATE_DIR}/agents/po/agent" "${OPENCLAW_STATE_DIR}/agents/arquiteto/agent" "${OPENCLAW_STATE_DIR}/agents/dev_backend/agent"
              cp /bootstrap/agent-config/ceo-AGENTS.md "${OPENCLAW_STATE_DIR}/workspace-ceo/AGENTS.md"
              cp /bootstrap/agent-config/ceo-IDENTITY.md "${OPENCLAW_STATE_DIR}/workspace-ceo/IDENTITY.md"
              cp /bootstrap/agent-config/ceo-SOUL.md "${OPENCLAW_STATE_DIR}/workspace-ceo/SOUL.md"
              cp /bootstrap/agent-config/ceo-USER.md "${OPENCLAW_STATE_DIR}/workspace-ceo/USER.md"
              DIRECTORS_NAME_ESCAPED="$(printf '%s' "${DIRECTORS_NAME}" | sed -e 's/[\\/&]/\\&/g')"
              sed -i "s|\${DIRECTORS_NAME}|${DIRECTORS_NAME_ESCAPED}|g" "${OPENCLAW_STATE_DIR}/workspace-ceo/USER.md"
              cp /bootstrap/agent-config/ceo-skill-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-ceo/SKILL.md"
              cp /bootstrap/agent-config/po-AGENTS.md "${OPENCLAW_STATE_DIR}/workspace-po/AGENTS.md"
              cp /bootstrap/agent-config/po-IDENTITY.md "${OPENCLAW_STATE_DIR}/workspace-po/IDENTITY.md"
              cp /bootstrap/agent-config/po-SOUL.md "${OPENCLAW_STATE_DIR}/workspace-po/SOUL.md"
              cp /bootstrap/agent-config/po-USER.md "${OPENCLAW_STATE_DIR}/workspace-po/USER.md"
              cp /bootstrap/agent-config/po-skill-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-po/SKILL.md"
              cp /bootstrap/agent-config/arquiteto-AGENTS.md "${OPENCLAW_STATE_DIR}/workspace-arquiteto/AGENTS.md"
              cp /bootstrap/agent-config/arquiteto-IDENTITY.md "${OPENCLAW_STATE_DIR}/workspace-arquiteto/IDENTITY.md"
              cp /bootstrap/agent-config/arquiteto-SOUL.md "${OPENCLAW_STATE_DIR}/workspace-arquiteto/SOUL.md"
              cp /bootstrap/agent-config/arquiteto-USER.md "${OPENCLAW_STATE_DIR}/workspace-arquiteto/USER.md"
              cp /bootstrap/agent-config/arquiteto-skill-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-arquiteto/SKILL.md"
              cp /bootstrap/agent-config/dev_backend-AGENTS.md "${OPENCLAW_STATE_DIR}/workspace-dev_backend/AGENTS.md"
              cp /bootstrap/agent-config/dev_backend-BOOT.md "${OPENCLAW_STATE_DIR}/workspace-dev_backend/BOOT.md"
              cp /bootstrap/agent-config/dev_backend-BOOTSTRAP.md "${OPENCLAW_STATE_DIR}/workspace-dev_backend/BOOTSTRAP.md"
              cp /bootstrap/agent-config/dev_backend-HEARTBEAT.md "${OPENCLAW_STATE_DIR}/workspace-dev_backend/HEARTBEAT.md"
              cp /bootstrap/agent-config/dev_backend-IDENTITY.md "${OPENCLAW_STATE_DIR}/workspace-dev_backend/IDENTITY.md"
              cp /bootstrap/agent-config/dev_backend-INPUT_SCHEMA.json "${OPENCLAW_STATE_DIR}/workspace-dev_backend/INPUT_SCHEMA.json"
              cp /bootstrap/agent-config/dev_backend-SOUL.md "${OPENCLAW_STATE_DIR}/workspace-dev_backend/SOUL.md"
              cp /bootstrap/agent-config/dev_backend-SECURITY_TEST_CASES.md "${OPENCLAW_STATE_DIR}/workspace-dev_backend/SECURITY_TEST_CASES.md"
              cp /bootstrap/agent-config/dev_backend-USER.md "${OPENCLAW_STATE_DIR}/workspace-dev_backend/USER.md"
              cp /bootstrap/agent-config/dev_backend-TOOLS.md "${OPENCLAW_STATE_DIR}/workspace-dev_backend/TOOLS.md"
              cp /bootstrap/agent-config/dev_backend-skill-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-dev_backend/SKILL.md"
              mkdir -p "${OPENCLAW_STATE_DIR}/git-hooks"
              cat > "${OPENCLAW_STATE_DIR}/git-hooks/pre-commit" <<'EOF'
              #!/usr/bin/env bash
              set -euo pipefail
              branch="$(git symbolic-ref --quiet --short HEAD 2>/dev/null || true)"
              case "${branch}" in
                main|master)
                  echo "Commit bloqueado: branch '${branch}' protegida. Crie uma branch de trabalho e abra PR."
                  exit 1
                  ;;
              esac
              exit 0
              EOF
              cat > "${OPENCLAW_STATE_DIR}/git-hooks/pre-push" <<'EOF'
              #!/usr/bin/env bash
              set -euo pipefail
              while read -r local_ref local_sha remote_ref remote_sha; do
                remote_branch="${remote_ref#refs/heads/}"
                case "${remote_branch}" in
                  main|master)
                    echo "Push bloqueado: envio direto para '${remote_branch}' e proibido. Use Pull Request."
                    exit 1
                    ;;
                esac
              done
              exit 0
              EOF
              chmod +x "${OPENCLAW_STATE_DIR}/git-hooks/pre-commit" "${OPENCLAW_STATE_DIR}/git-hooks/pre-push"
              git config --global core.hooksPath "${OPENCLAW_STATE_DIR}/git-hooks"
              rm -f "${OPENCLAW_STATE_DIR}/workspace-ceo/BOOTSTRAP.md"
              cat > "${OPENCLAW_STATE_DIR}/openclaw.json" <<'EOF'
              {
                "gateway": {
                  "mode": "local",
                  "bind": "lan",
                  "port": 18789,
                  "auth": {
                    "token": "__TOKEN__"
                  }
                },
                "models": {
                  "providers": {
                    "ollama": {
                      "baseUrl": "http://ollama:11434",
                      "models": [
                        {
                          "id": "qwen3-next:80b-cloud",
                          "name": "qwen3-next:80b-cloud"
                        },
                        {
                          "id": "gpt-oss:120b-cloud",
                          "name": "gpt-oss:120b-cloud"
                        },
                        {
                          "id": "nemotron-3-super:cloud",
                          "name": "nemotron-3-super:cloud"
                        },
                        {
                          "id": "qwen3-coder:480b-cloud",
                          "name": "qwen3-coder:480b-cloud"
                        },
                        {
                          "id": "gemma3:27b-cloud",
                          "name": "gemma3:27b-cloud"
                        },
                        {
                          "id": "qwen3-vl:235b-cloud",
                          "name": "qwen3-vl:235b-cloud"
                        },
                        {
                          "id": "qwen3.5:397b-cloud",
                          "name": "qwen3.5:397b-cloud"
                        }
                      ]
                    }
                  }
                },
                "tools": {
                  "sessions": {
                    "visibility": "all"
                  },
                  "agentToAgent": {
                    "enabled": true,
                    "allow": ["ceo", "po", "arquiteto", "dev_backend"]
                  }
                },
                "session": {
                  "sendPolicy": {
                    "rules": [
                      {
                        "match": { "channel": "unknown", "chatType": "group" },
                        "action": "deny"
                      }
                    ],
                    "default": "allow"
                  }
                },
                "skills": {
                  "load": {
                    "watch": true,
                    "watchDebounceMs": 250
                  }
                },
                "agents": {
                  "defaults": {
                    "model": "ollama/nemotron-3-super:cloud",
                    "bootstrapMaxChars": 25000,
                    "thinkingDefault": "low",
                    "typingMode": "instant",
                    "typingIntervalSeconds": 4,
                    "sandbox": {
                      "mode": "off",
                      "sessionToolsVisibility": "spawned"
                    },
                    "subagents": {
                      "runTimeoutSeconds": 900,
                      "maxConcurrent": 2
                    },
                    "heartbeat": {
                      "includeReasoning": true
                    }
                  },
                  "list": [
                    {
                      "id": "ceo",
                      "default": true,
                      "name": "CEO",
                      "model": "ollama/qwen3-vl:235b-cloud",
                      "workspace": "/data/openclaw/workspace-ceo",
                      "agentDir": "/data/openclaw/agents/ceo/agent",
                      "tools": {
                        "allow": [
                          "read",
                          "write",
                          "browser",
                          "message",
                          "agents_list",
                          "sessions_list",
                          "sessions_history",
                          "sessions_send",
                          "sessions_spawn",
                          "session_status",
                          "group:plugins"
                        ]
                      },
                      "subagents": {
                        "allowAgents": ["po"]
                      }
                    },
                    {
                      "id": "po",
                      "name": "PO",
                      "model": "ollama/gpt-oss:120b-cloud",
                      "workspace": "/data/openclaw/workspace-po",
                      "agentDir": "/data/openclaw/agents/po/agent",
                      "tools": {
                        "allow": [
                          "read",
                          "write",
                          "exec",
                          "process",
                          "browser",
                          "message",
                          "agents_list",
                          "sessions_list",
                          "sessions_history",
                          "sessions_send",
                          "sessions_spawn",
                          "session_status",
                          "group:plugins"
                        ],
                        "exec": {
                          "host": "gateway",
                          "security": "full",
                          "ask": "off"
                        }
                      },
                      "subagents": {
                        "allowAgents": ["arquiteto"]
                      }
                    },
                    {
                      "id": "arquiteto",
                      "name": "Arquiteto",
                      "model": "ollama/qwen3.5:397b-cloud",
                      "workspace": "/data/openclaw/workspace-arquiteto",
                      "agentDir": "/data/openclaw/agents/arquiteto/agent",
                      "tools": {
                        "allow": [
                          "read",
                          "write",
                          "exec",
                          "process",
                          "browser",
                          "message",
                          "sessions_list",
                          "sessions_history",
                          "sessions_send",
                          "sessions_spawn",
                          "session_status",
                          "group:plugins"
                        ],
                        "exec": {
                          "host": "gateway",
                          "security": "full",
                          "ask": "off"
                        }
                      },
                      "subagents": {
                        "allowAgents": ["dev_backend"]
                      }
                    },
                    {
                      "id": "dev_backend",
                      "name": "Dev_Backend",
                      "model": "ollama/qwen3-coder:480b-cloud",
                      "workspace": "/data/openclaw/workspace-dev_backend",
                      "agentDir": "/data/openclaw/agents/dev_backend/agent",
                      "tools": {
                        "allow": [
                          "read",
                          "write",
                          "exec",
                          "process",
                          "browser",
                          "message",
                          "sessions_list",
                          "sessions_history",
                          "sessions_send",
                          "sessions_spawn",
                          "session_status",
                          "group:plugins"
                        ],
                        "exec": {
                          "host": "gateway",
                          "security": "full",
                          "ask": "off"
                        }
                      },
                      "subagents": {
                        "allowAgents": []
                      }
                    }
                  ]
                },
                "bindings": [
                  {
                    "agentId": "ceo",
                    "match": {
                      "channel": "telegram",
                      "accountId": "default"
                    }
                  }
                ],
                "commands": {
                  "native": "auto",
                  "nativeSkills": "auto",
                  "restart": true,
                  "ownerDisplay": "hash"
                },
                "channels": {
                  "telegram": {
                    "dmPolicy": "allowlist",
                    "allowFrom": ["__TELEGRAM_CHAT_ID__"],
                    "groupPolicy": "allowlist",
                    "groupAllowFrom": ["__TELEGRAM_CHAT_ID__"],
                    "streaming": "partial",
                    "accounts": {
                      "default": {
                        "botToken": "__TELEGRAM_BOT_TOKEN_CEO__",
                        "dmPolicy": "allowlist",
                        "allowFrom": ["__TELEGRAM_CHAT_ID__"],
                        "groupPolicy": "allowlist",
                        "groupAllowFrom": ["__TELEGRAM_CHAT_ID__"],
                        "streaming": "partial"
                      }
                    }
                  }
                }
              }
              EOF
              sed -i "s/__TOKEN__/${OPENCLAW_GATEWAY_TOKEN}/g" "${OPENCLAW_STATE_DIR}/openclaw.json"
              sed -i "s/__TELEGRAM_BOT_TOKEN_CEO__/${TELEGRAM_BOT_TOKEN_CEO}/g" "${OPENCLAW_STATE_DIR}/openclaw.json"
              sed -i "s/__TELEGRAM_CHAT_ID__/${TELEGRAM_CHAT_ID}/g" "${OPENCLAW_STATE_DIR}/openclaw.json"
              mkdir -p ~/.openclaw
              cp "${OPENCLAW_STATE_DIR}/openclaw.json" ~/.openclaw/openclaw.json
              # Exec approvals for CEO scope (Gateway target), aligned with Control UI preset:
              # security=allowlist, ask=always, askFallback=full, autoAllowSkills=true.
              EXEC_APPROVALS_FILE=~/.openclaw/exec-approvals.json
              if [ ! -f "${EXEC_APPROVALS_FILE}" ]; then
                EXEC_APPROVALS_TOKEN="$(tr -d '-' < /proc/sys/kernel/random/uuid)"
                cat > "${EXEC_APPROVALS_FILE}" <<EOF
              {
                "version": 1,
                "socket": {
                  "path": "/root/.openclaw/exec-approvals.sock",
                  "token": "${EXEC_APPROVALS_TOKEN}"
                },
                "defaults": {},
                "agents": {}
              }
              EOF
              fi
              jq '.agents = (.agents // {}) |
                  .agents.ceo = (.agents.ceo // {}) |
                  .agents.ceo.security = "allowlist" |
                  .agents.ceo.ask = "always" |
                  .agents.ceo.askFallback = "full" |
                  .agents.ceo.autoAllowSkills = true |
                  .agents.ceo.allowlist = (.agents.ceo.allowlist // [])' \
                "${EXEC_APPROVALS_FILE}" > "${EXEC_APPROVALS_FILE}.tmp"
              mv "${EXEC_APPROVALS_FILE}.tmp" "${EXEC_APPROVALS_FILE}"
              # Repair agent main sessions when the persisted transcript is missing, invalid,
              # or contains no assistant text messages that the chat UI can render.
              repair_main_session() {
                agent_id="$1"
                workspace_dir="$2"
                seed_text="$3"
                sess_dir="${OPENCLAW_STATE_DIR}/agents/${agent_id}/sessions"
                sess_key="agent:${agent_id}:main"
                mkdir -p "${sess_dir}"
                if [ ! -f "${sess_dir}/sessions.json" ]; then
                  return 0
                fi
                main_file="$(jq -r --arg key "${sess_key}" '.[$key].sessionFile // empty' "${sess_dir}/sessions.json" 2>/dev/null || true)"
                main_ok=0
                if [ -n "${main_file}" ] && [ -f "${main_file}" ]; then
                  if jq -c . "${main_file}" >/dev/null 2>&1; then
                    if jq -e 'select(.type=="message" and .message.role=="assistant") | .message.content[]? | select(.type=="text" and ((.text // "") | length > 0))' "${main_file}" >/dev/null 2>&1; then
                      main_ok=1
                    fi
                  fi
                fi
                if [ "${main_ok}" -eq 1 ]; then
                  return 0
                fi
                ts="$(date -u +%Y%m%dT%H%M%SZ)"
                new_id="$(cat /proc/sys/kernel/random/uuid)"
                now_ms="$(($(date -u +%s)*1000))"
                cp "${sess_dir}/sessions.json" "${sess_dir}/sessions.json.bak.${ts}"
                if [ -n "${main_file}" ] && [ -f "${main_file}" ]; then
                  cp "${main_file}" "${main_file}.bak.${ts}"
                fi
                cat > "${sess_dir}/${new_id}.jsonl" <<EOF
              {"type":"session","version":3,"id":"${new_id}","timestamp":"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)","cwd":"${workspace_dir}"}
              {"type":"message","id":"seed-${agent_id}-main","parentId":null,"timestamp":"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)","message":{"role":"assistant","content":[{"type":"text","text":"${seed_text}"}],"stopReason":"stop","provider":"system","model":"seed"}}
              EOF
                jq --arg key "${sess_key}" \
                   --arg newId "${new_id}" \
                   --arg newFile "${sess_dir}/${new_id}.jsonl" \
                   --argjson now "${now_ms}" \
                   '.[$key].sessionId = $newId |
                    .[$key].updatedAt = $now |
                    .[$key].chatType = "direct" |
                    .[$key].deliveryContext = {"channel":"webchat"} |
                    .[$key].lastChannel = "webchat" |
                    .[$key].origin = {"provider":"webchat","surface":"webchat","chatType":"direct"} |
                    .[$key].sessionFile = $newFile |
                    .[$key].abortedLastRun = false |
                    .[$key].compactionCount = 0' \
                   "${sess_dir}/sessions.json" > "${sess_dir}/sessions.json.tmp"
                mv "${sess_dir}/sessions.json.tmp" "${sess_dir}/sessions.json"
              }
              repair_main_session "ceo" "/data/openclaw/workspace-ceo" "CEO pronto. Pode me acionar por aqui para alinhamento, priorizacao e delegacao para PO e Arquiteto."
              repair_main_session "po" "/data/openclaw/workspace-po" "PO pronto. Pode me acionar para planejamento, backlog, prioridades e coordenacao com Arquiteto."
              repair_main_session "arquiteto" "/data/openclaw/workspace-arquiteto" "Arquiteto pronto. Pode me acionar para desenho tecnico, tasks e trade-offs de arquitetura."
              repair_main_session "dev_backend" "/data/openclaw/workspace-dev_backend" "Dev_Backend pronto. Pode me acionar para implementacao de tasks, testes e atualizacao de status."
              if [ "${AGENT_ERROR_ROUTER_ENABLED:-false}" = "true" ]; then
                (
                  set +e
                  ERROR_CENTER="${OPENCLAW_STATE_DIR}/backlog/status/agent_error_center.jsonl"
                  ERROR_SEEN="${OPENCLAW_STATE_DIR}/backlog/status/agent_error_seen.txt"
                  mkdir -p "$(dirname "${ERROR_CENTER}")"
                  touch "${ERROR_CENTER}" "${ERROR_SEEN}"
                  while true; do
                    for f in "${OPENCLAW_STATE_DIR}"/agents/*/sessions/*.jsonl; do
                      [ -f "${f}" ] || continue
                      agent="$(echo "${f}" | sed -E 's#^.*/agents/([^/]+)/sessions/.*$#\1#')"
                      [ "${agent}" = "ceo" ] && continue
                      tail_snippet="$(tail -n 80 "${f}" 2>/dev/null || true)"
                      echo "${tail_snippet}" | grep -Eiq 'error|falha|exception|unauthorized|forbidden|timeout|critical|critico|traceback|panic' || continue
                      event_hash="$(printf '%s' "${agent}:${tail_snippet}" | sha256sum | awk '{print $1}')"
                      grep -q "${event_hash}" "${ERROR_SEEN}" 2>/dev/null && continue
                      printf '%s\n' "${event_hash}" >> "${ERROR_SEEN}"
                      now_iso="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                      snippet_safe="$(printf '%s' "${tail_snippet}" | tail -n 20 | tr '\n' ' ' | sed 's/"/\\"/g')"
                      echo "{\"ts\":\"${now_iso}\",\"agent\":\"${agent}\",\"session_file\":\"${f}\",\"hash\":\"${event_hash}\",\"severity\":\"error\",\"snippet\":\"${snippet_safe}\"}" >> "${ERROR_CENTER}"
                      ceo_sessions="${OPENCLAW_STATE_DIR}/agents/ceo/sessions/sessions.json"
                      ceo_file="$(jq -r '.\"agent:ceo:main\".sessionFile // empty' "${ceo_sessions}" 2>/dev/null || true)"
                      if [ -n "${ceo_file}" ] && [ -f "${ceo_file}" ]; then
                        alert_text="ALERTA-AUTOMATICO: erro detectado no agente ${agent}. Registro central: ${ERROR_CENTER}. Hash: ${event_hash}. Acao recomendada: verificar sessao e desbloquear."
                        printf '%s\n' "{\"type\":\"message\",\"id\":\"err-${event_hash}\",\"parentId\":null,\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\",\"message\":{\"role\":\"user\",\"content\":[{\"type\":\"text\",\"text\":\"${alert_text}\"}],\"timestamp\":$(($(date -u +%s)*1000))}}" >> "${ceo_file}"
                      fi
                    done
                    sleep "${AGENT_ERROR_ROUTER_INTERVAL_SECONDS:-30}"
                  done
                ) &
              fi
              if [ "${DEV_BACKEND_CRON_ENABLED:-false}" = "true" ]; then
                (
                  set +e
                  CRON_NAME="${DEV_BACKEND_CRON_NAME:-dev_backend_hourly_queue_poll}"
                  CRON_EXPR="${DEV_BACKEND_CRON_EXPR:-0 * * * *}"
                  CRON_TZ="${DEV_BACKEND_CRON_TZ:-America/Sao_Paulo}"
                  CRON_MSG='Poll GitHub issues com label "back_end"; se houver issue elegivel, implementar task com foco em baixissimo custo cloud e altissima performance; se nao houver, manter standby sem processamento desnecessario.'
                  for _ in $(seq 1 24); do
                    sleep 5
                    if openclaw cron list --json > /tmp/openclaw-cron.json 2>/dev/null; then
                      CRON_ID="$(jq -r --arg n "${CRON_NAME}" '.jobs[]? | select(.name == $n) | .jobId' /tmp/openclaw-cron.json | head -n1)"
                      if [ -n "${CRON_ID}" ]; then
                        echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") cron '${CRON_NAME}' ja existe (${CRON_ID})" >> "${OPENCLAW_STATE_DIR}/scheduler/dev_backend_hourly.log"
                        exit 0
                      fi
                      if openclaw cron add \
                          --name "${CRON_NAME}" \
                          --cron "${CRON_EXPR}" \
                          --tz "${CRON_TZ}" \
                          --session isolated \
                          --message "${CRON_MSG}" \
                          --agent dev_backend \
                          --no-deliver >/tmp/openclaw-cron-add.log 2>&1; then
                        echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") cron '${CRON_NAME}' criado com sucesso" >> "${OPENCLAW_STATE_DIR}/scheduler/dev_backend_hourly.log"
                        exit 0
                      fi
                    fi
                  done
                  echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") falha ao criar cron nativo do dev_backend; gateway seguira sem cron automatico" >> "${OPENCLAW_STATE_DIR}/scheduler/dev_backend_hourly.log"
                  exit 0
                ) &
              fi
              exec openclaw gateway
      volumes:
        - name: agent-config
          configMap:
            name: openclaw-agent-config
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
---
apiVersion: v1
kind: Service
metadata:
  name: clawdevs-ai
  labels:
    app: clawdevs-ai
spec:
  type: NodePort
  selector:
    app: clawdevs-ai
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
      nodePort: 31879
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
  labels:
    app: clawdevs-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 6Gi
