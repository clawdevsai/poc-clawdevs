apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
        - name: openclaw
          image: debian:bookworm-slim
          ports:
            - name: gateway
              containerPort: 18789
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: TELEGRAM_BOT_TOKEN_CEO
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: TELEGRAM_BOT_TOKEN_CEO
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: TELEGRAM_CHAT_ID_CEO
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_TOKEN
            - name: GITHUB_REPOSITORY
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_REPOSITORY
          volumeMounts:
            - name: agent-config
              mountPath: /bootstrap/agent-config
              readOnly: true
            - name: openclaw-data
              mountPath: /data/openclaw
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              export OPENCLAW_NO_ONBOARD=1
              export OPENCLAW_NO_PROMPT=1
              export OPENCLAW_STATE_DIR=/data/openclaw
              # Garantir que todos os agentes tenham o repo default mesmo se o Secret vier sem essa chave
              export GITHUB_REPOSITORY="${GITHUB_REPOSITORY:-lukeware-ai/user-api}"
              # Alinhar GH CLI caso GH_TOKEN venha em outro nome
              export GH_TOKEN="${GH_TOKEN:-${GITHUB_TOKEN:-}}"
              apt-get update
              apt-get install -y --no-install-recommends ca-certificates curl bash git jq gh
              rm -rf /var/lib/apt/lists/*
              curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard --no-prompt
              mkdir -p "${OPENCLAW_STATE_DIR}"
              mkdir -p ~/.openclaw
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/idea"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/user_story"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/tasks"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-ceo/skills/delegate-to-po"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-ceo/skills/research-and-delegate"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-po/skills/product-delivery"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/technical-design"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/github"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/solid"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/clean-code"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/ddd"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/design-patterns"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/clean-architecture"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/hexagonal-architecture"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/dry-yagni"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/docker"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/kubernetes"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/best-practices"
              mkdir -p "${OPENCLAW_STATE_DIR}/agents/ceo/agent" "${OPENCLAW_STATE_DIR}/agents/po/agent" "${OPENCLAW_STATE_DIR}/agents/architecture/agent"
              cp /bootstrap/agent-config/ceo-AGENTS.md "${OPENCLAW_STATE_DIR}/workspace-ceo/AGENTS.md"
              cp /bootstrap/agent-config/ceo-IDENTITY.md "${OPENCLAW_STATE_DIR}/workspace-ceo/IDENTITY.md"
              cp /bootstrap/agent-config/ceo-SOUL.md "${OPENCLAW_STATE_DIR}/workspace-ceo/SOUL.md"
              cp /bootstrap/agent-config/ceo-USER.md "${OPENCLAW_STATE_DIR}/workspace-ceo/USER.md"
              cp /bootstrap/agent-config/ceo-skill-delegate-to-po-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-ceo/skills/delegate-to-po/SKILL.md"
              cp /bootstrap/agent-config/ceo-skill-research-and-delegate-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-ceo/skills/research-and-delegate/SKILL.md"
              cp /bootstrap/agent-config/po-AGENTS.md "${OPENCLAW_STATE_DIR}/workspace-po/AGENTS.md"
              cp /bootstrap/agent-config/po-SOUL.md "${OPENCLAW_STATE_DIR}/workspace-po/SOUL.md"
              cp /bootstrap/agent-config/po-skill-product-delivery-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-po/skills/product-delivery/SKILL.md"
              cp /bootstrap/agent-config/architecture-AGENTS.md "${OPENCLAW_STATE_DIR}/workspace-architecture/AGENTS.md"
              cp /bootstrap/agent-config/architecture-SOUL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/SOUL.md"
              cp /bootstrap/agent-config/architecture-skill-technical-design-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/technical-design/SKILL.md"
              cp /bootstrap/agent-config/architecture-skill-github-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/github/SKILL.md"
              cp /bootstrap/agent-config/architecture-skill-solid-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/solid/SKILL.md"
              cp /bootstrap/agent-config/architecture-skill-clean-code-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/clean-code/SKILL.md"
              cp /bootstrap/agent-config/architecture-skill-ddd-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/ddd/SKILL.md"
              cp /bootstrap/agent-config/architecture-skill-design-patterns-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/design-patterns/SKILL.md"
              cp /bootstrap/agent-config/architecture-skill-clean-architecture-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/clean-architecture/SKILL.md"
              cp /bootstrap/agent-config/architecture-skill-hexagonal-architecture-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/hexagonal-architecture/SKILL.md"
              cp /bootstrap/agent-config/architecture-skill-dry-yagni-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/dry-yagni/SKILL.md"
              cp /bootstrap/agent-config/architecture-skill-docker-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/docker/SKILL.md"
              cp /bootstrap/agent-config/architecture-skill-kubernetes-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/kubernetes/SKILL.md"
              cp /bootstrap/agent-config/architecture-skill-best-practices-SKILL.md "${OPENCLAW_STATE_DIR}/workspace-architecture/skills/best-practices/SKILL.md"
              rm -f "${OPENCLAW_STATE_DIR}/workspace-ceo/BOOTSTRAP.md"
              cat > "${OPENCLAW_STATE_DIR}/openclaw.json" <<'EOF'
              {
                "gateway": {
                  "mode": "local",
                  "bind": "lan",
                  "port": 18789,
                  "auth": {
                    "token": "__TOKEN__"
                  }
                },
                "models": {
                  "providers": {
                    "ollama": {
                      "baseUrl": "http://ollama:11434",
                      "models": [
                        {
                          "id": "qwen3-coder-next:cloud",
                          "name": "qwen3-coder-next:cloud"
                        }
                      ]
                    }
                  }
                },
                "tools": {
                  "sessions": {
                    "visibility": "all"
                  },
                  "agentToAgent": {
                    "enabled": true,
                    "allow": ["ceo", "po", "architecture"]
                  }
                },
                "agents": {
                  "defaults": {
                    "model": "ollama/qwen3-coder-next:cloud",
                    "thinkingDefault": "low",
                    "typingMode": "thinking",
                    "subagents": {
                      "runTimeoutSeconds": 900,
                      "maxConcurrent": 4
                    },
                    "heartbeat": {
                      "includeReasoning": true
                    }
                  },
                  "list": [
                    {
                      "id": "ceo",
                      "default": true,
                      "name": "CEO",
                      "workspace": "/data/openclaw/workspace-ceo",
                      "agentDir": "/data/openclaw/agents/ceo/agent",
                  "tools": {
                    "allow": [
                      "read",
                      "write",
                      "process",
                      "browser",
                      "message",
                      "agents_list",
                          "sessions_list",
                          "sessions_history",
                          "sessions_send",
                          "sessions_spawn",
                          "session_status"
                        ]
                      },
                      "subagents": {
                        "allowAgents": ["po", "architecture"]
                      }
                    },
                    {
                      "id": "po",
                      "name": "PO",
                      "workspace": "/data/openclaw/workspace-po",
                      "agentDir": "/data/openclaw/agents/po/agent",
                      "tools": {
                        "allow": [
                          "read",
                          "write",
                          "exec",
                          "process",
                          "browser",
                          "message",
                          "agents_list",
                          "sessions_history",
                          "sessions_send",
                          "sessions_spawn",
                          "session_status"
                        ]
                      },
                      "subagents": {
                        "allowAgents": ["ceo", "architecture"]
                      }
                    },
                    {
                      "id": "architecture",
                      "name": "Architecture",
                      "workspace": "/data/openclaw/workspace-architecture",
                      "agentDir": "/data/openclaw/agents/architecture/agent",
                      "tools": {
                        "allow": [
                          "read",
                          "write",
                          "exec",
                          "process",
                          "browser",
                          "message",
                          "sessions_history",
                          "sessions_send",
                          "session_status"
                        ]
                      },
                      "subagents": {
                        "allowAgents": ["ceo", "po"]
                      }
                    }
                  ]
                },
                "bindings": [
                  {
                    "agentId": "ceo",
                    "match": {
                      "channel": "telegram",
                      "accountId": "default"
                    }
                  }
                ],
                "channels": {
                  "telegram": {
                    "dmPolicy": "allowlist",
                    "allowFrom": ["__TELEGRAM_CHAT_ID__"],
                    "groupPolicy": "allowlist",
                    "groupAllowFrom": ["__TELEGRAM_CHAT_ID__"],
                    "streaming": "partial",
                    "accounts": {
                      "default": {
                        "botToken": "__TELEGRAM_BOT_TOKEN_CEO__",
                        "dmPolicy": "allowlist",
                        "allowFrom": ["__TELEGRAM_CHAT_ID__"],
                        "groupPolicy": "allowlist",
                        "groupAllowFrom": ["__TELEGRAM_CHAT_ID__"],
                        "streaming": "partial"
                      }
                    }
                  }
                }
              }
              EOF
              sed -i "s/__TOKEN__/${OPENCLAW_GATEWAY_TOKEN}/g" "${OPENCLAW_STATE_DIR}/openclaw.json"
              sed -i "s/__TELEGRAM_BOT_TOKEN_CEO__/${TELEGRAM_BOT_TOKEN_CEO}/g" "${OPENCLAW_STATE_DIR}/openclaw.json"
              sed -i "s/__TELEGRAM_CHAT_ID__/${TELEGRAM_CHAT_ID}/g" "${OPENCLAW_STATE_DIR}/openclaw.json"
              # Hard guard: CEO must not have shell execution capability.
              jq '(.agents.list[] | select(.id=="ceo").tools.allow) |= map(select(. != "exec"))' \
                "${OPENCLAW_STATE_DIR}/openclaw.json" > "${OPENCLAW_STATE_DIR}/openclaw.json.tmp"
              mv "${OPENCLAW_STATE_DIR}/openclaw.json.tmp" "${OPENCLAW_STATE_DIR}/openclaw.json"
              mkdir -p ~/.openclaw
              cp "${OPENCLAW_STATE_DIR}/openclaw.json" ~/.openclaw/openclaw.json
              openclaw gateway &
              sleep 3
              echo "Gerando URL do dashboard..."
              openclaw dashboard --no-open || true
              wait
      volumes:
        - name: agent-config
          configMap:
            name: openclaw-agent-config
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  type: NodePort
  selector:
    app: openclaw
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
      nodePort: 31879
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
  labels:
    app: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
