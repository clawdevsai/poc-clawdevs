apiVersion: v1
kind: Pod
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  restartPolicy: Never
  containers:
    - name: openclaw
      image: debian:bookworm-slim
      ports:
        - name: gateway
          containerPort: 18789
      env:
        - name: OLLAMA_BASE_URL
          value: http://ollama:11434
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-auth
              key: gateway-token
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          export OPENCLAW_NO_ONBOARD=1
          export OPENCLAW_NO_PROMPT=1
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl bash
          rm -rf /var/lib/apt/lists/*
          curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard --no-prompt
          mkdir -p ~/.openclaw
          cat > ~/.openclaw/openclaw.json <<'EOF'
          {
            "gateway": {
              "mode": "local",
              "bind": "lan",
              "port": 18789,
              "auth": {
                "token": "__TOKEN__"
              }
            },
            "models": {
              "providers": {
                "ollama": {
                  "baseUrl": "http://ollama:11434",
                  "models": [
                    {
                      "id": "qwen3-coder-next:cloud",
                      "name": "qwen3-coder-next:cloud"
                    }
                  ]
                }
              }
            },
            "agents": {
              "defaults": {
                "model": "ollama/qwen3-coder-next:cloud"
              }
            }
          }
          EOF
          sed -i "s/__TOKEN__/${OPENCLAW_GATEWAY_TOKEN}/g" ~/.openclaw/openclaw.json
          openclaw config set gateway.mode local
          openclaw config set gateway.bind lan
          openclaw config set gateway.port 18789
          openclaw config set gateway.auth.token "${OPENCLAW_GATEWAY_TOKEN}"
          openclaw gateway --port 18789 --token "${OPENCLAW_GATEWAY_TOKEN}" &
          sleep 3
          echo "Gerando URL do dashboard..."
          openclaw dashboard --no-open || true
          wait
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  type: NodePort
  selector:
    app: openclaw
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
      nodePort: 31879
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-auth
type: Opaque
stringData:
  gateway-token: ***REMOVED***
