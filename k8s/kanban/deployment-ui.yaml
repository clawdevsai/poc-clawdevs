# Kanban UI — Next.js + TailwindCSS frontend para monitoramento do board.
# Porta 3000, conecta ao kanban-api-service:5001 para dados e SSE.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanban-ui
  namespace: ai-agents
  labels:
    app: kanban-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kanban-ui
  template:
    metadata:
      labels:
        app: kanban-ui
    spec:
      nodeSelector:
        workload-type: cpu-only
      containers:
        - name: ui
          image: kanban-ui:v7
          imagePullPolicy: IfNotPresent
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://kanban-api-service.ai-agents.svc.cluster.local:5001"
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kanban-ui-service
  namespace: ai-agents
  labels:
    app: kanban-ui
spec:
  selector:
    app: kanban-ui
  ports:
    - port: 3000
      targetPort: 3000
      name: http
      nodePort: 32000
  type: NodePort
