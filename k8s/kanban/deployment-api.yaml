# Kanban API — Backend Flask que serve o board e SSE real-time.
# Porta 5001, reutiliza Redis existente (issue_state.py + kanban:events stream).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanban-api
  namespace: ai-agents
  labels:
    app: kanban-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kanban-api
  template:
    metadata:
      labels:
        app: kanban-api
    spec:
      nodeSelector:
        workload-type: cpu-only
      containers:
        - name: api
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - "pip install -q flask flask-cors redis && exec python /config/kanban_api.py"
          envFrom:
            - configMapRef:
                name: redis-streams-config
                optional: true
          env:
            - name: CONFIG_DIR
              value: "/config"
            - name: REDIS_HOST
              value: "redis-service.ai-agents.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: KANBAN_API_PORT
              value: "5001"
          ports:
            - containerPort: 5001
          volumeMounts:
            - name: scripts
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: scripts
          configMap:
            name: kanban-api-scripts
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: kanban-api-service
  namespace: ai-agents
  labels:
    app: kanban-api
spec:
  selector:
    app: kanban-api
  ports:
    - port: 5001
      targetPort: 5001
      name: http
      nodePort: 32001
  type: NodePort
