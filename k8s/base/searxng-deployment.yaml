apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      automountServiceAccountToken: false
      containers:
        - name: searxng
          image: clawdevsai/searxng-runtime@sha256:d59cc03d02241d3c25d6948c534beb34fdaac51cbf31162b2e9eabeb0fb391bc
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SEARXNG_SETTINGS_PATH
              value: /etc/searxng/settings.yml
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: SEARXNG_SECRET
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 977
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: searxng-proxy
          image: clawdevsai/searxng-proxy@sha256:dd8bec8607fdb93fc9417f2494132585e35c955d31be4f50925e55a842c0be2e
          imagePullPolicy: IfNotPresent
          ports:
            - name: proxy
              containerPort: 18080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  labels:
    app: searxng
spec:
  selector:
    app: searxng
  ports:
    - name: proxy
      port: 8080
      targetPort: 18080
  type: ClusterIP
