apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-token-generator-egress
  labels:
    app: clawdevs-ai
spec:
  podSelector:
    matchLabels:
      app: panel-agent-token-generator
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: clawdevs-panel-backend
      ports:
        - protocol: TCP
          port: 8000
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
---
# Ollama: model/runtime pulls over HTTP/HTTPS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ollama-external-egress
  labels:
    app: clawdevs-ai
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
---
# Ingress hardening: OpenClaw gateway exposed only to panel backend/worker.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  labels:
    app: clawdevs-ai
spec:
  podSelector:
    matchLabels:
      app: clawdevs-ai
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: clawdevs-panel-backend
        - podSelector:
            matchLabels:
              app: clawdevs-panel-worker
      ports:
        - protocol: TCP
          port: 18789
