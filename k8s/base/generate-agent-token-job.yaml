apiVersion: batch/v1
kind: Job
metadata:
  name: generate-panel-agent-token
  namespace: default
spec:
  backoffLimit: 3
  template:
    metadata:
      name: generate-panel-agent-token
    spec:
      serviceAccountName: panel-agent-token-generator
      containers:
      - name: token-generator
        image: curlimages/curl:latest
        command:
        - /bin/sh
        - -c
        - |
          set -e

          # Configuration
          BACKEND_URL="http://clawdevs-panel-backend:8000/api"
          ADMIN_USER=$(cat /etc/admin-creds/username)
          ADMIN_PASS=$(cat /etc/admin-creds/password)
          MAX_RETRIES=30
          RETRY_DELAY=2

          echo "[$(date)] Starting token generation job..."

          # Wait for backend to be ready
          echo "[$(date)] Waiting for backend at $BACKEND_URL..."
          RETRY_COUNT=0
          until curl -s -f "$BACKEND_URL/auth/login" > /dev/null 2>&1 || [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            echo "[$(date)] Waiting... (attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)"
            sleep $RETRY_DELAY
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

          if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
            echo "[$(date)] ERROR: Backend not ready after $MAX_RETRIES attempts"
            exit 1
          fi

          echo "[$(date)] Backend is ready!"

          # Step 1: Login as admin
          echo "[$(date)] Logging in as admin..."
          LOGIN_RESPONSE=$(curl -s -X POST "$BACKEND_URL/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$ADMIN_USER\",\"password\":\"$ADMIN_PASS\"}")

          ADMIN_TOKEN=$(echo "$LOGIN_RESPONSE" | grep -o '"access_token":"[^"]*' | cut -d'"' -f4)

          if [ -z "$ADMIN_TOKEN" ]; then
            echo "[$(date)] ERROR: Failed to get admin token"
            echo "[$(date)] Response: $LOGIN_RESPONSE"
            exit 1
          fi

          echo "[$(date)] Admin token obtained"

          # Step 2: Generate agent token (30 days)
          echo "[$(date)] Generating agent token..."
          AGENT_RESPONSE=$(curl -s -X POST "$BACKEND_URL/auth/agent-token" \
            -H "Authorization: Bearer $ADMIN_TOKEN")

          AGENT_TOKEN=$(echo "$AGENT_RESPONSE" | grep -o '"access_token":"[^"]*' | cut -d'"' -f4)

          if [ -z "$AGENT_TOKEN" ]; then
            echo "[$(date)] ERROR: Failed to generate agent token"
            echo "[$(date)] Response: $AGENT_RESPONSE"
            exit 1
          fi

          echo "[$(date)] Agent token generated successfully"

          # Step 3: Update Secret with the real token
          echo "[$(date)] Updating panel-agent-credentials Secret..."
          kubectl patch secret panel-agent-credentials \
            -p "{\"stringData\":{\"PANEL_TOKEN\":\"$AGENT_TOKEN\"}}" \
            --type merge

          echo "[$(date)] Secret updated"

          # Step 4: Restart openclaw deployment to pick up new token
          echo "[$(date)] Restarting openclaw deployment..."
          kubectl rollout restart deployment openclaw-deployment || true

          echo "[$(date)] Token generation job completed successfully!"

        volumeMounts:
        - name: admin-credentials
          mountPath: /etc/admin-creds
          readOnly: true

      volumes:
      - name: admin-credentials
        secret:
          secretName: panel-admin-credentials

      restartPolicy: OnFailure

  ttlSecondsAfterFinished: 3600  # Clean up job after 1 hour

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: panel-agent-token-generator
  namespace: default

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: panel-agent-token-generator
  namespace: default
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments/rollout"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: panel-agent-token-generator
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: panel-agent-token-generator
subjects:
- kind: ServiceAccount
  name: panel-agent-token-generator
  namespace: default
