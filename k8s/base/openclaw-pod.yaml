apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clawdevs-ai
  labels:
    app: clawdevs-ai
spec:
  serviceName: clawdevs-ai
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: clawdevs-ai
  template:
    metadata:
      labels:
        app: clawdevs-ai
    spec:
      containers:
        - name: openclaw
          image: debian:bookworm-slim
          ports:
            - name: gateway
              containerPort: 18789
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: TELEGRAM_BOT_TOKEN_CEO
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: TELEGRAM_BOT_TOKEN_CEO
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: TELEGRAM_CHAT_ID_CEO
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_TOKEN
            - name: GITHUB_ORG
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_ORG
            - name: GITHUB_DEFAULT_REPOSITORY
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_DEFAULT_REPOSITORY
                  optional: true
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: OLLAMA_API_KEY
            - name: DIRECTORS_NAME
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: DIRECTORS_NAME
            - name: NODE_OPTIONS
              value: --max-old-space-size=3072
            - name: GH_CONFIG_DIR
              value: /data/openclaw/.config/gh
            - name: AGENT_ERROR_ROUTER_ENABLED
              value: "true"
            - name: AGENT_ERROR_ROUTER_INTERVAL_SECONDS
              value: "30"
            - name: DEV_BACKEND_CRON_ENABLED
              value: "true"
            - name: DEV_BACKEND_CRON_NAME
              value: "dev_backend_hourly_queue_poll"
            - name: DEV_BACKEND_CRON_EXPR
              value: "0 * * * *"
            - name: DEV_BACKEND_CRON_TZ
              value: "America/Sao_Paulo"
            - name: DEV_FRONTEND_CRON_ENABLED
              value: "true"
            - name: DEV_FRONTEND_CRON_NAME
              value: "dev_frontend_hourly_queue_poll"
            - name: DEV_FRONTEND_CRON_EXPR
              value: "15 * * * *"
            - name: DEV_FRONTEND_CRON_TZ
              value: "America/Sao_Paulo"
            - name: DEV_MOBILE_CRON_ENABLED
              value: "true"
            - name: DEV_MOBILE_CRON_NAME
              value: "dev_mobile_hourly_queue_poll"
            - name: DEV_MOBILE_CRON_EXPR
              value: "30 * * * *"
            - name: DEV_MOBILE_CRON_TZ
              value: "America/Sao_Paulo"
            - name: QA_CRON_ENABLED
              value: "true"
            - name: QA_CRON_NAME
              value: "qa_engineer_hourly_queue_poll"
            - name: QA_CRON_EXPR
              value: "45 * * * *"
            - name: QA_CRON_TZ
              value: "America/Sao_Paulo"
            - name: DEVOPS_SRE_CRON_ENABLED
              value: "true"
            - name: DEVOPS_SRE_CRON_NAME
              value: "devops_sre_queue_poll"
            - name: DEVOPS_SRE_CRON_EXPR
              value: "*/30 * * * *"
            - name: DEVOPS_SRE_CRON_TZ
              value: "America/Sao_Paulo"
            - name: SECURITY_ENGINEER_CRON_ENABLED
              value: "true"
            - name: SECURITY_ENGINEER_CRON_NAME
              value: "security_engineer_scan"
            - name: SECURITY_ENGINEER_CRON_EXPR
              value: "0 */6 * * *"
            - name: SECURITY_ENGINEER_CRON_TZ
              value: "America/Sao_Paulo"
            - name: OPENCLAW_LOG_LEVEL
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: OPENCLAW_LOG_LEVEL
                  optional: true
            - name: DEBUG_LOG_ENABLED
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: DEBUG_LOG_ENABLED
                  optional: true
          resources:
            requests:
              cpu: 1000m
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 6Gi
          startupProbe:
            tcpSocket:
              port: gateway
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: gateway
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: gateway
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: agent-config
              mountPath: /bootstrap/agent-config
              readOnly: true
            - name: openclaw-data
              mountPath: /data/openclaw
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              export OPENCLAW_NO_ONBOARD=1
              export OPENCLAW_NO_PROMPT=1
              export OPENCLAW_STATE_DIR=/data/openclaw
              export GH_CONFIG_DIR="${GH_CONFIG_DIR:-${OPENCLAW_STATE_DIR}/.config/gh}"
              export OPENCLAW_LOG_LEVEL="${OPENCLAW_LOG_LEVEL:-info}"
              BOOTSTRAP_LOG_DIR="${OPENCLAW_STATE_DIR}/backlog/status"
              BOOTSTRAP_LOG_FILE="${BOOTSTRAP_LOG_DIR}/openclaw-bootstrap.log"
              mkdir -p "${BOOTSTRAP_LOG_DIR}"
              touch "${BOOTSTRAP_LOG_FILE}"
              mkdir -p "${GH_CONFIG_DIR}"
              DEBUG_LOG_ENABLED="${DEBUG_LOG_ENABLED:-false}"
              if [ "${DEBUG_LOG_ENABLED}" = "true" ]; then
                export LOG_LEVEL=debug
                export DEBUG=1
                DEBUG_LOG_FILE="${BOOTSTRAP_LOG_DIR}/openclaw-debug.log"
                touch "${DEBUG_LOG_FILE}"
                exec > >(tee -a "${BOOTSTRAP_LOG_FILE}" "${DEBUG_LOG_FILE}") 2>&1
                export PS4='+ [${BASH_SOURCE##*/}:${LINENO}] '
                set -x
                echo "[debug] debug logging enabled"
              else
                export LOG_LEVEL="${LOG_LEVEL:-info}"
                exec > >(tee -a "${BOOTSTRAP_LOG_FILE}") 2>&1
              fi
              trap 'status=$?; echo "[bootstrap][error] line=${LINENO} cmd=${BASH_COMMAND} exit=${status}" >&2' ERR
              echo "[bootstrap] log file: ${BOOTSTRAP_LOG_FILE}"
              echo "[bootstrap] debug mode: ${DEBUG_LOG_ENABLED}"
              for var_name in OPENCLAW_GATEWAY_TOKEN TELEGRAM_BOT_TOKEN_CEO TELEGRAM_CHAT_ID GITHUB_TOKEN GITHUB_ORG OLLAMA_API_KEY; do
                if [ -n "${!var_name:-}" ]; then
                  echo "[bootstrap] ${var_name}=set"
                else
                  echo "[bootstrap] ${var_name}=empty"
                fi
              done
              # Garantir fallback de org/repositorio default
              export GITHUB_ORG="${GITHUB_ORG:-lukeware-ai}"
              export GITHUB_DEFAULT_REPOSITORY="${GITHUB_DEFAULT_REPOSITORY:-${GITHUB_REPOSITORY:-${GITHUB_ORG}/user-api}}"
              case "${GITHUB_DEFAULT_REPOSITORY}" in
                */*) ;;
                *) GITHUB_DEFAULT_REPOSITORY="${GITHUB_ORG}/${GITHUB_DEFAULT_REPOSITORY}" ;;
              esac
              export ACTIVE_GITHUB_REPOSITORY="${GITHUB_DEFAULT_REPOSITORY}"
              export ACTIVE_REPOSITORY_BRANCH="${ACTIVE_REPOSITORY_BRANCH:-main}"
              export OPENCLAW_SESSION_ID="${OPENCLAW_SESSION_ID:-$(date -u +%Y%m%dT%H%M%SZ)-$(cat /proc/sys/kernel/random/uuid | cut -d- -f1)}"
              # Fallback para quando DIRECTORS_NAME nao estiver definido no Secret
              export DIRECTORS_NAME="${DIRECTORS_NAME:-Director}"
              # Alinhar GH CLI caso GH_TOKEN venha em outro nome
              export GH_TOKEN="${GH_TOKEN:-${GITHUB_TOKEN:-}}"
              mkdir -p "${OPENCLAW_STATE_DIR}/contexts/repos"
              write_repository_context() {
                repo_ref="$1"
                repo_branch="$2"
                repo_slug="${repo_ref#*/}"
                repo_safe="$(printf '%s' "${repo_slug}" | tr '/' '_' | tr -cd '[:alnum:]_.-')"
                repo_id="$(gh api "repos/${repo_ref}" --jq '.id' 2>/dev/null || true)"
                if [ -z "${repo_id}" ]; then
                  repo_id="unknown"
                fi
                repo_context_dir="${OPENCLAW_STATE_DIR}/contexts/repos/${repo_safe}"
                mkdir -p "${repo_context_dir}/logs" "${repo_context_dir}/history"
                cat > "${OPENCLAW_STATE_DIR}/contexts/active_repository.env" <<EOF
              GITHUB_ORG=${GITHUB_ORG}
              ACTIVE_GITHUB_REPOSITORY=${repo_ref}
              ACTIVE_REPOSITORY_BRANCH=${repo_branch}
              ACTIVE_REPOSITORY_ID=${repo_id}
              OPENCLAW_SESSION_ID=${OPENCLAW_SESSION_ID}
              REPOSITORY_CONTEXT_DIR=${repo_context_dir}
              EOF
                export ACTIVE_GITHUB_REPOSITORY="${repo_ref}"
                export GITHUB_REPOSITORY="${repo_ref}"
                export GH_REPO="${repo_ref}"
                export ACTIVE_REPOSITORY_BRANCH="${repo_branch}"
                export ACTIVE_REPOSITORY_ID="${repo_id}"
                export REPOSITORY_CONTEXT_DIR="${repo_context_dir}"
                echo "[bootstrap] repository context active=${ACTIVE_GITHUB_REPOSITORY} id=${ACTIVE_REPOSITORY_ID} branch=${ACTIVE_REPOSITORY_BRANCH} session=${OPENCLAW_SESSION_ID}"
              }
              render_agent_context() {
                agent_workspace="$1"
                [ -f "${OPENCLAW_STATE_DIR}/contexts/active_repository.env" ] && . "${OPENCLAW_STATE_DIR}/contexts/active_repository.env"
                GITHUB_ORG_ESCAPED="$(printf '%s' "${GITHUB_ORG}" | sed -e 's/[\\/&]/\\&/g')"
                ACTIVE_GITHUB_REPOSITORY_ESCAPED="$(printf '%s' "${ACTIVE_GITHUB_REPOSITORY}" | sed -e 's/[\\/&]/\\&/g')"
                ACTIVE_REPOSITORY_BRANCH_ESCAPED="$(printf '%s' "${ACTIVE_REPOSITORY_BRANCH}" | sed -e 's/[\\/&]/\\&/g')"
                OPENCLAW_SESSION_ID_ESCAPED="$(printf '%s' "${OPENCLAW_SESSION_ID}" | sed -e 's/[\\/&]/\\&/g')"
                ACTIVE_REPOSITORY_ID_ESCAPED="$(printf '%s' "${ACTIVE_REPOSITORY_ID}" | sed -e 's/[\\/&]/\\&/g')"
                if [ -f "${agent_workspace}/AGENTS.md" ]; then
                  sed -i "s|__GITHUB_ORG__|${GITHUB_ORG_ESCAPED}|g" "${agent_workspace}/AGENTS.md"
                  sed -i "s|__ACTIVE_GITHUB_REPOSITORY__|${ACTIVE_GITHUB_REPOSITORY_ESCAPED}|g" "${agent_workspace}/AGENTS.md"
                  sed -i "s|__ACTIVE_REPOSITORY_BRANCH__|${ACTIVE_REPOSITORY_BRANCH_ESCAPED}|g" "${agent_workspace}/AGENTS.md"
                  sed -i "s|__OPENCLAW_SESSION_ID__|${OPENCLAW_SESSION_ID_ESCAPED}|g" "${agent_workspace}/AGENTS.md"
                  sed -i "s|__ACTIVE_REPOSITORY_ID__|${ACTIVE_REPOSITORY_ID_ESCAPED}|g" "${agent_workspace}/AGENTS.md"
                  sed -i "s|__GITHUB_REPOSITORY__|${ACTIVE_GITHUB_REPOSITORY_ESCAPED}|g" "${agent_workspace}/AGENTS.md"
                fi
                cat > "${agent_workspace}/REPOSITORY_CONTEXT.md" <<EOF
              # REPOSITORY_CONTEXT
              - organization: ${GITHUB_ORG}
              - active_repository: ${ACTIVE_GITHUB_REPOSITORY}
              - repository_id: ${ACTIVE_REPOSITORY_ID}
              - active_branch: ${ACTIVE_REPOSITORY_BRANCH}
              - session_id: ${OPENCLAW_SESSION_ID}
              - repository_context_dir: ${REPOSITORY_CONTEXT_DIR}
              - policy: validar contexto ativo antes de qualquer acao e nunca misturar artefatos entre repositorios.
              EOF
              }
              echo "[bootstrap] GH_CONFIG_DIR=${GH_CONFIG_DIR}"
              apt-get update
              apt-get install -y --no-install-recommends ca-certificates curl bash git jq gh chromium
              apt-get upgrade -y
              apt-get autoremove -y
              apt-get clean
              rm -rf /var/lib/apt/lists/*
              if ! command -v gh >/dev/null 2>&1; then
                echo "GitHub CLI nao foi instalado corretamente" >&2
                exit 1
              fi
              gh --version | head -n 1
              browser_bin="$(command -v chromium || command -v chromium-browser || command -v google-chrome || command -v google-chrome-stable || command -v brave-browser || command -v msedge || command -v microsoft-edge || true)"
              if [ -z "${browser_bin}" ]; then
                echo "Browser suportado nao encontrado apos a instalacao do Chromium" >&2
                exit 1
              fi
              cat > /usr/local/bin/openclaw-chrome <<EOF
              #!/usr/bin/env bash
              exec "${browser_bin}" --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage "\$@"
              EOF
              chmod +x /usr/local/bin/openclaw-chrome
              ln -sf /usr/local/bin/openclaw-chrome /usr/local/bin/chromium-browser
              ln -sf /usr/local/bin/openclaw-chrome /usr/local/bin/google-chrome
              ln -sf /usr/local/bin/openclaw-chrome /usr/local/bin/google-chrome-stable
              ln -sf /usr/local/bin/openclaw-chrome /usr/local/bin/chrome
              export CHROME_BIN=/usr/local/bin/openclaw-chrome
              echo "Browser disponivel: ${browser_bin} (wrapper: ${CHROME_BIN})"
              # Autenticar GitHub CLI de forma nao interativa para os agentes
              if [ -n "${GH_TOKEN:-}" ]; then
                printf '%s' "${GH_TOKEN}" | gh auth login --hostname github.com --with-token >/tmp/gh-auth.log 2>&1 || true
                gh auth setup-git >/tmp/gh-auth-setup-git.log 2>&1 || true
                gh auth status >/tmp/gh-auth-status.log 2>&1 || true
              else
                echo "GH_TOKEN ausente: GitHub CLI iniciara sem autenticacao persistida" >/tmp/gh-auth-status.log
              fi
              if ! gh api "repos/${GITHUB_DEFAULT_REPOSITORY}" --silent >/dev/null 2>&1; then
                discovered_repo="$(gh repo list "${GITHUB_ORG}" --limit 1 --json nameWithOwner --jq '.[0].nameWithOwner' 2>/dev/null || true)"
                if [ -n "${discovered_repo}" ]; then
                  GITHUB_DEFAULT_REPOSITORY="${discovered_repo}"
                fi
              fi
              if ! gh api "repos/${GITHUB_DEFAULT_REPOSITORY}" --silent >/dev/null 2>&1; then
                GITHUB_DEFAULT_REPOSITORY="${GITHUB_ORG}/user-api"
              fi
              write_repository_context "${GITHUB_DEFAULT_REPOSITORY}" "${ACTIVE_REPOSITORY_BRANCH}"
              mkdir -p "${OPENCLAW_STATE_DIR}/bin"
              cat > "${OPENCLAW_STATE_DIR}/bin/repository-context-lib.sh" <<'EOF'
              #!/usr/bin/env bash
              set -euo pipefail
              : "${OPENCLAW_STATE_DIR:=/data/openclaw}"
              : "${GITHUB_ORG:=}"
              CONTEXT_FILE="${OPENCLAW_STATE_DIR}/contexts/active_repository.env"
              load_repo_context() {
                if [ -f "${CONTEXT_FILE}" ]; then
                  . "${CONTEXT_FILE}"
                fi
              }
              normalize_repo_ref() {
                input="$1"
                case "${input}" in
                  */*) printf '%s\n' "${input}" ;;
                  *) printf '%s/%s\n' "${GITHUB_ORG}" "${input}" ;;
                esac
              }
              resolve_repo_id() {
                ref="$1"
                gh api "repos/${ref}" --jq '.id' 2>/dev/null || true
              }
              write_repo_context_file() {
                ref="$1"
                branch="$2"
                repo_slug="${ref#*/}"
                repo_safe="$(printf '%s' "${repo_slug}" | tr '/' '_' | tr -cd '[:alnum:]_.-')"
                repo_id="$(resolve_repo_id "${ref}")"
                [ -n "${repo_id}" ] || repo_id="unknown"
                repo_context_dir="${OPENCLAW_STATE_DIR}/contexts/repos/${repo_safe}"
                mkdir -p "${repo_context_dir}/logs" "${repo_context_dir}/history"
                cat > "${CONTEXT_FILE}" <<CTX
              GITHUB_ORG=${GITHUB_ORG}
              ACTIVE_GITHUB_REPOSITORY=${ref}
              ACTIVE_REPOSITORY_BRANCH=${branch}
              ACTIVE_REPOSITORY_ID=${repo_id}
              OPENCLAW_SESSION_ID=${OPENCLAW_SESSION_ID:-unknown}
              REPOSITORY_CONTEXT_DIR=${repo_context_dir}
              CTX
              }
              EOF
              cat > "${OPENCLAW_STATE_DIR}/bin/claw-repo-discover" <<'EOF'
              #!/usr/bin/env bash
              set -euo pipefail
              : "${OPENCLAW_STATE_DIR:=/data/openclaw}"
              . "${OPENCLAW_STATE_DIR}/bin/repository-context-lib.sh"
              filter="${1:-}"
              if [ -n "${filter}" ]; then
                gh repo list "${GITHUB_ORG}" --limit 200 --json nameWithOwner,isPrivate,description --jq --arg f "${filter}" '.[] | select(.nameWithOwner | test($f;"i")) | [.nameWithOwner, (if .isPrivate then "private" else "public" end), (.description // "")] | @tsv'
              else
                gh repo list "${GITHUB_ORG}" --limit 200 --json nameWithOwner,isPrivate,description --jq '.[] | [.nameWithOwner, (if .isPrivate then "private" else "public" end), (.description // "")] | @tsv'
              fi
              EOF
              cat > "${OPENCLAW_STATE_DIR}/bin/claw-repo-ensure" <<'EOF'
              #!/usr/bin/env bash
              set -euo pipefail
              : "${OPENCLAW_STATE_DIR:=/data/openclaw}"
              . "${OPENCLAW_STATE_DIR}/bin/repository-context-lib.sh"
              if [ "$#" -lt 1 ]; then
                echo "usage: claw-repo-ensure <repo|org/repo> [--create]"
                exit 1
              fi
              target_ref="$(normalize_repo_ref "$1")"
              create_mode="false"
              if [ "${2:-}" = "--create" ]; then
                create_mode="true"
              fi
              if gh api "repos/${target_ref}" --silent >/dev/null 2>&1; then
                echo "${target_ref}"
                exit 0
              fi
              if [ "${create_mode}" != "true" ]; then
                echo "NOT_FOUND:${target_ref}"
                exit 2
              fi
              repo_name="${target_ref#*/}"
              gh repo create "${target_ref}" --private --add-readme >/tmp/claw-repo-create.log 2>&1
              echo "${target_ref}"
              EOF
              cat > "${OPENCLAW_STATE_DIR}/bin/claw-repo-switch" <<'EOF'
              #!/usr/bin/env bash
              set -euo pipefail
              : "${OPENCLAW_STATE_DIR:=/data/openclaw}"
              . "${OPENCLAW_STATE_DIR}/bin/repository-context-lib.sh"
              if [ "$#" -lt 1 ]; then
                echo "usage: claw-repo-switch <repo|org/repo> [branch]"
                exit 1
              fi
              target_ref="$(normalize_repo_ref "$1")"
              branch="${2:-main}"
              gh api "repos/${target_ref}" --silent >/dev/null 2>&1
              write_repo_context_file "${target_ref}" "${branch}"
              for workspace in "${OPENCLAW_STATE_DIR}/workspace-ceo" "${OPENCLAW_STATE_DIR}/workspace-po" "${OPENCLAW_STATE_DIR}/workspace-arquiteto" "${OPENCLAW_STATE_DIR}/workspace-dev_backend"; do
                [ -f "${workspace}/REPOSITORY_CONTEXT.md" ] || true
                target_ref_escaped="$(printf '%s' "${target_ref}" | sed -e 's/[\\/&]/\\&/g')"
                branch_escaped="$(printf '%s' "${branch}" | sed -e 's/[\\/&]/\\&/g')"
                session_escaped="$(printf '%s' "${OPENCLAW_SESSION_ID:-unknown}" | sed -e 's/[\\/&]/\\&/g')"
                repo_id="$(resolve_repo_id "${target_ref}")"
                [ -n "${repo_id}" ] || repo_id="unknown"
                repo_id_escaped="$(printf '%s' "${repo_id}" | sed -e 's/[\\/&]/\\&/g')"
                if [ -f "${workspace}/AGENTS.md" ]; then
                  sed -i -E "s|^(  active_repository: ).*$|\\1\"${target_ref_escaped}\"|" "${workspace}/AGENTS.md"
                  sed -i -E "s|^(  active_branch: ).*$|\\1\"${branch_escaped}\"|" "${workspace}/AGENTS.md"
                  sed -i -E "s|^(  active_repository_id: ).*$|\\1\"${repo_id_escaped}\"|" "${workspace}/AGENTS.md"
                  sed -i -E "s|^(  session_id: ).*$|\\1\"${session_escaped}\"|" "${workspace}/AGENTS.md"
                fi
                cat > "${workspace}/REPOSITORY_CONTEXT.md" <<CTX
              # REPOSITORY_CONTEXT
              - organization: ${GITHUB_ORG}
              - active_repository: ${target_ref}
              - repository_id: ${repo_id}
              - active_branch: ${branch}
              - session_id: ${OPENCLAW_SESSION_ID:-unknown}
              - repository_context_dir: ${OPENCLAW_STATE_DIR}/contexts/repos/$(printf '%s' "${target_ref#*/}" | tr '/' '_' | tr -cd '[:alnum:]_.-')
              - policy: validar contexto ativo antes de qualquer acao e nunca misturar artefatos entre repositorios.
              CTX
              done
              printf 'active_repository=%s\nbranch=%s\n' "${target_ref}" "${branch}"
              EOF
              chmod +x "${OPENCLAW_STATE_DIR}/bin/repository-context-lib.sh" "${OPENCLAW_STATE_DIR}/bin/claw-repo-discover" "${OPENCLAW_STATE_DIR}/bin/claw-repo-ensure" "${OPENCLAW_STATE_DIR}/bin/claw-repo-switch"
              ln -sf "${OPENCLAW_STATE_DIR}/bin/claw-repo-discover" /usr/local/bin/claw-repo-discover
              ln -sf "${OPENCLAW_STATE_DIR}/bin/claw-repo-ensure" /usr/local/bin/claw-repo-ensure
              ln -sf "${OPENCLAW_STATE_DIR}/bin/claw-repo-switch" /usr/local/bin/claw-repo-switch
              curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard --no-prompt
              mkdir -p "${OPENCLAW_STATE_DIR}"
              mkdir -p ~/.openclaw
              mkdir -p "${OPENCLAW_STATE_DIR}/scheduler"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/status"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/idea"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/specs"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/user_story"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/tasks"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/briefs"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/implementation/docs"
              mkdir -p "${OPENCLAW_STATE_DIR}/backlog/session_finished"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-ceo"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-po"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-arquiteto"
              mkdir -p "${OPENCLAW_STATE_DIR}/workspace-dev_backend"
              mkdir -p "${OPENCLAW_STATE_DIR}/agents/ceo/agent" "${OPENCLAW_STATE_DIR}/agents/po/agent" "${OPENCLAW_STATE_DIR}/agents/arquiteto/agent" "${OPENCLAW_STATE_DIR}/agents/dev_backend/agent"
              cp /bootstrap/agent-config/ceo-AGENTS.md "${OPENCLAW_STATE_DIR}/workspace-ceo/AGENTS.md"
              cp /bootstrap/agent-config/ceo-BOOT.md "${OPENCLAW_STATE_DIR}/workspace-ceo/BOOT.md"
              cp /bootstrap/agent-config/ceo-BOOTSTRAP.md "${OPENCLAW_STATE_DIR}/workspace-ceo/BOOTSTRAP.md"
              cp /bootstrap/agent-config/ceo-HEARTBEAT.md "${OPENCLAW_STATE_DIR}/workspace-ceo/HEARTBEAT.md"
              cp /bootstrap/agent-config/ceo-IDENTITY.md "${OPENCLAW_STATE_DIR}/workspace-ceo/IDENTITY.md"
              cp /bootstrap/agent-config/ceo-INPUT_SCHEMA.json "${OPENCLAW_STATE_DIR}/workspace-ceo/INPUT_SCHEMA.json"
              cp /bootstrap/agent-config/ceo-SOUL.md "${OPENCLAW_STATE_DIR}/workspace-ceo/SOUL.md"
              cp /bootstrap/agent-config/ceo-SECURITY_TEST_CASES.md "${OPENCLAW_STATE_DIR}/workspace-ceo/SECURITY_TEST_CASES.md"
              cp /bootstrap/agent-config/ceo-USER.md "${OPENCLAW_STATE_DIR}/workspace-ceo/USER.md"
              cp /bootstrap/agent-config/ceo-TOOLS.md "${OPENCLAW_STATE_DIR}/workspace-ceo/TOOLS.md"
              DIRECTORS_NAME_ESCAPED="$(printf '%s' "${DIRECTORS_NAME}" | sed -e 's/[\\/&]/\\&/g')"
              sed -i "s|\${DIRECTORS_NAME}|${DIRECTORS_NAME_ESCAPED}|g" "${OPENCLAW_STATE_DIR}/workspace-ceo/USER.md"
