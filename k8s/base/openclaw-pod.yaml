apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clawdevs-ai
  labels:
    app: clawdevs-ai
spec:
  serviceName: clawdevs-ai
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: clawdevs-ai
  template:
    metadata:
      labels:
        app: clawdevs-ai
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: openclaw
          image: clawdevsai/openclaw-runtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: gateway
              containerPort: 18789
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: TELEGRAM_BOT_TOKEN_CEO
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: TELEGRAM_BOT_TOKEN_CEO
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: TELEGRAM_CHAT_ID_CEO
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_TOKEN
            - name: GITHUB_ORG
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_ORG
            - name: GITHUB_DEFAULT_REPOSITORY
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: GITHUB_DEFAULT_REPOSITORY
                  optional: true
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: OLLAMA_API_KEY
            - name: DIRECTORS_NAME
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: DIRECTORS_NAME
            - name: LANGUAGE
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: LANGUAGE
                  optional: true
            - name: NODE_OPTIONS
              value: --max-old-space-size=2048
            - name: GH_CONFIG_DIR
              value: /data/openclaw/.config/gh
            - name: AGENT_ERROR_ROUTER_ENABLED
              value: "true"
            - name: AGENT_ERROR_ROUTER_INTERVAL_SECONDS
              value: "30"
            - name: DEV_BACKEND_CRON_ENABLED
              value: "true"
            - name: DEV_BACKEND_CRON_NAME
              value: "dev_backend_hourly_queue_poll"
            - name: DEV_BACKEND_CRON_EXPR
              value: "0 * * * *"
            - name: DEV_BACKEND_CRON_TZ
              value: "America/Sao_Paulo"
            - name: DEV_FRONTEND_CRON_ENABLED
              value: "true"
            - name: DEV_FRONTEND_CRON_NAME
              value: "dev_frontend_hourly_queue_poll"
            - name: DEV_FRONTEND_CRON_EXPR
              value: "15 * * * *"
            - name: DEV_FRONTEND_CRON_TZ
              value: "America/Sao_Paulo"
            - name: DEV_MOBILE_CRON_ENABLED
              value: "true"
            - name: DEV_MOBILE_CRON_NAME
              value: "dev_mobile_hourly_queue_poll"
            - name: DEV_MOBILE_CRON_EXPR
              value: "30 * * * *"
            - name: DEV_MOBILE_CRON_TZ
              value: "America/Sao_Paulo"
            - name: QA_CRON_ENABLED
              value: "true"
            - name: QA_CRON_NAME
              value: "qa_engineer_hourly_queue_poll"
            - name: QA_CRON_EXPR
              value: "45 * * * *"
            - name: QA_CRON_TZ
              value: "America/Sao_Paulo"
            - name: DEVOPS_SRE_CRON_ENABLED
              value: "true"
            - name: DEVOPS_SRE_CRON_NAME
              value: "devops_sre_queue_poll"
            - name: DEVOPS_SRE_CRON_EXPR
              value: "*/30 * * * *"
            - name: DEVOPS_SRE_CRON_TZ
              value: "America/Sao_Paulo"
            - name: SECURITY_ENGINEER_CRON_ENABLED
              value: "true"
            - name: SECURITY_ENGINEER_CRON_NAME
              value: "security_engineer_scan"
            - name: SECURITY_ENGINEER_CRON_EXPR
              value: "0 */6 * * *"
            - name: SECURITY_ENGINEER_CRON_TZ
              value: "America/Sao_Paulo"
            - name: UX_DESIGNER_CRON_ENABLED
              value: "true"
            - name: UX_DESIGNER_CRON_NAME
              value: "ux_designer_queue_poll"
            - name: UX_DESIGNER_CRON_EXPR
              value: "0 */4 * * *"
            - name: UX_DESIGNER_CRON_TZ
              value: "America/Sao_Paulo"
            - name: DBA_DATA_ENGINEER_CRON_ENABLED
              value: "true"
            - name: DBA_DATA_ENGINEER_CRON_NAME
              value: "dba_data_engineer_queue_poll"
            - name: DBA_DATA_ENGINEER_CRON_EXPR
              value: "30 */4 * * *"
            - name: DBA_DATA_ENGINEER_CRON_TZ
              value: "America/Sao_Paulo"
            - name: MEMORY_CURATOR_CRON_ENABLED
              value: "true"
            - name: MEMORY_CURATOR_CRON_NAME
              value: "memory_curator_promote"
            - name: MEMORY_CURATOR_CRON_EXPR
              value: "0 2 * * *"
            - name: MEMORY_CURATOR_CRON_TZ
              value: "America/Sao_Paulo"
            - name: MEMORY_BASE_PATH
              value: "/data/openclaw/memory"
            - name: PROVEDOR_LLM
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: PROVEDOR_LLM
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: OPENROUTER_API_KEY
                  optional: true
            - name: OPENROUTER_MODEL
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: OPENROUTER_MODEL
                  optional: true
            - name: OPENROUTER_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: OPENROUTER_BASE_URL
                  optional: true
            - name: OPENCLAW_LOG_LEVEL
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: OPENCLAW_LOG_LEVEL
                  optional: true
            - name: DEBUG_LOG_ENABLED
              valueFrom:
                secretKeyRef:
                  name: openclaw-auth
                  key: DEBUG_LOG_ENABLED
                  optional: true
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: agent-config
              mountPath: /bootstrap/agent-config
              readOnly: true
            - name: openclaw-data
              mountPath: /data/openclaw
            - name: bootstrap-scripts
              mountPath: /bootstrap/scripts
              readOnly: true
          command: ["/bin/bash", "-lc"]
          args:
            - |
              . /bootstrap/scripts/00-env.sh
              . /bootstrap/scripts/01-deps.sh
              . /bootstrap/scripts/02-web-tools.sh
              . /bootstrap/scripts/03-gh-auth.sh
              . /bootstrap/scripts/04-repo-tools.sh
              . /bootstrap/scripts/05-install-openclaw.sh
              . /bootstrap/scripts/06-dirs.sh
              . /bootstrap/scripts/07-agent-workspaces.sh
              . /bootstrap/scripts/08-git-hooks.sh
              . /bootstrap/scripts/09-openclaw-config.sh
              . /bootstrap/scripts/10-background-services.sh
              # Compat fix: remove chave depreciada que quebra o boot em configs persistidas.
              if [ -f "${OPENCLAW_STATE_DIR}/openclaw.json" ]; then
                _tmp_openclaw_json="$(mktemp)"
                if jq 'del(.agents.defaults.memorySearch.baseUrl)' \
                    "${OPENCLAW_STATE_DIR}/openclaw.json" > "${_tmp_openclaw_json}"; then
                  mv "${_tmp_openclaw_json}" "${OPENCLAW_STATE_DIR}/openclaw.json"
                  mkdir -p ~/.openclaw
                  cp "${OPENCLAW_STATE_DIR}/openclaw.json" ~/.openclaw/openclaw.json
                else
                  rm -f "${_tmp_openclaw_json}"
                  echo "[bootstrap] warning: failed to sanitize deprecated memorySearch.baseUrl"
                fi
              fi
              # Compat fix: schema atual exige models.providers.openrouter.baseUrl (string).
              if [ -f "${OPENCLAW_STATE_DIR}/openclaw.json" ]; then
                _tmp_openclaw_json="$(mktemp)"
                _or_base_url="${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
                if jq --arg baseUrl "${_or_base_url}" '
                    if .models.providers.openrouter? then
                      .models.providers.openrouter.baseUrl = (.models.providers.openrouter.baseUrl // $baseUrl)
                    else
                      .
                    end
                  ' "${OPENCLAW_STATE_DIR}/openclaw.json" > "${_tmp_openclaw_json}"; then
                  mv "${_tmp_openclaw_json}" "${OPENCLAW_STATE_DIR}/openclaw.json"
                  mkdir -p ~/.openclaw
                  cp "${OPENCLAW_STATE_DIR}/openclaw.json" ~/.openclaw/openclaw.json
                else
                  rm -f "${_tmp_openclaw_json}"
                  echo "[bootstrap] warning: failed to enforce openrouter.baseUrl before doctor"
                fi
              fi

              echo "[bootstrap] starting openclaw gateway"
              echo "[bootstrap] running openclaw doctor --fix"
              openclaw doctor --fix || echo "[bootstrap] warning: openclaw doctor --fix failed, proceeding with existing config"
              # Doctor --fix pode reescrever config; reforca compat antes de subir o gateway.
              if [ -f "${OPENCLAW_STATE_DIR}/openclaw.json" ]; then
                _tmp_openclaw_json="$(mktemp)"
                _or_base_url="${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
                if jq --arg baseUrl "${_or_base_url}" '
                    if .models.providers.openrouter? then
                      .models.providers.openrouter.baseUrl = (.models.providers.openrouter.baseUrl // $baseUrl)
                    else
                      .
                    end
                  ' "${OPENCLAW_STATE_DIR}/openclaw.json" > "${_tmp_openclaw_json}"; then
                  mv "${_tmp_openclaw_json}" "${OPENCLAW_STATE_DIR}/openclaw.json"
                  mkdir -p ~/.openclaw
                  cp "${OPENCLAW_STATE_DIR}/openclaw.json" ~/.openclaw/openclaw.json
                else
                  rm -f "${_tmp_openclaw_json}"
                  echo "[bootstrap] warning: failed to enforce openrouter.baseUrl after doctor"
                fi
              fi
              set +e
              openclaw gateway run --bind lan --port 18789
              gateway_exit=$?
              set -e
              echo "[bootstrap] openclaw gateway exited with code ${gateway_exit}"
              latest_gateway_log="$(ls -1t /tmp/openclaw/openclaw-*.log 2>/dev/null | head -n 1 || true)"
              if [ -n "${latest_gateway_log}" ] && [ -f "${latest_gateway_log}" ]; then
                cp "${latest_gateway_log}" "${BOOTSTRAP_LOG_DIR}/openclaw-gateway-last.log" || true
                cat "${latest_gateway_log}" || true
              fi
              exit "${gateway_exit}"
      volumes:
        - name: agent-config
          configMap:
            name: openclaw-agent-config
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: bootstrap-scripts
          configMap:
            name: openclaw-bootstrap-scripts
            defaultMode: 0555
---
apiVersion: v1
kind: Service
metadata:
  name: clawdevs-ai
  labels:
    app: clawdevs-ai
spec:
  type: NodePort
  selector:
    app: clawdevs-ai
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
      nodePort: 31879
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
  labels:
    app: clawdevs-ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi
