apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawdevs-panel-frontend
  labels:
    app: clawdevs-panel-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawdevs-panel-frontend
  template:
    metadata:
      labels:
        app: clawdevs-panel-frontend
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-backend
          image: busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command:
            - sh
            - -c
            - |
              echo "Waiting for clawdevs-panel-backend:8000..."
              until nc -z clawdevs-panel-backend 8000 2>/dev/null; do
                sleep 2
              done
              echo "Backend is ready!"
      containers:
        - name: frontend
          image: clawdevsai/clawdevs-panel-frontend@sha256:c86b2cee8005309bc143fd4506726844c8a94bd862c62da7c0775b5758a8db1b
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: "http://clawdevs-panel-backend:8000"
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 100m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
