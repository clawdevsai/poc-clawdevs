apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawdevs-panel-frontend
  labels:
    app: clawdevs-panel-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawdevs-panel-frontend
  template:
    metadata:
      labels:
        app: clawdevs-panel-frontend
    spec:
      containers:
        - name: frontend
          image: clawdevs-panel-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://clawdevs-panel-backend:8000"
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
