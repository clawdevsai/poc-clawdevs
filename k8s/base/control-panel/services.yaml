apiVersion: v1
kind: Service
metadata:
  name: clawdevs-panel-db
  labels:
    app: clawdevs-panel-db
spec:
  clusterIP: None
  selector:
    app: clawdevs-panel-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
# Acesso externo ao Postgres desabilitado por padrão (segurança).
# Para habilitar em ambiente de desenvolvimento, use um overlay que adicione
# um patch convertendo este Service para NodePort.
apiVersion: v1
kind: Service
metadata:
  name: clawdevs-panel-db-external
  labels:
    app: clawdevs-panel-db
  annotations:
    # Exposto apenas para acesso interno entre pods (não é NodePort)
    clawdevs.ai/access: "internal-only"
spec:
  type: ClusterIP
  selector:
    app: clawdevs-panel-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: clawdevs-panel-redis
  labels:
    app: clawdevs-panel-redis
spec:
  selector:
    app: clawdevs-panel-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
# Acesso externo ao Redis desabilitado por padrão (segurança).
# Para habilitar em ambiente de desenvolvimento, use um overlay.
apiVersion: v1
kind: Service
metadata:
  name: clawdevs-panel-redis-external
  labels:
    app: clawdevs-panel-redis
  annotations:
    clawdevs.ai/access: "internal-only"
spec:
  type: ClusterIP
  selector:
    app: clawdevs-panel-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: clawdevs-panel-frontend
  labels:
    app: clawdevs-panel-frontend
spec:
  type: NodePort
  selector:
    app: clawdevs-panel-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 31880
---
apiVersion: v1
kind: Service
metadata:
  name: clawdevs-panel-backend
  labels:
    app: clawdevs-panel-backend
spec:
  type: NodePort
  selector:
    app: clawdevs-panel-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 31881
