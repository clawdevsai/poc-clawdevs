apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clawdevs-panel-db
  labels:
    app: clawdevs-panel-db
spec:
  serviceName: clawdevs-panel-db
  replicas: 1
  selector:
    matchLabels:
      app: clawdevs-panel-db
  template:
    metadata:
      labels:
        app: clawdevs-panel-db
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: clawdevsai/postgres-runtime@sha256:538a39488026fbe64e0d9d4330607046725bb11c7b987fbc5e91dc8cde5c7b4f
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: clawdevs_panel
            - name: POSTGRES_USER
              value: panel
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clawdevs-panel-auth
                  key: PANEL_DB_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "panel", "-d", "clawdevs_panel"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "panel", "-d", "clawdevs_panel"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: panel-db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: panel-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
