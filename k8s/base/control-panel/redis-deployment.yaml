apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawdevs-panel-redis
  labels:
    app: clawdevs-panel-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawdevs-panel-redis
  template:
    metadata:
      labels:
        app: clawdevs-panel-redis
    spec:
      containers:
        - name: redis
          image: redis:8-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clawdevs-panel-auth
                  key: PANEL_REDIS_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
