apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - openclaw-pod.yaml
  - ollama-pod.yaml
  - networkpolicy-allow-egress.yaml

configMapGenerator:
  - name: openclaw-agent-config
    files:
      - ceo-AGENTS.md=openclaw-config/ceo/AGENTS.md
      - ceo-IDENTITY.md=openclaw-config/ceo/IDENTITY.md
      - ceo-SOUL.md=openclaw-config/ceo/SOUL.md
      - ceo-USER.md=openclaw-config/ceo/USER.md
      - ceo-skill-delegate-to-po-SKILL.md=openclaw-config/ceo/skills/delegate-to-po/SKILL.md
      - ceo-skill-research-and-delegate-SKILL.md=openclaw-config/ceo/skills/research-and-delegate/SKILL.md
      - po-AGENTS.md=openclaw-config/po/AGENTS.md
      - po-SOUL.md=openclaw-config/po/SOUL.md
      - po-skill-product-delivery-SKILL.md=openclaw-config/po/skills/product-delivery/SKILL.md
      - architecture-AGENTS.md=openclaw-config/architecture/AGENTS.md
      - architecture-SOUL.md=openclaw-config/architecture/SOUL.md
      - architecture-skill-technical-design-SKILL.md=openclaw-config/architecture/skills/technical-design/SKILL.md

generatorOptions:
  disableNameSuffixHash: true
