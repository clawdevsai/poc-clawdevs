apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - openclaw-pod.yaml
  - ollama-pod.yaml
  - networkpolicy-allow-egress.yaml

secretGenerator:
  - name: openclaw-auth
    envs:
      - .env
  - name: ollama-auth
    envs:
      - .env

configMapGenerator:
  - name: openclaw-agent-config
    files:
      - ceo-AGENTS.md=openclaw-config/ceo/AGENTS.md
      - ceo-IDENTITY.md=openclaw-config/ceo/IDENTITY.md
      - ceo-SOUL.md=openclaw-config/ceo/SOUL.md
      - ceo-USER.md=openclaw-config/ceo/USER.md
      - ceo-skill-SKILL.md=openclaw-config/ceo/SKILL.md
      - po-AGENTS.md=openclaw-config/po/AGENTS.md
      - po-IDENTITY.md=openclaw-config/po/IDENTITY.md
      - po-SOUL.md=openclaw-config/po/SOUL.md
      - po-USER.md=openclaw-config/po/USER.md
      - po-skill-SKILL.md=openclaw-config/po/SKILL.md
      - arquiteto-AGENTS.md=openclaw-config/arquiteto/AGENTS.md
      - arquiteto-IDENTITY.md=openclaw-config/arquiteto/IDENTITY.md
      - arquiteto-SOUL.md=openclaw-config/arquiteto/SOUL.md
      - arquiteto-USER.md=openclaw-config/arquiteto/USER.md
      - arquiteto-skill-SKILL.md=openclaw-config/arquiteto/SKILL.md

generatorOptions:
  disableNameSuffixHash: true
