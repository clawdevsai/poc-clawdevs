apiVersion: v1
kind: Namespace
metadata:
  name: clawdevs-ai
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clawdevs-config
  namespace: clawdevs-ai
data:
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KEY_PREFIX_PROJECT: project:v1
  MODEL_PROVIDER: ollama
  MODEL_MODE: local
  OLLAMA_BASE_URL: http://ollama:11434
  OLLAMA_MODEL: qwen2.5-coder:32b
  OPENCLAW_REQUIRED: "true"
  OPENCLAW_GATEWAY_WS: ws://openclaw-gateway:18789
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: clawdevs-ai
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: clawdevs-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: clawdevs-ai
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: clawdevs-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
      volumes:
        - name: ollama-models
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-gateway
  namespace: clawdevs-ai
spec:
  selector:
    app: openclaw-gateway
  ports:
    - name: ws
      port: 18789
      targetPort: 18789
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-gateway
  namespace: clawdevs-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-gateway
  template:
    metadata:
      labels:
        app: openclaw-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/openclawai/openclaw-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18789
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: clawdevs-config
                  key: OLLAMA_MODEL
            - name: MODEL_PROVIDER
              value: ollama
            - name: MODEL_MODE
              valueFrom:
                configMapKeyRef:
                  name: clawdevs-config
                  key: MODEL_MODE
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "1"
              memory: "2Gi"
              nvidia.com/gpu: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestration
  namespace: clawdevs-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestration
  template:
    metadata:
      labels:
        app: orchestration
    spec:
      containers:
        - name: orchestration
          image: clawdevs-ai:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.core.orchestration"]
          envFrom:
            - configMapRef:
                name: clawdevs-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: po-worker
  namespace: clawdevs-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: po-worker
  template:
    metadata:
      labels:
        app: po-worker
    spec:
      containers:
        - name: po-worker
          image: clawdevs-ai:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.agents.po_worker"]
          envFrom:
            - configMapRef:
                name: clawdevs-config
---
