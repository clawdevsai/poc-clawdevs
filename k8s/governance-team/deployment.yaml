# Governance Proposer — pod opcional (CronJob ou job sob demanda).
# CPU only; não solicita GPU. Provedor LLM: clawdevs-llm-providers (agent_governance_proposer).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-governance
  namespace: ai-agents
  labels:
    app: openclaw
    team: governance
spec:
  replicas: 0
  selector:
    matchLabels:
      app: openclaw
      team: governance
  template:
    metadata:
      labels:
        app: openclaw
        team: governance
    spec:
      containers:
        - name: governance
          image: openclaw-gateway:local
          imagePullPolicy: IfNotPresent
          env:
            - name: OPENCLAW_CONFIG_PATH
              value: "/config/openclaw-governance.json"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "2"
          ports:
            - containerPort: 18790
      volumes:
        - name: config
          configMap:
            name: openclaw-governance-config
        - name: workspace
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-governance-service
  namespace: ai-agents
  labels:
    app: openclaw
    team: governance
spec:
  selector:
    app: openclaw
    team: governance
  ports:
    - port: 18790
      targetPort: 18790
  type: ClusterIP
