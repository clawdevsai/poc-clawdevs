---
apiVersion: v1
kind: Service
metadata:
  name: director-console
  namespace: clawdevs-ai
spec:
  selector:
    app: director-console
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: director-console
  namespace: clawdevs-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: director-console
  template:
    metadata:
      labels:
        app: director-console
    spec:
      containers:
        - name: director-console
          image: director-console:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: clawdevs-config
            - secretRef:
                name: clawdevs-secrets
