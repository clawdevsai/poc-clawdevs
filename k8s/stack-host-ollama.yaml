apiVersion: v1
kind: Namespace
metadata:
  name: clawdevs-ai
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clawdevs-config
  namespace: clawdevs-ai
data:
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KEY_PREFIX_PROJECT: project:v1
  STREAM_CMD_STRATEGY: cmd:strategy
  STREAM_DRAFT_ISSUE: draft.2.issue
  QA_STREAM: code:ready
  STREAM_EVENT_DEVOPS: event:devops
  STREAM_ORCHESTRATOR_EVENTS: orchestrator:events
  TELEGRAM_PENDING_KEY_PREFIX: telegram:director:pending_start
  DIRECTOR_PENDING_KEY_PREFIX: director-console:pending_start
  MODEL_PROVIDER: ollama
  MODEL_MODE: cloud
  OLLAMA_BASE_URL: http://ollama:11434
  OLLAMA_MODEL: qwen3-next:80b-cloud
  OPENCLAW_MODEL_CEO_PRIMARY: qwen3.5:397b-cloud
  OPENCLAW_MODEL_CEO_FALLBACK: qwen3-next:80b-cloud
  OPENCLAW_MODEL_PO_PRIMARY: qwen3-next:80b-cloud
  OPENCLAW_MODEL_PO_FALLBACK: ministral-3:14b-cloud
  OPENCLAW_MODEL_ARCHITECT_DRAFT_PRIMARY: devstral-2:123b-cloud
  OPENCLAW_MODEL_ARCHITECT_DRAFT_FALLBACK: qwen3.5:397b-cloud
  OPENCLAW_MODEL_DEVELOPER_PRIMARY: qwen3-coder:480b-cloud
  OPENCLAW_MODEL_DEVELOPER_FALLBACK: qwen3-coder-next:cloud
  OPENCLAW_MODEL_QA_PRIMARY: gpt-oss:120b-cloud
  OPENCLAW_MODEL_QA_FALLBACK: nemotron-3-nano:30b-cloud
  OPENCLAW_MODEL_DEVOPS_PRIMARY: devstral-small-2:24b-cloud
  OPENCLAW_MODEL_DEVOPS_FALLBACK: rnj-1:8b-cloud
  OPENCLAW_QA_SESSION_KEY: agent:qa:main
  QA_GROUP: clawdevs
  QA_STREAM: code:ready
  OPENCLAW_REQUIRED: "true"
  OPENCLAW_GATEWAY_WS: ws://openclaw-gateway:18789
  OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "1"
  GITHUB_REPO: ""
  GH_REPO: ""
  TELEGRAM_ENABLE_WEB_SEARCH: "1"
  TELEGRAM_CHAT_ID: ""
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: clawdevs-ai
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: clawdevs-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: clawdevs-ai
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: clawdevs-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: clawdevs-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: clawdevs-secrets
                  key: OLLAMA_API_KEY
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "8Gi"
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-gateway
  namespace: clawdevs-ai
spec:
  selector:
    app: openclaw-gateway
  ports:
    - name: ws
      port: 18789
      targetPort: 18789
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-gateway
  namespace: clawdevs-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-gateway
  template:
    metadata:
      labels:
        app: openclaw-gateway
    spec:
      containers:
        - name: gateway
          image: clawdevs-ai:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -e
              openclaw config set gateway.mode local
              openclaw config set gateway.auth.mode token
              openclaw config set gateway.auth.token "$OPENCLAW_GATEWAY_TOKEN"
              openclaw config set models.providers.ollama '{"baseUrl":"http://ollama:11434","models":[]}'
              openclaw config set agents.defaults.model.primary "ollama/qwen3-next:80b-cloud"
              openclaw config set gateway.controlUi.allowInsecureAuth true
              openclaw config set gateway.controlUi.dangerouslyDisableDeviceAuth true
              openclaw config set gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback true
              exec openclaw gateway run --allow-unconfigured --auth token --token "$OPENCLAW_GATEWAY_TOKEN" --bind lan --port 18789
          ports:
            - containerPort: 18789
          env:
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: clawdevs-config
                  key: OLLAMA_BASE_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: clawdevs-config
                  key: OLLAMA_MODEL
            - name: MODEL_PROVIDER
              value: ollama
            - name: MODEL_MODE
              valueFrom:
                configMapKeyRef:
                  name: clawdevs-config
                  key: MODEL_MODE
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: clawdevs-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: clawdevs-secrets
                  key: GITHUB_TOKEN
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: clawdevs-secrets
                  key: GH_TOKEN
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestration
  namespace: clawdevs-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestration
  template:
    metadata:
      labels:
        app: orchestration
    spec:
      containers:
        - name: orchestration
          image: clawdevs-ai:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.core.orchestration"]
          envFrom:
            - configMapRef:
                name: clawdevs-config
            - secretRef:
                name: clawdevs-secrets
            - secretRef:
                name: clawdevs-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: po-worker
  namespace: clawdevs-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: po-worker
  template:
    metadata:
      labels:
        app: po-worker
    spec:
      containers:
        - name: po-worker
          image: clawdevs-ai:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.agents.po_worker"]
          envFrom:
            - configMapRef:
                name: clawdevs-config
            - secretRef:
                name: clawdevs-secrets
---
