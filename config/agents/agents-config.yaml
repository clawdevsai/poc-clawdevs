# config/agents/agents-config.yaml
# Manifesto de configuração de todos os agentes do ClawDevs.
# Perfis por agente: modelo, max tokens, streams, comportamentos.
# Referência: docs/issues/040-perfis-agente-manifesto-config.md | docs/07-configuracao-e-prompts.md
---

# ─── Configuração Global ─────────────────────────────────────────────────────
global:
  redis:
    host: "redis-service"
    port: 6379
    db: 0
    working_buffer_ttl_seconds: 86400   # 24h (expiração automática do working buffer)

  ollama:
    base_url: "http://ollama:11434"
    keep_alive: "5m"

  gateway:
    # Controle FinOps: max tokens por request (pré-flight na borda)
    default_max_tokens: 4096
    # Pre-flight: resumir payloads > 3 interações antes de enviar à nuvem
    preflight_summarize_threshold: 3
    # Token bucket CEO: max 5 eventos de estratégia por hora
    strategy_token_bucket_limit: 5
    strategy_token_bucket_window_seconds: 3600
    # Orçamento de degradação: freio de mão em > 12% das tarefas em rota de fuga
    degradation_threshold_pct: 0.12
    # Heartbeat CEO: timeout de 5 min para cluster acéfalo
    ceo_heartbeat_timeout_seconds: 300

  security:
    # Egress whitelist estática (domínios autorizados para agentes cloud)
    egress_whitelist:
      - "generativelanguage.googleapis.com"
      - "openrouter.ai"
      - "api.ollama.ai"
      - "registry.npmjs.org"
      - "pypi.org"
      - "api.github.com"
      - "exa.ai"
    # Zero Trust: verificar reputação de domínio antes de egress
    domain_reputation_check: true
    # SAST em git hooks
    sast_on_commit: true
    sast_tool: "semgrep"
    # Batch de PRs: acumular antes de revisar
    batch_review_max_size: 5
    batch_review_max_wait_seconds: 120
    # Five strikes
    five_strikes_limit: 5
    # Aprovação por omissão: timer 6h, APENAS cosmético
    cosmetic_approval_timer_hours: 6
    # Circuit breaker PO-Architect: 3 draft_rejected consecutivos → congelar
    draft_rejected_circuit_breaker_limit: 3

# ─── Perfis por Agente ───────────────────────────────────────────────────────
agents:

  ceo:
    name: "Agente CEO"
    role: "strategy"
    model_primary: "gemini-1.5-pro"
    model_degraded: "phi3:mini"      # Forçado para CPU se eficiência baixa
    provider_primary: "google"
    provider_degraded: "ollama"
    max_tokens: 4096
    streams:
      input: "cmd:strategy"
      output: "task:directives"
    consumer_group: "cg-ceo"
    # VFM: threshold de custo-benefício (0 = qualquer valor positivo passa)
    vfm_threshold: 0.0
    # Eficiência mínima (aprovações PO / ideias CEO)
    efficiency_min_ratio: 0.30
    soul_file: "soul/CEO.md"
    restrictions:
      - "NUNCA escrever código"
      - "NUNCA aprovar PRs"
      - "NUNCA interagir diretamente com o Developer"
      - "SEMPRE avaliar VFM antes de enviar evento de estratégia"
      - "Aprovação por omissão: APENAS para impasses cosméticos (timer 6h)"
      - "Impasse lógico/backend: NÃO aprovar por omissão — aplicar 5 strikes"

  po:
    name: "Agente PO"
    role: "product_owner"
    model_primary: "gemini-1.5-flash"  # Flash é mais barato que Pro para PO
    model_fallback: "llama3:8b"
    provider_primary: "google"
    provider_fallback: "ollama"
    max_tokens: 4096
    streams:
      input: "task:directives"
      output_draft: "draft.2.issue"
      output_backlog: "task:backlog"
      input_rejected: "draft_rejected"
    consumer_group: "cg-po"
    soul_file: "soul/PO.md"
    restrictions:
      - "NUNCA alterar requisitos em desenvolvimento (exceto technical_blocker)"
      - "NUNCA criar repositórios"
      - "SEM internet pública"
      - "Ciclo de rascunho: publicar draft.2.issue antes de task:backlog"
      - "Disjuntor: 3 draft_rejected consecutivos na mesma épico → congelar + RAG health check"

  devops:
    name: "Agente DevOps/SRE"
    role: "devops"
    model: "phi3:mini"
    provider: "ollama"
    max_tokens: 2048
    node_selector: "cpu-only"   # NUNCA usa GPU
    streams:
      input: "task:infra"
      emergency: "devops:emergency"
    consumer_group: "cg-devops"
    soul_file: "soul/DevOps-SRE.md"
    # Checkpoints térmicos
    thermal:
      checkpoint_threshold_celsius: 80
      emergency_threshold_celsius: 82
      recovery_branch_prefix: "recovery-failsafe"
    restrictions:
      - "ZERO binários em skills (apenas texto claro)"
      - "Monitorar uso de recursos: nunca exceder 65% da máquina"

  architect:
    name: "Agente Architect"
    role: "architect"
    model: "llama3:8b"
    provider: "ollama"
    max_tokens: 8192
    streams:
      input: "draft.2.issue"
      output_approved: "task:backlog"
      output_rejected: "draft_rejected"
      input_review: "code:ready"
    consumer_group: "cg-architect"
    soul_file: "soul/Architect.md"
    # Slot único de revisão (ver estrategia-uso-hardware-gpu-cpu.md)
    review_slot: true
    review_only_diffs: true   # NUNCA revisar volumes compartilhados, APENAS diffs do PR
    restrictions:
      - "NUNCA reescrever código diretamente"
      - "EXIGE testes em qualquer PR"
      - "REJEITA skills com binários"
      - "Revisa APENAS diffs do PR (nunca volume compartilhado)"
      - "technical_blocker: única exceção para mudança de escopo em sprint"

  developer:
    name: "Agente Developer"
    role: "developer"
    model: "deepseek-coder:6.7b"
    provider: "ollama"
    max_tokens: 8192
    streams:
      input: "task:backlog"
      output: "code:ready"
    consumer_group: "cg-developer"
    soul_file: "soul/Developer.md"
    # Sandbox para dependências
    sandbox:
      enabled: true
      namespace: "sandbox-ephemeral"
      seccomp_profile: "config/security/sandbox-seccomp.json"
    restrictions:
      - "NUNCA fazer merge do próprio código"
      - "NUNCA instalar bibliotecas sem autorização Architect + CyberSec"
      - "NUNCA alterar Dockerfile, YAMLs K8s ou Terraform"
      - "Uma Issue por vez; próxima só após aprovação do PR anterior"

  qa:
    name: "Agente QA"
    role: "quality_assurance"
    model: "llama3:8b"
    provider: "ollama"
    max_tokens: 4096
    streams:
      input: "code:ready"
    consumer_group: "cg-review"    # Participa do slot único de revisão
    soul_file: "soul/QA.md"
    # Auditor da dívida técnica: focar em áreas com aprovação por omissão cosmética
    debt_auditor: true
    restrictions:
      - "NÃO consertar bugs — CRIAR Issues"
      - "BLOQUEAR merge em falhas críticas"
      - "Testes exploratórios: focar em áreas com aprovação por omissão cosmética"

  cybersec:
    name: "Agente CyberSec"
    role: "cybersecurity"
    model: "mistral:7b"
    provider: "ollama"
    max_tokens: 4096
    streams:
      input: "code:ready"
    consumer_group: "cg-review"
    soul_file: "soul/CyberSec.md"
    restrictions:
      - "BLOQUEAR chaves expostas e deps não homologadas (SEMPRE)"
      - "Vulnerabilidade crítica com tag 'cybersec': CEO NÃO pode forçar merge"
      - "Escalação ao Diretor se CEO tentar forçar merge após tag cybersec"

  ux:
    name: "Agente UX"
    role: "user_experience"
    model: "phi3:mini"
    provider: "ollama"
    max_tokens: 2048
    node_selector: "cpu-only"   # NUNCA usa GPU — reservar para técnicos
    streams:
      input: "code:ready"
    consumer_group: "cg-review"
    soul_file: "soul/UX.md"
    restrictions:
      - "NÃO alterar estrutura de banco sem consultar Architect"

  dba:
    name: "Agente DBA"
    role: "database_administrator"
    model: "llama3:8b"
    provider: "ollama"
    max_tokens: 4096
    streams:
      input: "code:ready"
    consumer_group: "cg-review"
    soul_file: "soul/DBA.md"
    restrictions:
      - "BLOQUEAR merge em violação grave de padrões ou risco de performance"
      - "Prioridade: alta performance e baixíssimo custo de hardware/espaço"

# ─── Streams e canais Redis ─────────────────────────────────────────────────
streams:
  cmd_strategy: "cmd:strategy"          # CEO → diretriz estratégica
  task_directives: "task:directives"    # CEO → PO (diretriz processada)
  draft_to_issue: "draft.2.issue"       # PO → Architect (rascunho para validação)
  draft_rejected: "draft_rejected"      # Architect → PO (rascunho rejeitado)
  task_backlog: "task:backlog"          # PO → Developer (tarefa aprovada)
  code_ready: "code:ready"             # Developer → Revisores (PR pronto)
  review_result: "review:result"       # Revisores → Orquestrador
  task_infra: "task:infra"             # DevOps (infraestrutura)
  devops_emergency: "devops:emergency" # Emergências (térmicas, acéfalo)
  degradation_consensus: "degradation:consensus_trigger"  # Loop de consenso

# ─── Egress Proxy (whitelist de domínios) ────────────────────────────────────
egress:
  # Verificação de reputação: NÃO depender de autodeclaração da skill
  reputation_check_enabled: true
  # Whitelist global estática (gerenciada pelo DevOps, não pelos agentes)
  static_whitelist:
    - host: "generativelanguage.googleapis.com"
      ports: [443]
      description: "Google Gemini API"
    - host: "openrouter.ai"
      ports: [443]
      description: "OpenRouter (FreeRide)"
    - host: "registry.npmjs.org"
      ports: [443]
      description: "npm Registry (dependências)"
    - host: "pypi.org"
      ports: [443]
      description: "PyPI (dependências Python)"
    - host: "api.github.com"
      ports: [443]
      description: "GitHub API (gh CLI, MCP)"
    - host: "exa.ai"
      ports: [443]
      description: "Exa Web Search"
    - host: "maton.ai"
      ports: [443]
      description: "API Gateway Maton"
