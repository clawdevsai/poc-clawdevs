name: ClawDevs CI — Lint e SAST
on:
  push:
    branches: [main, develop, "recovery-failsafe-*"]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint Python ─────────────────────────────────────────────────────────
  lint:
    name: Lint (Python + YAML + Shell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          pip install flake8 pylint pyyaml
          sudo apt-get install -y shellcheck

      - name: Lint Python
        run: |
          flake8 scripts/ orchestrator/ security/ memory/ \
            --max-line-length=100 --ignore=E501,W503

      - name: Lint Shell scripts
        run: |
          shellcheck scripts/setup.sh scripts/verify-machine.sh scripts/unblock-degradation.sh

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml, glob
          for f in glob.glob('k8s/**/*.yaml', recursive=True) + glob.glob('config/**/*.yaml', recursive=True):
              try:
                  with open(f) as fh:
                      list(yaml.safe_load_all(fh))
                  print(f'OK: {f}')
              except yaml.YAMLError as e:
                  print(f'ERRO: {f}: {e}')
                  exit(1)
          "

  # ─── SAST (semgrep) ──────────────────────────────────────────────────────
  sast:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/secrets
            p/owasp-top-ten
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true   # Não bloquear CI por ausência de token

      - name: Manual SAST fallback (sem token)
        if: ${{ !secrets.SEMGREP_APP_TOKEN }}
        run: |
          pip install semgrep
          semgrep --config=auto \
            --exclude="docs/**" \
            --no-autofix \
            --timeout=60 \
            scripts/ orchestrator/ security/ memory/ || true

  # ─── Verificação de secrets ───────────────────────────────────────────────
  secret-scan:
    name: Scan de secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false  # Bloquear se secrets encontrados

  # ─── Validate Kubernetes manifests ───────────────────────────────────────
  validate-k8s:
    name: Validar manifestos Kubernetes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/

      - name: Validate Kubernetes YAMLs
        run: |
          find k8s/ -name "*.yaml" | xargs kubeval --ignore-missing-schemas || true
