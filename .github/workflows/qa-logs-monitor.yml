name: QA Logs Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      service_name:
        description: "Specific service to monitor (optional)"
        required: false
        type: string

jobs:
  monitor-logs:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || github.repository == 'lukeware/clawdevs-ai'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env <<ENVEOF
          OPENCLAW_GATEWAY_TOKEN=test-token
          TELEGRAM_BOT_TOKEN_CEO=123456:test-token
          TELEGRAM_CHAT_ID_CEO=123456
          GIT_TOKEN=${{ secrets.GIT_TOKEN }}
          GIT_ORG=${{ vars.GIT_ORG || github.repository_owner }}
          PANEL_SECRET_KEY=test-secret-key-32-chars-min-length
          PANEL_ADMIN_USERNAME=admin
          PANEL_ADMIN_PASSWORD=test-password
          PANEL_DB_PASSWORD=test-db-password
          PANEL_REDIS_PASSWORD=test-redis-password
          SEARXNG_SECRET=test-secret
          PROVEDOR_LLM=ollama
          OPENCLAW_LOG_LEVEL=info
          DEBUG_LOG_ENABLED=false
          ENVEOF

      - name: Start services
        run: make up-all-with-cache

      - name: Wait for services to start
        run: sleep 20

      - name: Get OpenClaw container logs
        id: openclaw-logs
        run: |
          OPENCLAW_LOGS=$(docker logs clawdevs-openclaw --tail=100 2>&1 || echo "Container not found")
          echo "$OPENCLAW_LOGS" > /tmp/openclaw-logs.txt
          echo "logs_collected=true" >> $GITHUB_OUTPUT

      - name: Analyze logs for errors
        id: analyze-errors
        run: |
          if [ -f /tmp/openclaw-logs.txt ]; then
            ERROR_COUNT=$(grep -ci "error\|exception\|failed\|fatal" /tmp/openclaw-logs.txt || echo "0")
            echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT

            LAST_ERRORS=$(grep -i "error\|exception\|failed\|fatal" /tmp/openclaw-logs.txt | tail -5 || echo "No errors found")
            echo "last_errors<<EOF" >> $GITHUB_OUTPUT
            echo "$LAST_ERRORS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "error_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Check Ollama logs
        id: ollama-logs
        run: |
          OLLAMA_LOGS=$(docker logs clawdevs-ollama --tail=50 2>&1 || echo "Container not found")
          OLLAMA_ERRORS=$(echo "$OLLAMA_LOGS" | grep -ci "error\|exception" || echo "0")
          echo "ollama_errors=$OLLAMA_ERRORS" >> $GITHUB_OUTPUT

      - name: Report summary
        run: |
          echo "## QA Logs Summary (docker run)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Errors Found |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------------|" >> $GITHUB_STEP_SUMMARY
          echo "| OpenClaw | ${{ steps.analyze-errors.outputs.error_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ollama | ${{ steps.ollama-logs.outputs.ollama_errors || 0 }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.analyze-errors.outputs.error_count }}" -gt "0" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Last Errors in OpenClaw" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.analyze-errors.outputs.last_errors }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create issue on critical errors
        if: steps.analyze-errors.outputs.error_count > 5
        run: |
          curl -X POST https://api.github.com/repos/${{ github.repository }}/issues \
            -H "Authorization: token ${{ secrets.GIT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "[QA Alert] High error count in OpenClaw logs",
              "body": "OpenClaw reported ${{ steps.analyze-errors.outputs.error_count }} errors in the last 100 log lines.\n\nLast errors:\n```\n${{ steps.analyze-errors.outputs.last_errors }}\n```\n\nPlease investigate.",
              "labels": ["qa", "bug"]
            }'

      - name: Cleanup
        if: always()
        run: make down
