name: QA Logs Monitor

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:
    inputs:
      pod_name:
        description: "Specific pod to monitor (optional)"
        required: false
        type: string

jobs:
  monitor-logs:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || github.repository == 'lukeware/clawdevs-ai'
    permissions:
      contents: read
      issues: write
    env:
      HAS_KUBECONFIG: ${{ secrets.KUBECONFIG != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        if: env.HAS_KUBECONFIG == 'true'
        uses: azure/k8s-set-context@v1
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Get OpenClaw pod logs
        id: openclaw-logs
        if: env.HAS_KUBECONFIG == 'true'
        run: |
          POD=$(kubectl get pods -l app=clawdevs-ai -o jsonpath='{.items[0].metadata.name}' | cut -d' ' -f1)
          if [ -n "$POD" ]; then
            kubectl logs "$POD" --tail=100 > /tmp/openclaw-logs.txt
            echo "pod_name=$POD" >> $GITHUB_OUTPUT
          else
            echo "No OpenClaw pod found"
            echo "pod_name=" >> $GITHUB_OUTPUT
          fi

      - name: Analyze logs for errors
        id: analyze-errors
        if: env.HAS_KUBECONFIG == 'true'
        run: |
          if [ -f /tmp/openclaw-logs.txt ]; then
            ERROR_COUNT=$(grep -ci "error\|exception\|failed\|fatal" /tmp/openclaw-logs.txt || echo "0")
            echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
            
            # Extract last 5 errors
            LAST_ERRORS=$(grep -i "error\|exception\|failed\|fatal" /tmp/openclaw-logs.txt | tail -5)
            echo "last_errors<<EOF" >> $GITHUB_OUTPUT
            echo "$LAST_ERRORS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "error_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Check Ollama logs
        id: ollama-logs
        if: env.HAS_KUBECONFIG == 'true'
        run: |
          POD=$(kubectl get pods -l app=ollama -o jsonpath='{.items[0].metadata.name}' | cut -d' ' -f1)
          if [ -n "$POD" ]; then
            kubectl logs "$POD" --tail=50 > /tmp/ollama-logs.txt
            OLLAMA_ERRORS=$(grep -ci "error\|exception" /tmp/ollama-logs.txt || echo "0")
            echo "ollama_errors=$OLLAMA_ERRORS" >> $GITHUB_OUTPUT
          fi

      - name: Report summary
        if: env.HAS_KUBECONFIG == 'true'
        run: |
          echo "## QA Logs Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Errors Found |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------------|" >> $GITHUB_STEP_SUMMARY
          echo "| OpenClaw | ${{ steps.analyze-errors.outputs.error_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ollama | ${{ steps.ollama-logs.outputs.ollama_errors || 0 }} |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.analyze-errors.outputs.error_count }}" -gt "0" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Last Errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.analyze-errors.outputs.last_errors }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: "Report summary (skipped: no kubeconfig)"
        if: env.HAS_KUBECONFIG != 'true'
        run: |
          echo "KUBECONFIG secret is not configured. Skipping log monitoring steps."
          echo "## QA Logs Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Skipped because \`KUBECONFIG\` secret is not configured." >> $GITHUB_STEP_SUMMARY

      - name: Create issue on critical errors
        if: env.HAS_KUBECONFIG == 'true' && steps.analyze-errors.outputs.error_count > 5
        run: |
          curl -X POST https://api.github.com/repos/${{ github.repository }}/issues \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "[QA Alert] High error count in OpenClaw logs",
              "body": "OpenClaw pod reported ${{ steps.analyze-errors.outputs.error_count }} errors in the last 100 log lines.\n\nLast errors:\n```\n${{ steps.analyze-errors.outputs.last_errors }}\n```\n\nPlease investigate.",
              "labels": ["qa", "bug"]
            }'