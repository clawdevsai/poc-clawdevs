name: Validate Deployment

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  config-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate .env from secrets
        run: |
          cat > .env <<ENVEOF
          OPENCLAW_GATEWAY_TOKEN=${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          TELEGRAM_BOT_TOKEN_CEO=${{ secrets.TELEGRAM_BOT_TOKEN_CEO }}
          TELEGRAM_CHAT_ID_CEO=${{ secrets.TELEGRAM_CHAT_ID_CEO }}
          GIT_TOKEN=${{ secrets.GIT_TOKEN }}
          GIT_ORG=${{ secrets.GIT_ORG }}
          GIT_DEFAULT_REPOSITORY=${{ secrets.GIT_DEFAULT_REPOSITORY }}
          DIRECTORS_NAME=${{ secrets.DIRECTORS_NAME }}
          OLLAMA_API_KEY=${{ secrets.OLLAMA_API_KEY }}
          PROVEDOR_LLM=ollama
          OPENCLAW_LOG_LEVEL=info
          DEBUG_LOG_ENABLED=false
          PANEL_SECRET_KEY=${{ secrets.PANEL_SECRET_KEY }}
          PANEL_ADMIN_USERNAME=admin
          PANEL_ADMIN_PASSWORD=${{ secrets.PANEL_ADMIN_PASSWORD }}
          PANEL_DB_PASSWORD=${{ secrets.PANEL_DB_PASSWORD }}
          PANEL_REDIS_PASSWORD=${{ secrets.PANEL_REDIS_PASSWORD }}
          SEARXNG_SECRET=${{ secrets.SEARXNG_SECRET }}
          ENVEOF

      - name: Validate Docker Compose config
        run: docker-compose config > /dev/null

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          grep -r "password\|secret\|token" docker-compose.yaml .env.example || true
          grep -r "api_key\|apikey" docker-compose.yaml .env.example || true

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Python tests
        run: |
          cd control-panel/backend
          python -m pytest --tb=short -q || true

      - name: Run frontend tests
        run: |
          cd control-panel/frontend
          npm install --legacy-peer-deps
          npm run lint || true

  integration-tests:
    runs-on: ubuntu-latest
    services:
      docker-compose:
        image: docker/compose:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cat > .env <<ENVEOF
          OPENCLAW_GATEWAY_TOKEN=test-token
          TELEGRAM_BOT_TOKEN_CEO=test
          TELEGRAM_CHAT_ID_CEO=test
          GIT_TOKEN=test
          GIT_ORG=test
          PANEL_SECRET_KEY=test-secret-key-32-chars-min-length
          PANEL_ADMIN_USERNAME=admin
          PANEL_ADMIN_PASSWORD=test-password
          PANEL_DB_PASSWORD=test-db-password
          PANEL_REDIS_PASSWORD=test-redis-password
          SEARXNG_SECRET=test-secret
          PROVEDOR_LLM=ollama
          OPENCLAW_LOG_LEVEL=info
          DEBUG_LOG_ENABLED=false
          ENVEOF

      - name: Start Docker Compose services
        run: docker-compose up -d

      - name: Wait for services to be healthy
        run: |
          for i in {1..30}; do
            docker-compose ps | grep -q "healthy" && break
            sleep 10
          done

      - name: Test Ollama connectivity
        run: |
          curl -s http://localhost:11434/api/tags || echo "Ollama not responding yet"

      - name: Collect Docker logs on failure
        if: failure()
        run: docker-compose logs

      - name: Stop Docker Compose services
        if: always()
        run: docker-compose down

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload results to GitHub Security
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
