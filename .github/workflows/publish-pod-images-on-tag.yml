name: Publish Pod Images On Tag

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Tag da imagem (ex: 2026.3.23). Se vazio, usa a tag Git."
        required: false
        type: string
      target_pod:
        description: "Pod para publicar (all = todos)"
        required: true
        default: all
        type: choice
        options:
          - all
          - openclaw
          - ollama
          - searxng
          - searxng-proxy
          - panel-backend
          - panel-frontend
          - panel-db
          - panel-redis

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build matrix from selected pod
        id: set-matrix
        env:
          TARGET_POD: ${{ inputs.target_pod }}
        run: |
          set -euo pipefail
          MATRIX_JSON='[
            {"pod":"openclaw","image":"openclaw-runtime","context":".","file":"docker/openclaw-runtime/Dockerfile","is_openclaw":"false"},
            {"pod":"ollama","image":"ollama-runtime","context":".","file":"docker/ollama-runtime/Dockerfile","is_openclaw":"false"},
            {"pod":"searxng","image":"searxng-runtime","context":".","file":"docker/searxng-runtime/Dockerfile","is_openclaw":"false"},
            {"pod":"searxng-proxy","image":"searxng-proxy","context":".","file":"docker/searxng-proxy/Dockerfile","is_openclaw":"false"},
            {"pod":"panel-backend","image":"clawdevs-panel-backend","context":"control-panel/backend","file":"control-panel/backend/Dockerfile","is_openclaw":"false"},
            {"pod":"panel-frontend","image":"clawdevs-panel-frontend","context":"control-panel/frontend","file":"control-panel/frontend/Dockerfile","is_openclaw":"false"},
            {"pod":"panel-db","image":"postgres-runtime","context":".","file":"docker/postgres-runtime/Dockerfile","is_openclaw":"false"},
            {"pod":"panel-redis","image":"redis-runtime","context":".","file":"docker/redis-runtime/Dockerfile","is_openclaw":"false"}
          ]'

          if [ "${TARGET_POD}" = "all" ]; then
            FILTERED_MATRIX="$(echo "${MATRIX_JSON}" | jq -c '.')"
          else
            FILTERED_MATRIX="$(echo "${MATRIX_JSON}" | jq -c --arg pod "${TARGET_POD}" '[.[] | select(.pod == $pod)]')"
          fi

          if [ "${FILTERED_MATRIX}" = "[]" ]; then
            echo "target_pod invalido: ${TARGET_POD}" >&2
            exit 1
          fi

          echo "matrix=${FILTERED_MATRIX}" >> "$GITHUB_OUTPUT"

  publish:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Docker Hub credentials
        id: hub
        env:
          HUB_USER_SECRET: ${{ secrets.DOCKERHUB_USERNAME }}
          HUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          USERNAME="${HUB_USER_SECRET:-}"
          if [ -z "${USERNAME}" ]; then
            echo "DOCKERHUB_USERNAME ausente em Repository Secrets." >&2
            exit 1
          fi
          if [ -z "${HUB_TOKEN:-}" ]; then
            echo "DOCKERHUB_TOKEN ausente em Repository Secrets." >&2
            exit 1
          fi
          echo "username=${USERNAME}" >> "$GITHUB_OUTPUT"

      - name: Resolve version tag
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          RAW_TAG="${REF_NAME}"
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${INPUT_VERSION_TAG}" ]; then
            RAW_TAG="${INPUT_VERSION_TAG}"
          fi
          VERSION_TAG="${RAW_TAG#v}"
          if [ -z "${VERSION_TAG}" ]; then
            echo "version tag vazio" >&2
            exit 1
          fi
          echo "raw_tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.hub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: clawdevsai/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version_tag }}
            type=raw,value=latest

      - name: Build, load and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: |
            type=registry
            type=docker

      - name: Prepare local Scout tag
        env:
          VERSION_TAG: ${{ steps.vars.outputs.version_tag }}
          IMAGE_NAME: ${{ matrix.image }}
        run: |
          set -euo pipefail
          SRC="clawdevsai/${IMAGE_NAME}:${VERSION_TAG}"
          DST="scout-${IMAGE_NAME}:${VERSION_TAG}"
          docker image inspect "${SRC}" >/dev/null
          docker tag "${SRC}" "${DST}"
          docker image inspect "${DST}" >/dev/null

      - name: Resolve Scout image reference
        id: scout_ref
        env:
          VERSION_TAG: ${{ steps.vars.outputs.version_tag }}
          IMAGE_NAME: ${{ matrix.image }}
        run: |
          set -euo pipefail
          if [ "${IMAGE_NAME}" = "ollama-runtime" ]; then
            # Avoid local indexing for very large images; scan the pushed registry tag directly.
            echo "image_ref=clawdevsai/${IMAGE_NAME}:${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "image_ref=local://scout-${IMAGE_NAME}:${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: CVE gate (critical/high)
        if: ${{ matrix.image != 'postgres-runtime' }}
        continue-on-error: ${{ matrix.image == 'ollama-runtime' }}
        uses: docker/scout-action@v1
        with:
          command: cves
          dockerhub-user: ${{ steps.hub.outputs.username }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image: ${{ steps.scout_ref.outputs.image_ref }}
          only-severities: critical,high
          only-fixed: true
          ignore-base: ${{ matrix.image == 'ollama-runtime' }}
          summary: true
          write-comment: false

      - name: CVE gate (critical/high) - panel-db os packages
        if: ${{ matrix.image == 'postgres-runtime' }}
        uses: docker/scout-action@v1
        with:
          command: cves
          dockerhub-user: ${{ steps.hub.outputs.username }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image: ${{ steps.scout_ref.outputs.image_ref }}
          only-severities: critical,high
          only-fixed: true
          only-package-types: apk
          ignore-base: true
          summary: true
          write-comment: false

      - name: CVE report (medium)
        if: ${{ matrix.image != 'postgres-runtime' }}
        continue-on-error: true
        uses: docker/scout-action@v1
        with:
          command: cves
          dockerhub-user: ${{ steps.hub.outputs.username }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image: ${{ steps.scout_ref.outputs.image_ref }}
          only-severities: medium
          ignore-base: ${{ matrix.image == 'ollama-runtime' }}
          summary: true
          write-comment: false

      - name: CVE report (medium) - panel-db os packages
        if: ${{ matrix.image == 'postgres-runtime' }}
        continue-on-error: true
        uses: docker/scout-action@v1
        with:
          command: cves
          dockerhub-user: ${{ steps.hub.outputs.username }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image: ${{ steps.scout_ref.outputs.image_ref }}
          only-severities: medium
          only-fixed: true
          only-package-types: apk
          ignore-base: true
          summary: true
          write-comment: false
