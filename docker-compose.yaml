#
# ClawDevs AI — Docker Compose
# Uso: make up  (ou: docker compose --env-file .env up -d)
#
# Para GPU (NVIDIA): make up-gpu
# Para build local:  make dc-build && make up

name: clawdevs-ai

networks:
  clawdevs:
    driver: bridge

volumes:
  openclaw-data:
  ollama-data:
  postgres-data:
  panel-token:

services:

  # ─────────────────────────────────────────────────────────────────────────────
  # INFRAESTRUTURA
  # ─────────────────────────────────────────────────────────────────────────────

  postgres:
    image: clawdevsai/postgres-runtime:latest
    container_name: clawdevs-postgres
    networks: [clawdevs]
    environment:
      POSTGRES_DB: clawdevs_panel
      POSTGRES_USER: panel
      POSTGRES_PASSWORD: ${PANEL_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "panel", "-d", "clawdevs_panel"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: clawdevsai/redis-runtime:latest
    container_name: clawdevs-redis
    networks: [clawdevs]
    command: ["redis-server", "--requirepass", "${PANEL_REDIS_PASSWORD}"]
    environment:
      PANEL_REDIS_PASSWORD: ${PANEL_REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $$PANEL_REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # OLLAMA (LLM Backend)
  # Para GPU: make up-gpu (usa docker-compose.gpu.yaml override)
  # ─────────────────────────────────────────────────────────────────────────────

  ollama:
    image: clawdevsai/ollama-runtime:latest
    container_name: clawdevs-ollama
    networks: [clawdevs]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_GPU_MEMORY: "4096"
      CUDA_MEM_POOL_MAX_SPLIT_SIZE_MB: "512"
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_AUTO_PULL_MODELS: ${OLLAMA_AUTO_PULL_MODELS:-false}
      OLLAMA_BOOT_MODELS: ${OLLAMA_BOOT_MODELS:-nomic-embed-text}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # SEARXNG (Busca Web)
  # ─────────────────────────────────────────────────────────────────────────────

  searxng:
    image: clawdevsai/searxng-runtime:latest
    container_name: clawdevs-searxng
    networks: [clawdevs]
    environment:
      SEARXNG_SETTINGS_PATH: /etc/searxng/settings.yml
      SEARXNG_SECRET: ${SEARXNG_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  searxng-proxy:
    image: clawdevsai/searxng-proxy:latest
    container_name: clawdevs-searxng-proxy
    networks: [clawdevs]
    depends_on:
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # CONTROL PANEL
  # ─────────────────────────────────────────────────────────────────────────────

  panel-backend:
    image: clawdevsai/clawdevs-panel-backend:latest
    container_name: clawdevs-panel-backend
    networks: [clawdevs]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        alembic upgrade head
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      PANEL_DB_PASSWORD: ${PANEL_DB_PASSWORD}
      PANEL_REDIS_PASSWORD: ${PANEL_REDIS_PASSWORD}
      PANEL_DATABASE_URL: postgresql+asyncpg://panel:${PANEL_DB_PASSWORD}@postgres:5432/clawdevs_panel
      PANEL_REDIS_URL: redis://:${PANEL_REDIS_PASSWORD}@redis:6379/0
      PANEL_OPENCLAW_GATEWAY_URL: http://openclaw:18789
      PANEL_SECRET_KEY: ${PANEL_SECRET_KEY}
      PANEL_ADMIN_USERNAME: ${PANEL_ADMIN_USERNAME}
      PANEL_ADMIN_PASSWORD: ${PANEL_ADMIN_PASSWORD}
      GIT_TOKEN: ${GIT_TOKEN}
      GIT_ORG: ${GIT_ORG}
    volumes:
      - openclaw-data:/data/openclaw
    # healthcheck disabled temporarily - image needs curl installed
    # healthcheck:
    #   test: ["CMD", "curl", "-sf", "http://localhost:8000/healthz"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 10
    #   start_period: 20s
    restart: unless-stopped

  panel-worker:
    image: clawdevsai/clawdevs-panel-backend:latest
    container_name: clawdevs-panel-worker
    networks: [clawdevs]
    depends_on:
      - panel-backend
    command: ["python", "-m", "scripts.worker"]
    environment:
      PANEL_DB_PASSWORD: ${PANEL_DB_PASSWORD}
      PANEL_REDIS_PASSWORD: ${PANEL_REDIS_PASSWORD}
      PANEL_DATABASE_URL: postgresql+asyncpg://panel:${PANEL_DB_PASSWORD}@postgres:5432/clawdevs_panel
      PANEL_REDIS_URL: redis://:${PANEL_REDIS_PASSWORD}@redis:6379/0
      GIT_TOKEN: ${GIT_TOKEN}
      GIT_ORG: ${GIT_ORG}
    volumes:
      - openclaw-data:/data/openclaw:ro
    restart: unless-stopped

  panel-frontend:
    image: clawdevsai/clawdevs-panel-frontend:latest
    container_name: clawdevs-panel-frontend
    networks: [clawdevs]
    ports:
      - "3000:3000"
    depends_on:
      - panel-backend
    environment:
      BACKEND_URL: http://panel-backend:8000
      NODE_ENV: production
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # TOKEN INIT (substitui o K8s Job generate-agent-token-job)
  # Roda uma vez, gera o PANEL_TOKEN e termina.
  # openclaw aguarda este servico completar antes de iniciar.
  # ─────────────────────────────────────────────────────────────────────────────

  token-init:
    image: curlimages/curl:latest
    container_name: clawdevs-token-init
    networks: [clawdevs]
    depends_on:
      - panel-backend
    environment:
      PANEL_ADMIN_USERNAME: ${PANEL_ADMIN_USERNAME}
      PANEL_ADMIN_PASSWORD: ${PANEL_ADMIN_PASSWORD}
    volumes:
      - ./scripts/docker/generate-panel-token.sh:/generate-panel-token.sh:ro
      - panel-token:/panel-token
    command: ["/bin/sh", "/generate-panel-token.sh"]
    restart: "no"

  # ─────────────────────────────────────────────────────────────────────────────
  # OPENCLAW (Gateway dos Agentes de IA)
  # ─────────────────────────────────────────────────────────────────────────────

  openclaw:
    image: clawdevsai/openclaw-runtime:latest
    container_name: clawdevs-openclaw
    networks: [clawdevs]
    ports:
      - "18789:18789"
    depends_on:
      ollama:
        condition: service_healthy
      token-init:
        condition: service_completed_successfully
    command:
      - /bin/bash
      - -lc
      - |
        export PANEL_TOKEN=$(cat /panel-token/PANEL_TOKEN 2>/dev/null || echo "")
        . /bootstrap/scripts/00-env.sh
        . /bootstrap/scripts/01-deps.sh
        . /bootstrap/scripts/02-web-tools.sh
        . /bootstrap/scripts/03-gh-auth.sh
        . /bootstrap/scripts/04-repo-tools.sh
        . /bootstrap/scripts/05-install-openclaw.sh
        . /bootstrap/scripts/06-dirs.sh
        . /bootstrap/scripts/07-agent-workspaces.sh
        . /bootstrap/scripts/08-git-hooks.sh
        . /bootstrap/scripts/09-openclaw-config.sh
        . /bootstrap/scripts/10-background-services.sh
        . /bootstrap/scripts/11-start-gateway.sh
    environment:
      HOME: /data/openclaw
      OPENCLAW_STATE_DIR: /data/openclaw
      GH_CONFIG_DIR: /data/openclaw/.config/gh
      MEMORY_BASE_PATH: /data/openclaw/memory
      OLLAMA_BASE_URL: http://ollama:11434
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      TELEGRAM_BOT_TOKEN_CEO: ${TELEGRAM_BOT_TOKEN_CEO}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID_CEO}
      GH_TOKEN: ${GIT_TOKEN}
      GIT_TOKEN: ${GIT_TOKEN}
      GIT_ORG: ${GIT_ORG}
      GIT_DEFAULT_REPOSITORY: ${GIT_DEFAULT_REPOSITORY:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      DIRECTORS_NAME: ${DIRECTORS_NAME:-Director}
      LANGUAGE: ${LANGUAGE:-pt-BR}
      PROVEDOR_LLM: ${PROVEDOR_LLM:-ollama}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      PANEL_API_URL: http://panel-backend:8000/api
      NODE_OPTIONS: --max-old-space-size=1024
      OPENCLAW_NO_RESPAWN: "1"
      NODE_COMPILE_CACHE: /var/tmp/openclaw-compile-cache
      OPENCLAW_LOG_LEVEL: ${OPENCLAW_LOG_LEVEL:-error}
      DEBUG_LOG_ENABLED: ${DEBUG_LOG_ENABLED:-false}
      OPENCLAW_CRON_LIST_TIMEOUT_SECONDS: "8"
      OPENCLAW_CRON_LIST_LOCK_WAIT_SECONDS: "15"
      OPENCLAW_SECURITY_AUDIT_DEEP_ON_START: "true"
      OPENCLAW_SECURITY_AUDIT_TIMEOUT_SECONDS: "45"
      OPENCLAW_SECURITY_AUDIT_MAX_RETRIES: "60"
      OPENCLAW_SECURITY_AUDIT_RETRY_INTERVAL_SECONDS: "5"
      OPENCLAW_SECURITY_AUDIT_CRON_INTERVAL_SECONDS: "3600"
      AGENT_ERROR_ROUTER_ENABLED: "true"
      AGENT_ERROR_ROUTER_INTERVAL_SECONDS: "30"
      DEV_BACKEND_CRON_ENABLED: ${DEV_BACKEND_CRON_ENABLED:-true}
      DEV_BACKEND_CRON_NAME: dev_backend_hourly_queue_poll
      DEV_BACKEND_CRON_EXPR: ${DEV_BACKEND_CRON_EXPR:-0 * * * *}
      DEV_BACKEND_CRON_TZ: America/Sao_Paulo
      DEV_FRONTEND_CRON_ENABLED: ${DEV_FRONTEND_CRON_ENABLED:-true}
      DEV_FRONTEND_CRON_NAME: dev_frontend_hourly_queue_poll
      DEV_FRONTEND_CRON_EXPR: ${DEV_FRONTEND_CRON_EXPR:-15 * * * *}
      DEV_FRONTEND_CRON_TZ: America/Sao_Paulo
      DEV_MOBILE_CRON_ENABLED: ${DEV_MOBILE_CRON_ENABLED:-true}
      DEV_MOBILE_CRON_NAME: dev_mobile_hourly_queue_poll
      DEV_MOBILE_CRON_EXPR: ${DEV_MOBILE_CRON_EXPR:-30 * * * *}
      DEV_MOBILE_CRON_TZ: America/Sao_Paulo
      QA_CRON_ENABLED: ${QA_CRON_ENABLED:-true}
      QA_CRON_NAME: qa_engineer_hourly_queue_poll
      QA_CRON_EXPR: ${QA_CRON_EXPR:-45 * * * *}
      QA_CRON_TZ: America/Sao_Paulo
      DEVOPS_SRE_CRON_ENABLED: ${DEVOPS_SRE_CRON_ENABLED:-true}
      DEVOPS_SRE_CRON_NAME: devops_sre_queue_poll
      DEVOPS_SRE_CRON_EXPR: ${DEVOPS_SRE_CRON_EXPR:-*/30 * * * *}
      DEVOPS_SRE_CRON_TZ: America/Sao_Paulo
      SECURITY_ENGINEER_CRON_ENABLED: ${SECURITY_ENGINEER_CRON_ENABLED:-true}
      SECURITY_ENGINEER_CRON_NAME: security_engineer_scan
      SECURITY_ENGINEER_CRON_EXPR: ${SECURITY_ENGINEER_CRON_EXPR:-0 */6 * * *}
      SECURITY_ENGINEER_CRON_TZ: America/Sao_Paulo
      UX_DESIGNER_CRON_ENABLED: ${UX_DESIGNER_CRON_ENABLED:-true}
      UX_DESIGNER_CRON_NAME: ux_designer_queue_poll
      UX_DESIGNER_CRON_EXPR: ${UX_DESIGNER_CRON_EXPR:-0 */4 * * *}
      UX_DESIGNER_CRON_TZ: America/Sao_Paulo
      DBA_DATA_ENGINEER_CRON_ENABLED: ${DBA_DATA_ENGINEER_CRON_ENABLED:-true}
      DBA_DATA_ENGINEER_CRON_NAME: dba_data_engineer_queue_poll
      DBA_DATA_ENGINEER_CRON_EXPR: ${DBA_DATA_ENGINEER_CRON_EXPR:-30 */4 * * *}
      DBA_DATA_ENGINEER_CRON_TZ: America/Sao_Paulo
      MEMORY_CURATOR_CRON_ENABLED: ${MEMORY_CURATOR_CRON_ENABLED:-true}
      MEMORY_CURATOR_CRON_NAME: memory_curator_promote
      MEMORY_CURATOR_CRON_EXPR: ${MEMORY_CURATOR_CRON_EXPR:-0 2 * * *}
      MEMORY_CURATOR_CRON_TZ: America/Sao_Paulo
      OPENCLAW_CONTROL_UI_ALLOWED_ORIGINS_JSON: >-
        ["http://127.0.0.1:18789","http://localhost:18789","http://openclaw:18789"]
    volumes:
      - openclaw-data:/data/openclaw
      - ./tmp/agent-config-flat:/bootstrap/agent-config:ro
      - ./container/base/bootstrap-scripts:/bootstrap/scripts:ro
      - panel-token:/panel-token:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/healthz"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped
